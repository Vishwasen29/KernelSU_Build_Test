name: Build LineageOS OPlus SM8250 SUN-TEST

on:
  workflow_dispatch:

env:
  TZ: Asia/Shanghai

jobs:
  build:
    name: Build Kernel by ${{ github.actor }}
    runs-on: ubuntu-latest

    env:
      CLANG_VERSION: clang-r547379
      GCC_TAG: android-12.1.0_r27
      Lineage_VERSION: lineage-23.0

    steps:
    - name: Checkout source
      uses: actions/checkout@v6

    - name: Set swap to 10G
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 10

    - name: Setup build environment
      run: |
        echo "BUILD_TIME=$(date +%y%m%d)" >> $GITHUB_ENV
        echo "BUILD_TIME_1=$(date +%Y-%m-%d)" >> $GITHUB_ENV
        sudo apt-get update
        sudo apt-get install -y \
          git ccache automake flex lzop bison gperf build-essential \
          zip curl zlib1g-dev g++-multilib bzip2 libbz2-dev \
          liblz4-tool make squashfs-tools dpkg-dev libssl-dev \
          python3 bc libc6-dev-i386 libncurses5-dev jq
        mkdir -p kernel_workspace

    - name: Cache Clang
      uses: actions/cache@v5
      with:
        path: kernel_workspace/clang-aosp
        key: ${{ env.CLANG_VERSION }}

    - name: Download Clang
      run: |
        cd kernel_workspace
        if [ ! -d clang-aosp/bin ]; then
          mkdir clang-aosp
          wget -qO clang.tar.gz \
            https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/${CLANG_VERSION}.tar.gz
          tar -xf clang.tar.gz -C clang-aosp
        fi

    - name: Cache GCC
      uses: actions/cache@v4
      with:
        path: kernel_workspace/gcc-64
        key: gcc-aarch64-${{ env.GCC_TAG }}

    - name: Download GCC
      run: |
        cd kernel_workspace
        if [ ! -d gcc-64/bin ]; then
          mkdir gcc-64
          wget -qO gcc.tar.gz \
            https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9/+archive/refs/tags/${GCC_TAG}.tar.gz
          tar -xf gcc.tar.gz -C gcc-64
        fi

    - name: Clone kernel source
      run: |
        cd kernel_workspace
        git clone --recursive \
          https://github.com/LineageOS/android_kernel_oneplus_sm8250 \
          -b ${{ env.Lineage_VERSION }} \
          android-kernel --depth=1

    - name: Setup KernelSU-Next + Baseband-guard
      run: |
        cd kernel_workspace/android-kernel

        # KernelSU-Next
        curl -LSs https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh | bash -s stable

        # Baseband-guard
        curl -LSs https://github.com/vc-teahouse/Baseband-guard/raw/main/setup.sh | bash

        DEFCONFIG=arch/arm64/configs/vendor/kona_defconfig

        # Enable KernelSU manual hook
        grep -q CONFIG_KSU_MANUAL_HOOK $DEFCONFIG || echo "CONFIG_KSU_MANUAL_HOOK=y" >> $DEFCONFIG

        # Enable Baseband-guard
        grep -q CONFIG_BBG $DEFCONFIG || echo "CONFIG_BBG=y" >> $DEFCONFIG

        # Fix CONFIG_LSM (required)
        sed -i 's/^CONFIG_LSM=.*/CONFIG_LSM="lockdown,yama,loadpin,safesetid,integrity,selinux,smack,tomoyo,apparmor,bpf,baseband_guard"/' $DEFCONFIG \
          || echo 'CONFIG_LSM="lockdown,yama,loadpin,safesetid,integrity,selinux,smack,tomoyo,apparmor,bpf,baseband_guard"' >> $DEFCONFIG

        # KernelSU version
        KSU_VERSION=$(cd KernelSU-Next && expr $(git rev-list --count HEAD) + 30000)
        echo "KSUVER=$KSU_VERSION" >> $GITHUB_ENV

        sed -i 's/ -dirty//g' scripts/setlocalversion

    - name: Build kernel
      run: |
        cd kernel_workspace/android-kernel

        export ARCH=arm64
        export SUBARCH=arm64
        export BRAND_SHOW_FLAG=oneplus
        export PATH=$PWD/../clang-aosp/bin:$PWD/../gcc-64/bin:$PATH
        export KBUILD_BUILD_USER=${{ github.actor }}
        export KBUILD_BUILD_HOST=GitHub-Actions

        BA_CMD="CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-android-"
        EX_CMD="LD=ld.lld LLVM=1 LLVM_IAS=1"

        DEFCONFIG="vendor/kona_defconfig vendor/debugfs.config vendor/oplus.config"

        make O=out ARCH=arm64 CC=clang $BA_CMD $EX_CMD $DEFCONFIG
        make -j$(nproc) O=out ARCH=arm64 CC=clang $BA_CMD $EX_CMD

    - name: Check output
      run: |
        cd kernel_workspace/android-kernel/out
        if [ -f arch/arm64/boot/Image ]; then
          echo "CHECK_IMAGE=true" >> $GITHUB_ENV
          echo "KERNEL_VERSION=$(cat include/config/kernel.release)" >> $GITHUB_ENV
        else
          echo "Image not found"
          exit 1
        fi

    - name: Make AnyKernel3
      if: env.CHECK_IMAGE == 'true'
      run: |
        cd kernel_workspace
        git clone https://github.com/osm0sis/AnyKernel3 --depth=1
        sed -i 's/do.devicecheck=1/do.devicecheck=0/' AnyKernel3/anykernel.sh
        sed -i 's/IS_SLOT_DEVICE=0;/IS_SLOT_DEVICE=auto;/' AnyKernel3/anykernel.sh
        cp android-kernel/out/arch/arm64/boot/Image AnyKernel3/
        rm -rf AnyKernel3/.git*

    - name: Upload AnyKernel3
      if: env.CHECK_IMAGE == 'true'
      uses: actions/upload-artifact@v6
      with:
        name: AK3-${{ env.Lineage_VERSION }}-SM8250-KSUNEXT-${{ env.KSUVER }}
        path: kernel_workspace/AnyKernel3/*

name: Kernel Build with KernelSU-Next (legacy) + SUSFS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      ARCH: arm64
      SUBARCH: arm64
      KBUILD_BUILD_USER: github
      KBUILD_BUILD_HOST: actions
      USE_CCACHE: 1
      CCACHE_SIZE: 10G
      DEVICE: kona
      DEFCONFIG: vendor/kona-perf_defconfig
      TZ: Asia/Kolkata

    steps:
    # --------------------------------------------------
    # Kernel source
    # --------------------------------------------------
    - name: Checkout kernel
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    # --------------------------------------------------
    # Dependencies
    # --------------------------------------------------
    - name: Install build dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          bc bison build-essential ccache curl flex \
          gcc-multilib g++-multilib git gperf \
          lib32ncurses5-dev lib32readline-dev lib32z1-dev \
          libelf-dev liblz4-tool libncurses5-dev \
          libssl-dev lzop rsync unzip zip python3

    - name: Setup ccache
      run: |
        ccache -M 10G
        ccache -z

    # --------------------------------------------------
    # Toolchains
    # --------------------------------------------------
    - name: Clone Proton Clang
      run: |
        git clone --depth=1 https://github.com/kdrag0n/proton-clang clang

    - name: Clone GCC toolchains
      run: |
        git clone --depth=1 https://github.com/mvaisakh/gcc-arm64 gcc64
        git clone --depth=1 https://github.com/mvaisakh/gcc-arm gcc

    - name: Export toolchain paths
      run: |
        echo "PATH=$GITHUB_WORKSPACE/clang/bin:$GITHUB_WORKSPACE/gcc64/bin:$GITHUB_WORKSPACE/gcc/bin:$PATH" >> $GITHUB_ENV

    # --------------------------------------------------
    # KernelSU-Next (LEGACY MODE)
    # --------------------------------------------------
    - name: Setup KernelSU-Next (legacy)
      run: |
        set -e
        cd $GITHUB_WORKSPACE
        curl -LSs \
          https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/main/kernel/setup.sh \
          | bash -s legacy

    # --------------------------------------------------
    # SUSFS (manual implementation of patches)
    # --------------------------------------------------
    - name: Integrate SUSFS
      run: |
        set -e
        cd $GITHUB_WORKSPACE

        git clone --depth=1 -b kernel-4.19 \
          https://gitlab.com/simonpunk/susfs4ksu.git susfs

        echo "[SUSFS] Copy core source"
        cp susfs/susfs.c fs/susfs.c
        cp susfs/include/linux/susfs.h include/linux/
        cp susfs/include/linux/susfs_def.h include/linux/

        echo "[SUSFS] fs/Makefile hook"
        grep -q CONFIG_KSU_SUSFS fs/Makefile || \
          echo 'obj-$(CONFIG_KSU_SUSFS) += susfs.o' >> fs/Makefile

        echo "[SUSFS] KernelSU Kconfig"
        if ! grep -q "KernelSU - SUSFS" kernel/Kconfig; then
          cat >> kernel/Kconfig <<'EOF'

menu "KernelSU - SUSFS"

config KSU_SUSFS
	bool "Enable SUSFS"
	depends on KSU
	default y

config KSU_SUSFS_HAS_MAGIC_MOUNT
	bool "Magic mount support"
	depends on KSU_SUSFS
	default y

config KSU_SUSFS_SUS_PATH
	bool "Hide suspicious paths"
	depends on KSU_SUSFS
	default y

config KSU_SUSFS_SUS_MOUNT
	bool "Hide suspicious mounts"
	depends on KSU_SUSFS
	default y

endmenu
EOF
        fi

    # --------------------------------------------------
    # Enable configs
    # --------------------------------------------------
    - name: Enable KernelSU + SUSFS configs
      run: |
        DEF=arch/arm64/configs/vendor/kona-perf_defconfig

        echo "CONFIG_KSU=y" >> $DEF
        echo "CONFIG_KSU_MANUAL_HOOK=y" >> $DEF
        echo "CONFIG_KSU_SUSFS=y" >> $DEF
        echo "CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y" >> $DEF
        echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> $DEF
        echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y" >> $DEF

    # --------------------------------------------------
    # Configure kernel
    # --------------------------------------------------
    - name: Make defconfig
      run: |
        make O=out ARCH=arm64 $DEFCONFIG

    # --------------------------------------------------
    # Build kernel
    # --------------------------------------------------
    - name: Build kernel
      run: |
        make -j$(nproc) O=out \
          ARCH=arm64 \
          CC=clang \
          LD=ld.lld \
          AR=llvm-ar \
          NM=llvm-nm \
          OBJCOPY=llvm-objcopy \
          OBJDUMP=llvm-objdump \
          STRIP=llvm-strip \
          CROSS_COMPILE=aarch64-linux-gnu- \
          CROSS_COMPILE_ARM32=arm-linux-gnueabi-

    # --------------------------------------------------
    # Package
    # --------------------------------------------------
    - name: Upload Image
      run: |
        mkdir -p artifacts
        cp out/arch/arm64/boot/Image artifacts/

    - uses: actions/upload-artifact@v4
      with:
        name: kona-kernel-KSUN-SUSFS
        path: artifacts/Image

name: Build LineageOS OPlus SM8250 Kernel with KSUN + SUSFS + Baseband

on:
  workflow_dispatch:

env:
  TZ: Asia/Kolkata

jobs:
  build:
    name: Build Kernel by ${{ github.actor }}
    runs-on: ubuntu-latest

    env:
      CLANG_VERSION: clang-r547379
      GCC_TAG: android-12.1.0_r27
      Lineage_VERSION: lineage-23.0

    steps:
    - uses: actions/checkout@v4

    - name: Set swap to 10G
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 10

    - name: Setup build environment
      run: |
        echo "BUILD_TIME=$(TZ=Asia/Kolkata date "+%y%m%d")" >> $GITHUB_ENV
        sudo apt update
        sudo apt install -y \
          git ccache automake flex lzop bison gperf build-essential zip curl \
          zlib1g-dev g++-multilib libssl-dev python3 bc libc6-dev-i386 \
          libncurses5-dev liblz4-tool

        mkdir -p kernel_workspace

    - name: Download Clang
      run: |
        cd kernel_workspace
        mkdir -p clang-aosp
        wget -O clang.tar.gz \
          https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/${CLANG_VERSION}.tar.gz
        tar -C clang-aosp -xf clang.tar.gz

    - name: Download GCC
      run: |
        cd kernel_workspace
        mkdir -p gcc-64
        wget -O gcc.tar.gz \
          https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9/+archive/refs/tags/${GCC_TAG}.tar.gz
        tar -C gcc-64 -xf gcc.tar.gz

    - name: Clone kernel source
      run: |
        cd kernel_workspace
        git clone --depth=1 \
          https://github.com/LineageOS/android_kernel_oneplus_sm8250 \
          -b ${{ env.Lineage_VERSION }} android-kernel

    # =========================
    # KernelSU-Next (LEGACY)
    # =========================
    - name: Setup KernelSU-Next (legacy)
      run: |
        cd kernel_workspace/android-kernel

        curl -LSs \
          https://raw.githubusercontent.com/tiann/KernelSU-Next/main/kernel/setup.sh \
          | bash -s legacy

        DEF=arch/arm64/configs/vendor/kona-perf_defconfig
        echo "CONFIG_KSU=y" >> $DEF
        echo "CONFIG_KSU_MANUAL_HOOK=y" >> $DEF

        KSU_VERSION=$(cd KernelSU-Next && expr $(git rev-list --count HEAD) + 30000)
        echo "KSUVER=$KSU_VERSION" >> $GITHUB_ENV

        sed -i 's/ -dirty//g' scripts/setlocalversion

    # =========================
    # Baseband Guard (KEPT)
    # =========================
    - name: Setup Baseband Guard
      run: |
        cd kernel_workspace/android-kernel

        curl -L https://github.com/vc-teahouse/Baseband-guard/raw/main/setup.sh | bash

        sed -i '/^config LSM$/,/^help$/{ /^[[:space:]]*default/ { /baseband_guard/! s/selinux/selinux,baseband_guard/ } }' security/Kconfig

        mkdir -p arch/arm64/configs/vendor
        echo "CONFIG_BBG=y" > arch/arm64/configs/vendor/baseband_guard.config

    # =========================
    # SUSFS (MANUAL PATCH CONTENT)
    # =========================
    - name: Integrate SUSFS (manual)
      run: |
        cd kernel_workspace/android-kernel

        git clone --depth=1 -b kernel-4.19 \
          https://gitlab.com/simonpunk/susfs4ksu.git susfs4ksu

        # fs/susfs
        mkdir -p fs/susfs
        cp -r susfs4ksu/kernel_patches/fs/susfs/* fs/susfs/

        # include/linux
        cp susfs4ksu/kernel_patches/include/linux/susfs.h include/linux/

        # KernelSU changes required by 10_enable_susfs_for_ksu.patch
        grep -q KSU_SUSFS KernelSU/kernel/Kconfig || cat <<EOF >> KernelSU/kernel/Kconfig

config KSU_SUSFS
    bool "Enable SUSFS support"
    depends on KSU
    default y
EOF

        # fs/Kconfig hook
        grep -q fs/susfs/Kconfig fs/Kconfig || \
          sed -i '/endmenu/i source "fs/susfs/Kconfig"' fs/Kconfig

        # fs/Makefile hook
        grep -q susfs fs/Makefile || \
          echo 'obj-$(CONFIG_SUSFS) += susfs/' >> fs/Makefile

        # Enable SUSFS configs
        DEF=arch/arm64/configs/vendor/kona-perf_defconfig
        echo "CONFIG_SUSFS=y" >> $DEF
        echo "CONFIG_SUSFS_PROC=y" >> $DEF
        echo "CONFIG_SUSFS_SYSFS=y" >> $DEF
        echo "CONFIG_SUSFS_MAGIC_MOUNT=y" >> $DEF
        echo "CONFIG_SUSFS_HIDE_KSU=y" >> $DEF
        echo "CONFIG_KSU_SUSFS=y" >> $DEF

    # =========================
    # Build kernel
    # =========================
    - name: Build kernel
      run: |
        cd kernel_workspace/android-kernel

        export ARCH=arm64
        export SUBARCH=arm64
        export PATH=$GITHUB_WORKSPACE/kernel_workspace/clang-aosp/bin:$GITHUB_WORKSPACE/kernel_workspace/gcc-64/bin:$PATH
        export KBUILD_BUILD_USER=${{ github.actor }}
        export KBUILD_BUILD_HOST=Github

        make O=out ARCH=arm64 CC=clang \
          vendor/kona-perf_defconfig \
          vendor/debugfs.config \
          vendor/oplus.config \
          vendor/baseband_guard.config

        make -j$(nproc) O=out ARCH=arm64 CC=clang \
          LLVM=1 LLVM_IAS=1 \
          CROSS_COMPILE=aarch64-linux-android-

    - name: Upload Image
      uses: actions/upload-artifact@v4
      with:
        name: Image
        path: kernel_workspace/android-kernel/out/arch/arm64/boot/Image

name: Build LineageOS OPlus SM8250 Kernel with KernelSU-Next + SUSFS

on:
  workflow_dispatch:

env:
  TZ: Asia/Kolkata

jobs:
  build:
    name: Build Kernel by ${{ github.actor }}
    runs-on: ubuntu-latest

    env:
      CLANG_VERSION: clang-r547379
      GCC_TAG: android-12.1.0_r27
      Lineage_VERSION: lineage-23.0

    steps:
    - uses: actions/checkout@v6

    - name: Set swap to 10G
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 10

    - name: Setup build environment
      run: |
        echo "BUILD_TIME=$(TZ=Asia/Kolkata date "+%y%m%d")" >> $GITHUB_ENV
        sudo apt-get update
        sudo apt-get install -y \
          git ccache automake flex lzop bison gperf build-essential \
          zip curl zlib1g-dev g++-multilib libssl-dev python3 bc \
          libc6-dev-i386 libncurses5-dev liblz4-tool

    - name: Prepare workspace
      run: |
        mkdir -p $GITHUB_WORKSPACE/kernel_workspace

    - name: Download Clang (AOSP)
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        wget -O clang.tar.gz \
          https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/${CLANG_VERSION}.tar.gz
        mkdir clang-aosp
        tar -C clang-aosp -zxvf clang.tar.gz

    - name: Download GCC (AOSP)
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        wget -O gcc.tar.gz \
          https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9/+archive/refs/tags/${GCC_TAG}.tar.gz
        mkdir gcc-64
        tar -C gcc-64 -zxvf gcc.tar.gz

    - name: Clone LineageOS kernel source
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        git clone --recursive \
          https://github.com/LineageOS/android_kernel_oneplus_sm8250 \
          -b ${{ env.Lineage_VERSION }} android-kernel --depth=1

    # ---------------- KernelSU-Next ----------------
    - name: Setup KernelSU-Next (legacy – DO NOT CHANGE PATH)
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
        curl -LSs https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh | bash -s legacy

        echo "CONFIG_KSU_MANUAL_HOOK=y" >> arch/arm64/configs/vendor/kona-perf_defconfig

        KSU_VERSION=$(cd KernelSU-Next && expr $(git rev-list --count HEAD) + 30000)
        echo "KSUVER=$KSU_VERSION" >> $GITHUB_ENV

        cd scripts
        sed -i 's/ -dirty//g' setlocalversion

    # ---------------- Baseband Guard ----------------
    - name: Setup Baseband Guard
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
        wget -O- https://github.com/vc-teahouse/Baseband-guard/raw/main/setup.sh | bash
        sed -i '/^config LSM$/,/^help$/{/default/ s/selinux/selinux,baseband_guard/}' security/Kconfig
        echo "CONFIG_BBG=y" >> arch/arm64/configs/vendor/kona-perf_defconfig

    # ---------------- SUSFS ----------------
    - name: Apply SUSFS (kernel-4.19)
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
        git clone --depth=1 -b kernel-4.19 https://gitlab.com/simonpunk/susfs4ksu.git susfs

        echo "[SUSFS] Copying sources"
        cp -r susfs/kernel/fs/susfs fs/
        cp -r susfs/kernel/security/susfs security/
        cp -r susfs/kernel/include/linux/susfs.h include/linux/

        echo "[SUSFS] Kconfig hooks"
        grep -q 'fs/susfs/Kconfig' fs/Kconfig || \
          sed -i '/endmenu/i source "fs/susfs/Kconfig"' fs/Kconfig

        grep -q 'security/susfs/Kconfig' security/Kconfig || \
          echo 'source "security/susfs/Kconfig"' >> security/Kconfig

        echo "[SUSFS] Makefile hooks"
        grep -q susfs fs/Makefile || echo 'obj-$(CONFIG_SUSFS) += susfs/' >> fs/Makefile
        grep -q susfs security/Makefile || echo 'obj-$(CONFIG_SUSFS) += susfs/' >> security/Makefile

        echo "[SUSFS] Enable configs"
        echo "CONFIG_SUSFS=y" >> arch/arm64/configs/vendor/kona-perf_defconfig
        echo "CONFIG_SUSFS_PROC=y" >> arch/arm64/configs/vendor/kona-perf_defconfig
        echo "CONFIG_SUSFS_SYSFS=y" >> arch/arm64/configs/vendor/kona-perf_defconfig
        echo "CONFIG_SUSFS_MAGIC_MOUNT=y" >> arch/arm64/configs/vendor/kona-perf_defconfig
        echo "CONFIG_SUSFS_HIDE_KSU=y" >> arch/arm64/configs/vendor/kona-perf_defconfig

    # ---------------- Build ----------------
    - name: Build kernel
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
        export ARCH=arm64
        export SUBARCH=arm64
        export PATH=$GITHUB_WORKSPACE/kernel_workspace/clang-aosp/bin:$GITHUB_WORKSPACE/kernel_workspace/gcc-64/bin:$PATH
        export KBUILD_BUILD_HOST=Github-Actions
        export KBUILD_BUILD_USER=$(echo ${{ github.actor }} | tr A-Z a-z)

        make O=out vendor/kona-perf_defconfig vendor/debugfs.config vendor/oplus.config
        make -j$(nproc) O=out

    # ---------------- Output ----------------
    - name: Verify Image
      run: |
        test -f kernel_workspace/android-kernel/out/arch/arm64/boot/Image

    - name: Prepare AnyKernel3
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        git clone https://github.com/osm0sis/AnyKernel3 --depth=1 AnyKernel3
        sed -i 's/do.devicecheck=1/do.devicecheck=0/g' AnyKernel3/anykernel.sh
        sed -i 's/IS_SLOT_DEVICE=0;/IS_SLOT_DEVICE=auto;/g' AnyKernel3/anykernel.sh
        cp android-kernel/out/arch/arm64/boot/Image AnyKernel3/
        rm -rf AnyKernel3/.git*

    - name: Upload Image
      uses: actions/upload-artifact@v6
      with:
        name: Image
        path: kernel_workspace/android-kernel/out/arch/arm64/boot/Image

    - name: Upload AnyKernel3
      uses: actions/upload-artifact@v6
      with:
        name: AK3-${{ env.Lineage_VERSION }}-SM8250-KSU_${{ env.KSUVER }}-${{ env.BUILD_TIME }}
        path: kernel_workspace/AnyKernel3/*

name: Build LineageOS OPlus SM8250 Kernel with KSUN + BasebandGuard + SUSFS

on:
  workflow_dispatch:

env:
  TZ: Asia/Kolkata

jobs:
  build:
    name: Build Kernel by ${{ github.actor }}
    runs-on: ubuntu-latest

    env:
      CLANG_VERSION: clang-r547379
      GCC_TAG: android-12.1.0_r27
      Lineage_VERSION: lineage-23.0

    steps:
    # --------------------------------------------------
    # Checkout workflow repo
    # --------------------------------------------------
    - uses: actions/checkout@v4

    # --------------------------------------------------
    # Swap
    # --------------------------------------------------
    - name: Set swap to 10G
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 10

    # --------------------------------------------------
    # Dependencies
    # --------------------------------------------------
    - name: Setup build environment
      run: |
        echo "BUILD_TIME=$(TZ=Asia/Kolkata date "+%y%m%d")" >> $GITHUB_ENV
        sudo apt-get update
        sudo apt-get install -y \
          git ccache automake flex lzop bison gperf build-essential \
          zip curl zlib1g-dev g++-multilib bzip2 libbz2-dev \
          liblz4-tool make squashfs-tools dpkg-dev libssl-dev \
          python3 bc libc6-dev-i386 libncurses5-dev
        mkdir -p $GITHUB_WORKSPACE/kernel_workspace

    # --------------------------------------------------
    # Toolchains
    # --------------------------------------------------
    - name: Cache Clang
      uses: actions/cache@v4
      with:
        path: kernel_workspace/clang-aosp
        key: ${{ env.CLANG_VERSION }}

    - name: Download Clang
      run: |
        cd kernel_workspace
        mkdir -p clang-aosp
        wget -O clang.tar.gz \
          https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/${CLANG_VERSION}.tar.gz
        tar -C clang-aosp -xf clang.tar.gz

    - name: Cache GCC
      uses: actions/cache@v4
      with:
        path: kernel_workspace/gcc-64
        key: gcc-${{ env.GCC_TAG }}

    - name: Download GCC
      run: |
        cd kernel_workspace
        mkdir -p gcc-64
        wget -O gcc.tar.gz \
          https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9/+archive/refs/tags/${GCC_TAG}.tar.gz
        tar -C gcc-64 -xf gcc.tar.gz

    # --------------------------------------------------
    # Kernel source
    # --------------------------------------------------
    - name: Clone kernel source
      run: |
        cd kernel_workspace
        git clone --depth=1 -b ${{ env.Lineage_VERSION }} \
          https://github.com/LineageOS/android_kernel_oneplus_sm8250 \
          android-kernel

    # --------------------------------------------------
    # KernelSU-Next (LEGACY MODE)
    # --------------------------------------------------
    - name: Setup KernelSU-Next (legacy)
      run: |
        cd kernel_workspace/android-kernel
        curl -LSs \
          https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/main/kernel/setup.sh \
          | bash -s legacy

        echo "CONFIG_KSU_MANUAL_HOOK=y" >> arch/arm64/configs/vendor/kona-perf_defconfig

        KSU_VERSION=$(cd KernelSU-Next && expr $(git rev-list --count HEAD) + 30000)
        echo "KSUVER=$KSU_VERSION" >> $GITHUB_ENV

        sed -i 's/ -dirty//g' scripts/setlocalversion

    # --------------------------------------------------
    # Baseband Guard (UNCHANGED)
    # --------------------------------------------------
    - name: Setup Baseband Guard
      run: |
        cd kernel_workspace/android-kernel
        curl -LSs \
          https://github.com/vc-teahouse/Baseband-guard/raw/main/setup.sh | bash

        sed -i '/^config LSM$/,/^help$/{ /^[[:space:]]*default/ { /baseband_guard/! s/selinux/selinux,baseband_guard/ } }' security/Kconfig

        echo "CONFIG_BBG=y" >> arch/arm64/configs/vendor/baseband_guard.config

    # --------------------------------------------------
    # SUSFS (manual patch reproduction ONLY)
    # --------------------------------------------------
    - name: Integrate SUSFS
      run: |
        set -e
        cd kernel_workspace/android-kernel

        git clone --depth=1 -b kernel-4.19 \
          https://gitlab.com/simonpunk/susfs4ksu.git susfs

        # Files added by 50_add_susfs_in_kernel-4.19.patch
        cp susfs/susfs.c fs/susfs.c
        cp susfs/include/linux/susfs.h include/linux/
        cp susfs/include/linux/susfs_def.h include/linux/

        # Makefile hook from patch
        grep -q 'CONFIG_KSU_SUSFS' fs/Makefile || \
          echo 'obj-$(CONFIG_KSU_SUSFS) += susfs.o' >> fs/Makefile

        # Enable existing KernelSU SUSFS configs
        DEF=arch/arm64/configs/vendor/kona-perf_defconfig
        echo "CONFIG_KSU_SUSFS=y" >> $DEF
        echo "CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y" >> $DEF
        echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> $DEF
        echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y" >> $DEF

    # --------------------------------------------------
    # Kernel config
    # --------------------------------------------------
    - name: Make defconfig
      run: |
        cd kernel_workspace/android-kernel
        make O=out ARCH=arm64 \
          vendor/kona-perf_defconfig \
          vendor/debugfs.config \
          vendor/oplus.config \
          vendor/baseband_guard.config

    # --------------------------------------------------
    # Build kernel
    # --------------------------------------------------
    - name: Build kernel
      run: |
        cd kernel_workspace/android-kernel
        export PATH=$GITHUB_WORKSPACE/kernel_workspace/clang-aosp/bin:$GITHUB_WORKSPACE/kernel_workspace/gcc-64/bin:$PATH
        make -j$(nproc) O=out ARCH=arm64 \
          CC=clang LD=ld.lld LLVM=1 LLVM_IAS=1

    # --------------------------------------------------
    # Artifacts
    # --------------------------------------------------
    - name: Upload Image
      uses: actions/upload-artifact@v4
      with:
        name: Image
        path: kernel_workspace/android-kernel/out/arch/arm64/boot/Image

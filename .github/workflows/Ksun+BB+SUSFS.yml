name: Kernel Build with KSUN + Baseband Guard + SUSFS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      ARCH: arm64
      SUBARCH: arm64
      KBUILD_BUILD_USER: github
      KBUILD_BUILD_HOST: actions
      CCACHE_COMPRESS: 1
      CCACHE_SIZE: 10G
      USE_CCACHE: 1

      DEVICE: kona
      DEFCONFIG: vendor/kona-perf_defconfig
      EXTRA_CONFIGS: vendor/debugfs.config vendor/oplus.config vendor/baseband_guard.config

      CLANG_PATH: ${{ github.workspace }}/clang
      CLANG_BIN: ${{ github.workspace }}/clang/bin
      PATH: ${{ github.workspace }}/clang/bin:${{ github.workspace }}/gcc/bin:${{ github.workspace }}/gcc64/bin:/usr/lib/ccache:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

      TZ: Asia/Kolkata

    steps:
      - name: Checkout kernel source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc bison build-essential ccache curl flex g++-multilib gcc-multilib \
            git gnupg gperf imagemagick lib32ncurses5-dev lib32readline-dev \
            lib32z1-dev libelf-dev liblz4-tool libncurses5-dev libsdl1.2-dev \
            libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool \
            squashfs-tools xsltproc zip zlib1g-dev python3

      - name: Setup ccache
        run: |
          mkdir -p ~/.ccache
          ccache -M 10G
          ccache -z

      - name: Download Clang
        run: |
          git clone --depth=1 https://github.com/kdrag0n/proton-clang clang

      - name: Download GCC toolchains
        run: |
          git clone --depth=1 https://github.com/mvaisakh/gcc-arm64 gcc64
          git clone --depth=1 https://github.com/mvaisakh/gcc-arm gcc

      # ---------------- KernelSU-Next (LEGACY) ----------------
      - name: KernelSU-Next legacy setup
        run: |
          curl -LSs https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/main/kernel/setup.sh \
            | bash -s legacy

          DEF=arch/arm64/configs/vendor/kona-perf_defconfig
          echo "CONFIG_KSU=y" >> $DEF
          echo "CONFIG_KSU_MANUAL_HOOK=y" >> $DEF

          KSU_VERSION=$(cd KernelSU-Next && expr $(git rev-list --count HEAD) + 30000)
          echo "KSUVER=$KSU_VERSION" >> $GITHUB_ENV

          sed -i 's/ -dirty//g' scripts/setlocalversion

      # ---------------- Baseband Guard (UNCHANGED) ----------------
      - name: Baseband Guard setup
        run: |
          curl -L https://github.com/vc-teahouse/Baseband-guard/raw/main/setup.sh | bash

          mkdir -p arch/arm64/configs/vendor
          cat <<EOF > arch/arm64/configs/vendor/baseband_guard.config
          CONFIG_BBG=y
          EOF

          if ! grep -q baseband_guard security/Kconfig; then
            sed -i 's/default "\(.*\)"/default "\1,baseband_guard"/' security/Kconfig
          fi

      # ---------------- SUSFS (MANUAL PATCH CONTENT) ----------------
      - name: SUSFS integration (manual, patch-equivalent)
        run: |
          git clone --depth=1 -b kernel-4.19 https://gitlab.com/simonpunk/susfs4ksu.git susfs4ksu

          echo "[SUSFS] Copy sources"
          cp susfs4ksu/kernel_patches/fs/susfs.c fs/susfs.c
          cp susfs4ksu/kernel_patches/include/linux/susfs.h include/linux/
          cp susfs4ksu/kernel_patches/include/linux/susfs_def.h include/linux/

          echo "[SUSFS] Makefile hook"
          grep -q CONFIG_KSU_SUSFS fs/Makefile || \
            echo 'obj-$(CONFIG_KSU_SUSFS) += susfs.o' >> fs/Makefile

          echo "[SUSFS] Enable configs"
          DEF=arch/arm64/configs/vendor/kona-perf_defconfig
          echo "CONFIG_KSU_SUSFS=y" >> $DEF
          echo "CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y" >> $DEF
          echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> $DEF
          echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y" >> $DEF

      - name: Kernel defconfig
        run: |
          make O=out ARCH=arm64 \
            ${DEFCONFIG} \
            vendor/debugfs.config \
            vendor/oplus.config \
            vendor/baseband_guard.config

      - name: Verify configs
        run: |
          grep CONFIG_BBG out/.config
          grep CONFIG_KSU_SUSFS out/.config

      - name: Build kernel
        run: |
          make -j$(nproc) O=out \
            ARCH=arm64 \
            CC=clang \
            LD=ld.lld \
            AR=llvm-ar \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi-

      - name: Package Image
        run: |
          mkdir -p artifacts
          cp out/arch/arm64/boot/Image artifacts/

      - name: Upload kernel Image
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-Image
          path: artifacts/Image

name: Build LineageOS OPlus SM8250 Kernel-Test

on:
  workflow_dispatch:

env:
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git bc bison flex libssl-dev make \
          libc6-dev libncurses5-dev ccache \
          python3 jq curl

    - name: Download Clang
      run: |
        mkdir -p toolchain
        cd toolchain
        wget -qO clang.tar.gz https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r547379.tar.gz
        mkdir clang && tar -xf clang.tar.gz -C clang

    - name: Clone kernel
      run: |
        git clone --depth=1 -b lineage-23.0 \
          https://github.com/LineageOS/android_kernel_oneplus_sm8250 \
          kernel

    - name: Setup KernelSU-Next + Baseband-guard
      run: |
        cd kernel
        curl -LSs https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh | bash -s stable
        curl -LSs https://github.com/vc-teahouse/Baseband-guard/raw/main/setup.sh | bash

    - name: Build kernel (FIXED Baseband-guard integration)
      run: |
        cd kernel

        export ARCH=arm64
        export SUBARCH=arm64
        export PATH=$PWD/../toolchain/clang/bin:$PATH
        export CC=clang
        export LLVM=1
        export LLVM_IAS=1

        # 1️⃣ Apply defconfig + fragments
        make O=out vendor/kona_defconfig \
          vendor/debugfs.config \
          vendor/oplus.config

        # 2️⃣ Enforce Baseband-guard properly (AFTER fragments)
        ./scripts/config --file out/.config \
          -e CONFIG_BBG \
          --set-str CONFIG_LSM "lockdown,yama,loadpin,safesetid,integrity,selinux,smack,tomoyo,apparmor,bpf,baseband_guard"

        # 3️⃣ Sync config
        make O=out olddefconfig

        # 4️⃣ Build
        make -j$(nproc) O=out

    - name: Verify Image
      run: |
        test -f kernel/out/arch/arm64/boot/Image

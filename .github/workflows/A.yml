name: ABBC Test Build LineageOS OPlus SM8250 Kernel with KSUN BB susfs

on:
  workflow_dispatch:

env:
  TZ: Asia/Kolkata

jobs:
  build:
    name: Build Kernel by ${{ github.actor }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ks: [rsuntk, backslashxx, next]


    env:
      CLANG_VERSION: clang-r547379
      Lineage_VERSION: lineage-23.2

    steps:
    - uses: actions/checkout@v4

    - name: Set swap to 10G
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 10

    - name: Setup build environment
      run: |
        echo "BUILD_TIME=$(TZ=Asia/Kolkata date "+%y%m%d")" >> $GITHUB_ENV
        echo "BUILD_TIME_1=$(TZ=Asia/Kolkata date "+%Y-%m-%d")" >> $GITHUB_ENV
        #echo "BUILD_TIME=$(TZ=Asia/Shanghai date "+%y%m%d")" >> $GITHUB_ENV
        #echo "BUILD_TIME_1=$(TZ=Asia/Shanghai date "+%Y-%m-%d")" >> $GITHUB_ENV
        sudo apt-get update
        sudo apt-get install -y git ccache automake flex lzop bison gperf build-essential zip curl zlib1g-dev g++-multilib bzip2 libbz2-dev liblz4-tool make squashfs-tools dpkg-dev libssl-dev python3 bc libc6-dev-i386 libncurses5-dev
        mkdir -p $GITHUB_WORKSPACE/kernel_workspace

    - name: Cache Clang toolchain
      id: cache-clang
      uses: actions/cache@v5
      with:
        path: ${{ github.workspace }}/kernel_workspace/clang-aosp
        key: ${{ env.CLANG_VERSION }}

    - name: Download & extract Clang-aosp (if cache miss)
      if: steps.cache-clang.outputs.cache-hit != 'true'
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        mkdir -p clang-aosp
        wget -O ${CLANG_VERSION}.tar.gz \
          https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/${CLANG_VERSION}.tar.gz
        tar -C clang-aosp -zxvf ${CLANG_VERSION}.tar.gz

    - name: Download kernel source
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        git clone --recursive https://github.com/LineageOS/android_kernel_oneplus_sm8250 \
          -b ${{ env.Lineage_VERSION }} android-kernel --depth=1

    - name: Setup KSUN + BB
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
        curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s legacy
        wget -O- https://github.com/vc-teahouse/Baseband-guard/raw/main/setup.sh | bash
        sed -i '/^config LSM$/,/^help$/{ /^[[:space:]]*default/ { /baseband_guard/! s/selinux/selinux,baseband_guard/ } }' security/Kconfig
        bash $GITHUB_WORKSPACE/patches/kernel-4.19_5.4-patch.sh
        #bash $GITHUB_WORKSPACE/patches/syacall_hook.sh
        #bash $GITHUB_WORKSPACE/patches/sus_inline.sh

    - name: Apply SUSFS patch
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
        set +e
        git apply --reject --whitespace=fix $GITHUB_WORKSPACE/patches/sus2.patch || true

        bash $GITHUB_WORKSPACE/patches/fix2.sh
        
        echo "Exit code: $?"
        find . -name "*.rej"
        set -e

    - name: Verify SUSFS Integration
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
        
        echo "=========================================="
        echo "🔍 Verifying SUSFS Integration"
        echo "=========================================="
        echo ""
        
        VERIFICATION_FAILED=0
        
        # Check 1: Verify susfs.c exists
        echo "1️⃣  Checking if susfs.c exists..."
        if [ -f "fs/susfs.c" ]; then
          echo "   ✅ fs/susfs.c found"
        else
          echo "   ❌ fs/susfs.c NOT found"
          VERIFICATION_FAILED=1
        fi
        
        # Check 2: Verify susfs.h exists
        echo "2️⃣  Checking if susfs.h exists..."
        if [ -f "include/linux/susfs.h" ]; then
          echo "   ✅ include/linux/susfs.h found"
        else
          echo "   ❌ include/linux/susfs.h NOT found"
          VERIFICATION_FAILED=1
        fi
        
        # Check 3: Verify susfs_def.h exists
        echo "3️⃣  Checking if susfs_def.h exists..."
        if [ -f "include/linux/susfs_def.h" ]; then
          echo "   ✅ include/linux/susfs_def.h found"
        else
          echo "   ❌ include/linux/susfs_def.h NOT found"
          VERIFICATION_FAILED=1
        fi
        
        # Check 4: Verify fs/Makefile has susfs.o
        echo "4️⃣  Checking fs/Makefile for susfs.o..."
        if grep -q "obj-\$(CONFIG_KSU_SUSFS) += susfs.o" fs/Makefile; then
          echo "   ✅ susfs.o entry found in fs/Makefile"
        else
          echo "   ❌ susfs.o entry NOT found in fs/Makefile"
          VERIFICATION_FAILED=1
        fi
        
        # Check 5: Verify namespace.c has SUSFS includes
        echo "5️⃣  Checking fs/namespace.c for SUSFS includes..."
        if grep -q "CONFIG_KSU_SUSFS_SUS_MOUNT" fs/namespace.c && \
           grep -q "#include <linux/susfs_def.h>" fs/namespace.c; then
          echo "   ✅ SUSFS includes found in fs/namespace.c"
        else
          echo "   ❌ SUSFS includes NOT found in fs/namespace.c"
          VERIFICATION_FAILED=1
        fi
        
        # Check 6: Verify namespace.c has SUSFS declarations
        echo "6️⃣  Checking fs/namespace.c for SUSFS declarations..."
        if grep -q "extern bool susfs_is_current_ksu_domain" fs/namespace.c && \
           grep -q "static atomic64_t susfs_ksu_mounts" fs/namespace.c; then
          echo "   ✅ SUSFS declarations found in fs/namespace.c"
        else
          echo "   ❌ SUSFS declarations NOT found in fs/namespace.c"
          VERIFICATION_FAILED=1
        fi
        
        # Check 7: Verify task_mmu.c has SUSFS code
        echo "7️⃣  Checking fs/proc/task_mmu.c for SUSFS code..."
        if grep -q "CONFIG_KSU_SUSFS_SUS_MAP" fs/proc/task_mmu.c && \
           grep -q "BIT_SUS_MAPS" fs/proc/task_mmu.c; then
          echo "   ✅ SUSFS mapping code found in fs/proc/task_mmu.c"
        else
          echo "   ❌ SUSFS mapping code NOT found in fs/proc/task_mmu.c"
          VERIFICATION_FAILED=1
        fi
        
        # Check 8: Verify mount.h has ksu_mnt field
        echo "8️⃣  Checking include/linux/mount.h for ksu_mnt field..."
        if [ -f include/linux/mount.h ]; then
          if grep -q "unsigned long ksu_mnt;" include/linux/mount.h; then
            echo "   ✅ ksu_mnt field found in include/linux/mount.h"
          else
            echo "   ❌ ksu_mnt field NOT found in include/linux/mount.h"
            VERIFICATION_FAILED=1
          fi
        else
          echo "   ⚠️  include/linux/mount.h does not exist (may be expected)"
        fi
        
        # Check 9: Verify namei.c has SUSFS modifications
        echo "9️⃣  Checking fs/namei.c for SUSFS modifications..."
        if grep -q "CONFIG_KSU_SUSFS_SUS_PATH" fs/namei.c; then
          echo "   ✅ SUSFS modifications found in fs/namei.c"
        else
          echo "   ❌ SUSFS modifications NOT found in fs/namei.c"
          VERIFICATION_FAILED=1
        fi
        
        # Check 10: Verify no reject files remain
        echo "🔟  Checking for remaining .rej files..."
        REJ_COUNT=$(find . -name "*.rej" -type f | wc -l)
        if [ "$REJ_COUNT" -eq 0 ]; then
          echo "   ✅ No .rej files found"
        else
          echo "   ❌ Found $REJ_COUNT .rej file(s):"
          find . -name "*.rej" -type f
          VERIFICATION_FAILED=1
        fi
        
        # Check 11: Verify defconfig has SUSFS (if already added)
        echo "1️⃣1️⃣  Checking if CONFIG_KSU_SUSFS is in defconfig..."
        if [ -f "arch/arm64/configs/vendor/kona-perf_defconfig" ]; then
          if grep -q "CONFIG_KSU_SUSFS" arch/arm64/configs/vendor/kona-perf_defconfig; then
            echo "   ✅ CONFIG_KSU_SUSFS found in defconfig"
          else
            echo "   ⚠️  CONFIG_KSU_SUSFS not yet in defconfig (will be added in next step)"
          fi
        fi
        
        echo ""
        echo "=========================================="
        if [ $VERIFICATION_FAILED -eq 0 ]; then
          echo "✅ SUSFS INTEGRATION VERIFIED!"
          echo "=========================================="
          echo ""
          echo "All SUSFS components are properly integrated."
          echo "The kernel is ready for compilation."
        else
          echo "❌ SUSFS INTEGRATION FAILED!"
          echo "=========================================="
          echo ""
          echo "Some SUSFS components are missing or incorrectly integrated."
          echo "Please check the errors above and fix them before building."
          exit 1
        fi

    - name: Upload reject files
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: patch-reject-files
        path: kernel_workspace/android-kernel/**/*.rej

    - name: Enable SUSFS configs
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
        cat <<EOF >> arch/arm64/configs/vendor/kona-perf_defconfig
           CONFIG_KSU_MANUAL_HOOK=y
           CONFIG_KSU_SUSFS=y
           CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y
           CONFIG_KSU_SUSFS_SUS_PATH=y
           CONFIG_KSU_SUSFS_SUS_MOUNT=y
           CONFIG_KSU_SUSFS_SUS_KSTAT=y
           CONFIG_KSU_SUSFS_SUS_OVERLAYFS=y
           CONFIG_KSU_SUSFS_TRY_UMOUNT=y
           CONFIG_KSU_SUSFS_SPOOF_UNAME=y
           CONFIG_KSU_SUSFS_OPEN_REDIRECT=y
           CONFIG_KSU_SUSFS_ENABLE_LOG=y
           CONFIG_KSU_SUSFS_SUS_SU=y
        EOF
        echo "[✓] SUSFS configs enabled"

    
    - name: Build kernel
      run: |
        cd kernel_workspace/android-kernel
        export ARCH=arm64
        export SUBARCH=arm64
        export BRAND_SHOW_FLAG=oneplus
        export PATH=$GITHUB_WORKSPACE/kernel_workspace/clang-aosp/bin:$PATH
        export KBUILD_BUILD_HOST=Github-Action
        export KBUILD_BUILD_USER=$(echo ${{ github.actor }} | tr A-Z a-z)

        BA_CMD="CLANG_TRIPLE=aarch64-linux-gnu-"
        EX_CMD="LD=ld.lld LLVM=1"
        DEFCONFIG="vendor/kona-perf_defconfig vendor/oplus.config"

        make O=out CC=clang $BA_CMD $EX_CMD $DEFCONFIG
        make -j$(nproc --all) O=out CC=clang $BA_CMD $EX_CMD   

        

    - name: Check kernel output
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel/out
        if [ -f arch/arm64/boot/Image ]; then
          echo "CHECK_IMAGE=true" >> $GITHUB_ENV
        else
          echo "Kernel build failed"
          exit 1
        fi

    - name: Upload Image
      if: ${{ env.CHECK_IMAGE == 'true' }}
      uses: actions/upload-artifact@v4
      with:
        name: Image
        path: kernel_workspace/android-kernel/out/arch/arm64/boot/Image

    - name: Upload AnyKernel3 ZIP
      uses: actions/upload-artifact@v6
      with:
        name: AK3-${{ matrix.ks }}
        path: ${{ github.workspace }}/kernel_workspace/AnyKernel3/AK3-${{ env.Lineage_VERSION }}-OPlus-SM8250-${{ matrix.ks }}_KSU_*.zip

    - name: Save build info
      run: |
        cd kernel_workspace
        if [ "${{ matrix.ks }}" = "rsuntk" ]; then
          {
            echo "RSKSUVER=${{ env.RSKSUVER }}"
            echo "KERNEL_VERSION=${{ env.KERNEL_VERSION }}"
            echo "BUILD_TIME_1=${{ env.BUILD_TIME_1 }}"
          } > build-info-${{ matrix.ks }}.txt
        else
          {
            echo "XXKSUVER=${{ env.XXKSUVER }}"
          } > build-info-${{ matrix.ks }}.txt
        fi

    - name: Upload build info
      uses: actions/upload-artifact@v6
      with:
        name: INFO-${{ matrix.ks }}
        path: kernel_workspace/build-info-${{ matrix.ks }}.txt

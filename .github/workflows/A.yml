name: A Toasted Build LineageOS OPlus SM8250 Kernel with KSUN + SUSFS

on:
  workflow_dispatch:

env:
  TZ: Asia/Kolkata

jobs:
  build:
    name: Build Kernel by ${{ github.actor }}
    runs-on: ubuntu-latest

    env:
      CLANG_VERSION: clang-r547379
      GCC_TAG: android-12.1.0_r27
      Lineage_VERSION: lineage-23.2

    steps:
    - uses: actions/checkout@v4

    # ------------------------------------------------------------
    # Swap
    # ------------------------------------------------------------

    - name: Set swap to 10G
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 10

    # ------------------------------------------------------------
    # Setup environment
    # ------------------------------------------------------------

    - name: Setup build kernel environment
      run: |
        echo "BUILD_TIME=$(TZ=Asia/Kolkata date "+%y%m%d")" >> $GITHUB_ENV
        echo "BUILD_TIME_1=$(TZ=Asia/Kolkata date "+%Y-%m-%d")" >> $GITHUB_ENV

        sudo apt-get update
        sudo apt-get install -y git ccache automake flex lzop bison gperf build-essential zip curl \
        zlib1g-dev g++-multilib bzip2 libbz2-dev liblz4-tool make squashfs-tools \
        dpkg-dev libssl-dev python3 bc libc6-dev-i386 libncurses5-dev

        mkdir -p $GITHUB_WORKSPACE/kernel_workspace

    # ------------------------------------------------------------
    # Cache Clang
    # ------------------------------------------------------------

    - name: Cache Clang toolchain
      id: cache-clang
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/kernel_workspace/clang-aosp
        key: ${{ env.CLANG_VERSION }}

    - name: Download & extract Clang
      if: steps.cache-clang.outputs.cache-hit != 'true'
      run: |
        cd kernel_workspace
        mkdir -p clang-aosp
        wget -O clang.tar.gz \
        https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/${CLANG_VERSION}.tar.gz
        tar -C clang-aosp -zxvf clang.tar.gz

    # ------------------------------------------------------------
    # Cache GCC
    # ------------------------------------------------------------

    - name: Cache GCC toolchain
      id: cache-gcc
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/kernel_workspace/gcc-64
        key: gcc-aarch64-${{ env.GCC_TAG }}

    - name: Download & extract GCC
      if: steps.cache-gcc.outputs.cache-hit != 'true'
      run: |
        cd kernel_workspace
        mkdir -p gcc-64
        wget -O gcc.tar.gz \
        https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9/+archive/refs/tags/${GCC_TAG}.tar.gz
        tar -C gcc-64 -zxvf gcc.tar.gz

    # ------------------------------------------------------------
    # Clone Kernel
    # ------------------------------------------------------------

    - name: Download kernel source
      run: |
        cd kernel_workspace
        git clone --recursive \
        https://github.com/LineageOS/android_kernel_oneplus_sm8250 \
        -b ${{ env.Lineage_VERSION }} android-kernel

    # ------------------------------------------------------------
    # Setup KSUN + Baseband Guard
    # ------------------------------------------------------------

    - name: Set up KSUN
      run: |
        cd kernel_workspace/android-kernel

        curl -LSs \
        "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" \
        | bash -s legacy

        wget -O- https://github.com/vc-teahouse/Baseband-guard/raw/main/setup.sh | bash

        sed -i '/^config LSM$/,/^help$/{ /^[[:space:]]*default/ { /baseband_guard/! s/selinux/selinux,baseband_guard/ } }' security/Kconfig

        bash $GITHUB_WORKSPACE/patches/kernel-4.19_5.4-patch.sh

        KSU_VERSION=$(cd KernelSU-Next && expr $(git rev-list --count HEAD) + 30000)
        echo "KSUVER=$KSU_VERSION" >> $GITHUB_ENV

        cd scripts
        sed -i 's/ -dirty//g' setlocalversion

    # ------------------------------------------------------------
    # Apply SUSFS Patch (Reject-safe)
    # ------------------------------------------------------------

    - name: Apply SUSFS Patch
      run: |
        cd kernel_workspace/android-kernel

        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"

        PATCH_FILE="$GITHUB_WORKSPACE/patches/sus2.0.patch"

        if [ ! -f "$PATCH_FILE" ]; then
          echo "SUSFS patch not found!"
          exit 1
        fi

        PATCH_FAILED=0

        if git am --3way "$PATCH_FILE"; then
          echo "Applied via git am"
        else
          git am --abort || true
          if git apply --reject --whitespace=fix "$PATCH_FILE"; then
            git add .
            git commit -m "Apply SUSFS patch (manual)"
          else
            PATCH_FAILED=1
          fi
        fi

        mkdir -p $GITHUB_WORKSPACE/reject_artifacts

        while IFS= read -r file; do
          cp --parents "$file" $GITHUB_WORKSPACE/reject_artifacts
          ORIGINAL="${file%.rej}"
          [ -f "$ORIGINAL" ] && cp --parents "$ORIGINAL" $GITHUB_WORKSPACE/reject_artifacts
        done < <(find . -name "*.rej")

        find . -name "*.orig" -exec cp --parents {} $GITHUB_WORKSPACE/reject_artifacts \;

        if [ -d "$GITHUB_WORKSPACE/reject_artifacts" ] && [ "$(ls -A $GITHUB_WORKSPACE/reject_artifacts)" ]; then
          cd $GITHUB_WORKSPACE
          tar -czf susfs_patch_rejects.tar.gz reject_artifacts
        fi

        if [ "$PATCH_FAILED" -eq 1 ]; then
          echo "Patch failed"
          exit 1
        fi

    - name: Upload SUSFS Reject Files
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: SUSFS-Patch-Rejects
        path: susfs_patch_rejects.tar.gz
        if-no-files-found: ignore

    # ------------------------------------------------------------
    # Enable KSU + SUSFS
    # ------------------------------------------------------------

    - name: Enable KSU + SUSFS
      run: |
        cd kernel_workspace/android-kernel
        DEF=arch/arm64/configs/vendor/kona-perf_defconfig

        sed -i '/CONFIG_KSU/d' $DEF
        sed -i '/CONFIG_KSU_MANUAL_HOOK/d' $DEF
        sed -i '/CONFIG_KSU_SUSFS/d' $DEF

        echo "CONFIG_KSU=y" >> $DEF
        echo "CONFIG_KSU_MANUAL_HOOK=y" >> $DEF
        echo "CONFIG_KSU_SUSFS=y" >> $DEF

    # ------------------------------------------------------------
    # Build Kernel
    # ------------------------------------------------------------

    - name: Build kernel
      run: |
        cd kernel_workspace/android-kernel

        export ARCH=arm64
        export PATH=$GITHUB_WORKSPACE/kernel_workspace/clang-aosp/bin:$GITHUB_WORKSPACE/kernel_workspace/gcc-64/bin:$PATH

        make O=out ARCH=arm64 CC=clang \
        CLANG_TRIPLE=aarch64-linux-gnu- \
        CROSS_COMPILE=aarch64-linux-android- \
        LD=ld.lld LLVM=1 LLVM_IAS=1 \
        vendor/kona-perf_defconfig vendor/debugfs.config vendor/oplus.config

        make -j$(nproc --all) O=out ARCH=arm64 CC=clang \
        CLANG_TRIPLE=aarch64-linux-gnu- \
        CROSS_COMPILE=aarch64-linux-android- \
        LD=ld.lld LLVM=1 LLVM_IAS=1

    # ------------------------------------------------------------
    # Package AnyKernel3
    # ------------------------------------------------------------

    - name: Make AnyKernel3
      run: |
        cd kernel_workspace
        git clone https://github.com/osm0sis/AnyKernel3 --depth=1

        cp android-kernel/out/arch/arm64/boot/Image AnyKernel3/

        cd AnyKernel3
        zip -r $GITHUB_WORKSPACE/AK3-${{ env.Lineage_VERSION }}-SM8250-KSU-SUSFS_${{ env.KSUVER }}-${{ env.BUILD_TIME }}.zip ./*

    # ------------------------------------------------------------
    # Upload Build Artifacts
    # ------------------------------------------------------------

    - name: Upload Image
      uses: actions/upload-artifact@v4
      with:
        name: Image
        path: kernel_workspace/android-kernel/out/arch/arm64/boot/Image

    - name: Upload AnyKernel3
      uses: actions/upload-artifact@v4
      with:
        name: AK3-${{ env.Lineage_VERSION }}-SM8250-KSU-SUSFS_${{ env.KSUVER }}-${{ env.BUILD_TIME }}
        path: AK3-${{ env.Lineage_VERSION }}-SM8250-KSU-SUSFS_${{ env.KSUVER }}-${{ env.BUILD_TIME }}.zip

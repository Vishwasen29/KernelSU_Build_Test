name: Build LineageOS OPlus SM8250 KSU

on:
  workflow_dispatch:

env:
  TZ: Asia/Kolkata

jobs:
  build:
    name: Build Kernel by ${{ github.actor }}
    runs-on: ubuntu-latest

    env:
      CLANG_VERSION: clang-r547379
      GCC_TAG: android-12.1.0_r27
      Lineage_VERSION: lineage-23.0

    steps:
    - name: Checkout source
      uses: actions/checkout@v6

    - name: Set swap to 10G
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 10

    - name: Setup build environment
      run: |
        echo "BUILD_TIME=$(TZ=Asia/Kolkata date '+%y%m%d')" >> $GITHUB_ENV
        echo "BUILD_TIME_1=$(TZ=Asia/Kolkata date '+%Y-%m-%d')" >> $GITHUB_ENV
        sudo apt-get update
        sudo apt-get install -y \
          git ccache automake flex lzop bison gperf build-essential \
          zip curl zlib1g-dev g++-multilib bzip2 libbz2-dev \
          liblz4-tool make squashfs-tools dpkg-dev libssl-dev \
          python3 bc libc6-dev-i386 libncurses5-dev jq
        mkdir -p kernel_workspace

    - name: Cache Clang
      uses: actions/cache@v5
      with:
        path: kernel_workspace/clang-aosp
        key: clang-${{ env.CLANG_VERSION }}

    - name: Download Clang
      if: steps.cache-clang.outputs.cache-hit != 'true'
      run: |
        cd kernel_workspace
        mkdir -p clang-aosp
        wget -O clang.tar.gz \
          https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/${CLANG_VERSION}.tar.gz
        tar -C clang-aosp -xzf clang.tar.gz

    - name: Cache GCC
      uses: actions/cache@v4
      with:
        path: kernel_workspace/gcc-64
        key: gcc-${{ env.GCC_TAG }}

    - name: Download GCC
      if: steps.cache-gcc.outputs.cache-hit != 'true'
      run: |
        cd kernel_workspace
        mkdir -p gcc-64
        wget -O gcc.tar.gz \
          https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9/+archive/refs/tags/${GCC_TAG}.tar.gz
        tar -C gcc-64 -xzf gcc.tar.gz

    - name: Clone kernel source
      run: |
        cd kernel_workspace
        git clone --depth=1 -b ${{ env.Lineage_VERSION }} \
          https://github.com/LineageOS/android_kernel_oneplus_sm8250 android-kernel

    - name: Setup KernelSU (Universal)
      run: |
        cd kernel_workspace/android-kernel

        # KernelSU-Next (legacy) → supports rsuntk / Next / Wild managers
        curl -LSs https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh | bash -s legacy

        # Optional manual hook
        echo "CONFIG_KSU_MANUAL_HOOK=y" >> arch/arm64/configs/vendor/kona-perf_defconfig

        # Versioning
        KSU_VERSION=$(cd KernelSU && expr $(git rev-list --count HEAD) + 30000)
        echo "KSUVER=$KSU_VERSION" >> $GITHUB_ENV

        sed -i 's/ -dirty//g' scripts/setlocalversion

    - name: Build kernel
      run: |
        cd kernel_workspace/android-kernel
        export ARCH=arm64
        export SUBARCH=arm64
        export BRAND_SHOW_FLAG=oneplus
        export PATH=$GITHUB_WORKSPACE/kernel_workspace/clang-aosp/bin:$GITHUB_WORKSPACE/kernel_workspace/gcc-64/bin:$PATH
        export KBUILD_BUILD_HOST=GitHub-Actions
        export KBUILD_BUILD_USER=${{ github.actor }}

        make O=out ARCH=arm64 CC=clang \
          CLANG_TRIPLE=aarch64-linux-gnu- \
          CROSS_COMPILE=aarch64-linux-android- \
          LLVM=1 LLVM_IAS=1 \
          vendor/kona-perf_defconfig vendor/debugfs.config vendor/oplus.config

        make -j$(nproc) O=out ARCH=arm64 CC=clang \
          CLANG_TRIPLE=aarch64-linux-gnu- \
          CROSS_COMPILE=aarch64-linux-android- \
          LLVM=1 LLVM_IAS=1

    - name: Verify kernel output
      run: |
        cd kernel_workspace/android-kernel/out
        if [ ! -f arch/arm64/boot/Image ]; then
          echo "Kernel build failed"
          exit 1
        fi
        echo "CHECK_IMAGE=true" >> $GITHUB_ENV
        echo "KERNEL_VERSION=$(cat include/config/kernel.release)" >> $GITHUB_ENV

    - name: Prepare AnyKernel3
      if: env.CHECK_IMAGE == 'true'
      run: |
        cd kernel_workspace
        git clone https://github.com/osm0sis/AnyKernel3 --depth=1

        sed -i 's/do.devicecheck=1/do.devicecheck=0/g' AnyKernel3/anykernel.sh
        sed -i 's/IS_SLOT_DEVICE=0;/IS_SLOT_DEVICE=1;/g' AnyKernel3/anykernel.sh
        sed -i 's/^block=.*/block=/g' AnyKernel3/anykernel.sh

        cp android-kernel/out/arch/arm64/boot/Image AnyKernel3/
        rm -rf AnyKernel3/.git*

    - name: Zip artifacts
      if: env.CHECK_IMAGE == 'true'
      run: |
        zip -j Image.zip kernel_workspace/android-kernel/out/arch/arm64/boot/Image
        cd kernel_workspace/AnyKernel3
        zip -r $GITHUB_WORKSPACE/AK3-${{ env.Lineage_VERSION }}-OPlus-SM8250-KSU_${{ env.KSUVER }}-${{ env.BUILD_TIME }}.zip .

    - name: Upload artifacts
      if: env.CHECK_IMAGE == 'true'
      uses: actions/upload-artifact@v6
      with:
        name: Kernel-Build
        path: |
          Image.zip
          AK3-${{ env.Lineage_VERSION }}-OPlus-SM8250-KSU_${{ env.KSUVER }}-${{ env.BUILD_TIME }}.zip

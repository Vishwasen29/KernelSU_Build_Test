name: A Test SM8250 LineageOS Kernel Build (KSUN + BB + SUSFS)

on:
  workflow_dispatch:

env:
  TZ: Asia/Kolkata
  CLANG_VERSION: clang-r547379
  LINEAGE_BRANCH: lineage-23.2

jobs:
  build:
    name: Build by ${{ github.actor }}
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    # --------------------------------------------------
    # Swap (Memory Safety)
    # --------------------------------------------------
    - name: Set swap to 12G
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 12

    # --------------------------------------------------
    # Install dependencies
    # --------------------------------------------------
    - name: Install build dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          git ccache flex bison build-essential zip curl \
          libssl-dev libelf-dev bc python3 \
          libncurses5-dev wget

        mkdir -p kernel_workspace

        echo "BUILD_DATE=$(date +%Y%m%d)" >> $GITHUB_ENV

    # --------------------------------------------------
    # Cache Clang
    # --------------------------------------------------
    - name: Cache Clang
      id: cache-clang
      uses: actions/cache@v4
      with:
        path: kernel_workspace/clang
        key: ${{ env.CLANG_VERSION }}

    - name: Download Clang
      if: steps.cache-clang.outputs.cache-hit != 'true'
      run: |
        cd kernel_workspace
        mkdir clang
        wget -O clang.tar.gz \
        https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/${CLANG_VERSION}.tar.gz
        tar -C clang -zxvf clang.tar.gz

    # --------------------------------------------------
    # Cache ccache
    # --------------------------------------------------
    - name: Cache ccache
      uses: actions/cache@v4
      with:
        path: ~/.ccache
        key: ccache-${{ github.run_id }}
        restore-keys: |
          ccache-

    # --------------------------------------------------
    # Clone Kernel
    # --------------------------------------------------
    - name: Clone LineageOS kernel
      run: |
        cd kernel_workspace
        git clone --depth=1 \
          -b ${{ env.LINEAGE_BRANCH }} \
          https://github.com/LineageOS/android_kernel_oneplus_sm8250 \
          android-kernel

    # --------------------------------------------------
    # Clean tree
    # --------------------------------------------------
    - name: Clean kernel tree
      run: |
        cd kernel_workspace/android-kernel
        git reset --hard
        git clean -fd

    # --------------------------------------------------
    # Setup KernelSU Next (legacy)
    # --------------------------------------------------
    - name: Setup KernelSU Next
      run: |
        cd kernel_workspace/android-kernel
        curl -LSs \
        https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh \
        | bash -s legacy

    # --------------------------------------------------
    # Setup Baseband Guard
    # --------------------------------------------------
    - name: Setup Baseband Guard
      run: |
        cd kernel_workspace/android-kernel
        wget -O- \
        https://github.com/vc-teahouse/Baseband-guard/raw/main/setup.sh \
        | bash

    # --------------------------------------------------
    # Apply SUSFS patches
    # --------------------------------------------------
    - name: Apply SUSFS patches
      run: |
        cd kernel_workspace/android-kernel

        echo "Applying SUSFS patch set..."

        git apply --whitespace=fix $GITHUB_WORKSPACE/patches/sus2.patch || true
        git apply --whitespace=fix $GITHUB_WORKSPACE/patches/sus3.patch || true

        REJECTS=$(find . -name "*.rej" | wc -l)

        if [ "$REJECTS" -gt 0 ]; then
          echo "SUSFS patch failed!"
          find . -name "*.rej" -exec cat {} \;
          exit 1
        fi

        echo "SUSFS patch applied successfully"

    # --------------------------------------------------
    # Enable KernelSU + SUSFS config safely
    # --------------------------------------------------
    - name: Configure kernel
      run: |
        cd kernel_workspace/android-kernel

        export PATH=$GITHUB_WORKSPACE/kernel_workspace/clang/bin:$PATH
        export ARCH=arm64
        export SUBARCH=arm64
        export LLVM=1
        export LLVM_IAS=1
        export CC=clang

        make O=out vendor/kona-perf_defconfig

        scripts/config --file out/.config --enable CONFIG_KSU
        scripts/config --file out/.config --enable CONFIG_KSU_SUSFS
        scripts/config --file out/.config --enable CONFIG_KSU_SUSFS_SUS_MOUNT
        scripts/config --file out/.config --enable CONFIG_KSU_SUSFS_SUS_MAP
        scripts/config --file out/.config --enable CONFIG_KSU_SUSFS_ENABLE_LOG

        make O=out olddefconfig

    # --------------------------------------------------
    # Build Kernel (Full LLVM + ccache)
    # --------------------------------------------------
    - name: Build kernel
      run: |
        cd kernel_workspace/android-kernel

        export PATH=$GITHUB_WORKSPACE/kernel_workspace/clang/bin:$PATH
        export ARCH=arm64
        export SUBARCH=arm64
        export LLVM=1
        export LLVM_IAS=1
        export CC="ccache clang"

        make -j$(nproc) O=out \
          CC="ccache clang" \
          LD=ld.lld \
          AR=llvm-ar \
          NM=llvm-nm \
          OBJCOPY=llvm-objcopy \
          OBJDUMP=llvm-objdump \
          STRIP=llvm-strip

    # --------------------------------------------------
    # Verify Image
    # --------------------------------------------------
    - name: Verify Image exists
      run: |
        cd kernel_workspace/android-kernel/out
        test -f arch/arm64/boot/Image || exit 1

    # --------------------------------------------------
    # Verify SUSFS integrated
    # --------------------------------------------------
    - name: Verify SUSFS symbols
      run: |
        cd kernel_workspace/android-kernel/out

        if ! nm vmlinux | grep -q susfs; then
          echo "SUSFS symbols missing!"
          exit 1
        fi

        echo "SUSFS linked correctly"

    # --------------------------------------------------
    # Package AnyKernel3
    # --------------------------------------------------
    - name: Package AnyKernel3
      run: |
        cd kernel_workspace
        git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git

        cp android-kernel/out/arch/arm64/boot/Image \
        AnyKernel3/

        cd AnyKernel3
        zip -r9 SM8250-KSUN-SUSFS-${BUILD_DATE}.zip *

    # --------------------------------------------------
    # Upload artifact
    # --------------------------------------------------
    - name: Upload final kernel zip
      uses: actions/upload-artifact@v4
      with:
        name: SM8250-Kernel-${{ env.BUILD_DATE }}
        path: kernel_workspace/AnyKernel3/SM8250-KSUN-SUSFS-*.zip

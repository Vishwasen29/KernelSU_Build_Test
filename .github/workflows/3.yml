name: Lemonades Kernel - KSU Next + SUSFS

on:
  workflow_dispatch:

env:
  TZ: Asia/Shanghai
  DEFCONFIG: kona-perf_defconfig
  CLANG_VERSION: clang-r547379

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    ########################################################
    # Checkout
    ########################################################
    - name: Checkout Repo
      uses: actions/checkout@v4

    ########################################################
    # Dependencies
    ########################################################
    - name: Install Dependencies
      run: |
        sudo apt update
        sudo apt install -y bc bison build-essential ccache curl flex git \
        libssl-dev libncurses5-dev libelf-dev lz4 python3 unzip zip patch

    ########################################################
    # Cache
    ########################################################
    - name: Restore ccache
      uses: actions/cache@v4
      with:
        path: ~/.ccache
        key: ${{ runner.os }}-ccache-${{ github.run_id }}
        restore-keys: |
          ${{ runner.os }}-ccache-

    ########################################################
    # Clone Kernel
    ########################################################
    - name: Clone Kernel Source
      run: |
        git clone --depth=1 https://github.com/LineageOS/android_kernel_oneplus_sm8250 kernel
        cd kernel
        git rev-parse HEAD

    ########################################################
    # Setup Clang
    ########################################################
    - name: Setup Clang
      run: |
        git clone https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 clang --depth=1
        echo "CLANG_PATH=$PWD/clang/clang-${CLANG_VERSION}/bin" >> $GITHUB_ENV

    ########################################################
    # Setup KernelSU-Next (LEGACY)
    ########################################################
    - name: Setup KernelSU-Next
      run: |
        cd kernel
        curl -LSs https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh | bash -s legacy
        
        # Disable kprobe usage
        find KernelSU -type f -name "*.c" -o -name "*.h" | xargs sed -i \
        's/#ifdef CONFIG_KPROBES/#if defined(CONFIG_KPROBES) \&\& 0/g'

        # Enable required configs
          echo "CONFIG_KSU=y" >> arch/arm64/configs/vendor/${DEFCONFIG}
        echo "CONFIG_KSU_MANUAL_HOOK=y" >> arch/arm64/configs/vendor/${DEFCONFIG}

        # Enable SUSFS Core
        echo "CONFIG_KSU_SUSFS=y" >> arch/arm64/configs/vendor/${DEFCONFIG}
        echo "CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y" >> arch/arm64/configs/vendor/${DEFCONFIG}

        # Enable All SUSFS Features
        echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> arch/arm64/configs/vendor/${DEFCONFIG}
        echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y" >> arch/arm64/configs/vendor/${DEFCONFIG}
        echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y" >> arch/arm64/configs/vendor/${DEFCONFIG}
        echo "CONFIG_KSU_SUSFS_SUS_OVERLAYFS=y" >> arch/arm64/configs/vendor/${DEFCONFIG}
        echo "CONFIG_KSU_SUSFS_TRY_UMOUNT=y" >> arch/arm64/configs/vendor/${DEFCONFIG}
        echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y" >> arch/arm64/configs/vendor/${DEFCONFIG}
        echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y" >> arch/arm64/configs/vendor/${DEFCONFIG}
        echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y" >> arch/arm64/configs/vendor/${DEFCONFIG}
        echo "CONFIG_KSU_SUSFS_SUS_SU=y" >> arch/arm64/configs/vendor/${DEFCONFIG}
    ########################################################
    # Minimal Manual Exec Hook
    ########################################################
    - name: Apply Manual Hook
      run: |
        cd kernel

        bash $GITHUB_WORKSPACE/patches/kernel-4.19_5.4-patch.sh

        wget -O- https://github.com/vc-teahouse/Baseband-guard/raw/main/setup.sh | bash
        sed -i '/^config LSM$/,/^help$/{ /^[[:space:]]*default/ { /baseband_guard/! s/selinux/selinux,baseband_guard/ } }' security/Kconfig
    ########################################################
    # Clone SUSFS (STABLE TAG)
    ########################################################
    - name: Clone SUSFS
      run: |
        git clone https://gitlab.com/simonpunk/susfs4ksu.git susfs
        cd susfs
        git checkout $(git tag | sort -V | tail -n 1)

    ########################################################
    # Copy SUSFS Kernel Files
    ########################################################
    - name: Copy SUSFS Source Files
      run: |
        cp susfs/kernel_patches/fs/* kernel/fs/
        cp susfs/kernel_patches/include/linux/* kernel/include/linux/

    ########################################################
    # Apply SUSFS KernelSU Patch
    ########################################################
    - name: Apply SUSFS KernelSU Patch
      run: |
        cd kernel/KernelSU-Next
        patch -p1 < ../../susfs/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch

    ########################################################
    # Apply SUSFS Kernel Core Patch
    ########################################################
    - name: Apply SUSFS Kernel Patch
      run: |
        cd kernel
        patch -p1 < ../susfs/kernel_patches/50_add_susfs_in_kernel-4.19.patch

    ########################################################
    # Collect Rejects
    ########################################################
    - name: Collect Rejects
      if: always()
      run: |
        cd kernel
        find . -name "*.rej" > rejects.txt || true
        tar -czf rejects.tar.gz $(find . -name "*.rej" -o -name "*.orig" 2>/dev/null) || true

    - name: Upload Rejects
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: susfs-rejects
        path: kernel/rejects.tar.gz
        if-no-files-found: ignore

    ########################################################
    # Build Kernel
    ########################################################
    - name: Build Kernel
      run: |
        export PATH=$CLANG_PATH:$PATH
        export ARCH=arm64
        export SUBARCH=arm64
        export CC=clang
        export CLANG_TRIPLE=aarch64-linux-gnu-
        export CROSS_COMPILE=aarch64-linux-gnu-
        export USE_CCACHE=1
        export CCACHE_DIR=~/.ccache

        cd kernel
        make O=out ${DEFCONFIG}
        make -j$(nproc) O=out

    ########################################################
    # AnyKernel3
    ########################################################
    - name: Setup AnyKernel3
      run: |
        git clone https://github.com/osm0sis/AnyKernel3 AnyKernel
        cp kernel/out/arch/arm64/boot/Image.gz AnyKernel/

    ########################################################
    # Package ZIP
    ########################################################
    - name: Package ZIP
      run: |
        cd AnyKernel
        zip -r9 Lemonades-KSU-SUSFS.zip *

    - name: Upload Flashable ZIP
      uses: actions/upload-artifact@v4
      with:
        name: Lemonades-KSU-SUSFS
        path: AnyKernel/Lemonades-KSU-SUSFS.zip

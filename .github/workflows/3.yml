name: Lemonades Kernel - KSU Next + SUSFS

on:
  workflow_dispatch:

env:
  TZ: Asia/Shanghai
  CLANG_VERSION: clang-r547379
  Lineage_VERSION: lineage-23.2

jobs:
  build:
    name: Build Kernel (${{ matrix.ks }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ks: [rsuntk, backslashxx]

    steps:
    - uses: actions/checkout@v6

    - name: Set swap to 10G
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 10

    ############################################################
    # Environment Setup
    ############################################################
    - name: Setup build kernel environment
      run: |
        echo "BUILD_TIME=$(TZ=Asia/Shanghai date "+%y%m%d")" >> $GITHUB_ENV
        echo "BUILD_TIME_1=$(TZ=Asia/Shanghai date "+%Y-%m-%d")" >> $GITHUB_ENV
        sudo apt-get update
        sudo apt-get install -y git ccache automake flex lzop bison gperf \
        build-essential zip curl zlib1g-dev g++-multilib bzip2 libbz2-dev \
        liblz4-tool make squashfs-tools dpkg-dev libssl-dev python3 bc \
        libc6-dev-i386 libncurses5-dev patch
        mkdir -p $GITHUB_WORKSPACE/kernel_workspace

    ############################################################
    # Cache Clang
    ############################################################
    - name: Cache Clang toolchain
      id: cache-clang
      uses: actions/cache@v5
      with:
        path: ${{ github.workspace }}/kernel_workspace/clang-aosp
        key: ${{ env.CLANG_VERSION }}

    - name: Download Clang (if cache miss)
      if: steps.cache-clang.outputs.cache-hit != 'true'
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        mkdir -p clang-aosp
        wget -O ${CLANG_VERSION}.tar.gz \
        https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/${CLANG_VERSION}.tar.gz
        tar -C clang-aosp -zxvf ${CLANG_VERSION}.tar.gz

    ############################################################
    # Clone Kernel
    ############################################################
    - name: Download kernel source
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        git clone --recursive https://github.com/LineageOS/android_kernel_oneplus_sm8250 \
        -b ${{ env.Lineage_VERSION }} android-kernel --depth=1

    ############################################################
    # Setup KernelSU
    ############################################################
    - name: Set up KernelSU (${{ matrix.ks }})
      run: |
        cd kernel_workspace/android-kernel

        if [ "${{ matrix.ks }}" = "rsuntk" ]; then
        curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s legacy
        wget -O- https://github.com/vc-teahouse/Baseband-guard/raw/main/setup.sh | bash
        sed -i '/^config LSM$/,/^help$/{ /^[[:space:]]*default/ { /baseband_guard/! s/selinux/selinux,baseband_guard/ } }' security/Kconfig
        bash $GITHUB_WORKSPACE/patches/kernel-4.19_5.4-patch.sh
          echo "CONFIG_KSU_MANUAL_HOOK=y" >> arch/arm64/configs/vendor/kona-perf_defconfig
        else
          curl -LSs https://raw.githubusercontent.com/backslashxx/KernelSU/master/kernel/setup.sh | bash -s master
          echo "CONFIG_KSU_TAMPER_SYSCALL_TABLE=y" >> arch/arm64/configs/vendor/kona-perf_defconfig
        fi

        # Disable kprobes
        find KernelSU -type f \( -name "*.c" -o -name "*.h" \) \
        -exec sed -i 's/#ifdef CONFIG_KPROBES/#if defined(CONFIG_KPROBES) \&\& 0/g' {} +

        # Enable SUSFS configs
        echo "CONFIG_KSU_SUSFS=y" >> arch/arm64/configs/vendor/kona-perf_defconfig
        echo "CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y" >> arch/arm64/configs/vendor/kona-perf_defconfig
        echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> arch/arm64/configs/vendor/kona-perf_defconfig
        echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y" >> arch/arm64/configs/vendor/kona-perf_defconfig
        echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y" >> arch/arm64/configs/vendor/kona-perf_defconfig
        echo "CONFIG_KSU_SUSFS_SUS_OVERLAYFS=y" >> arch/arm64/configs/vendor/kona-perf_defconfig
        echo "CONFIG_KSU_SUSFS_TRY_UMOUNT=y" >> arch/arm64/configs/vendor/kona-perf_defconfig
        echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y" >> arch/arm64/configs/vendor/kona-perf_defconfig
        echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y" >> arch/arm64/configs/vendor/kona-perf_defconfig
        echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y" >> arch/arm64/configs/vendor/kona-perf_defconfig
        echo "CONFIG_KSU_SUSFS_SUS_SU=y" >> arch/arm64/configs/vendor/kona-perf_defconfig

        sed -i 's/ -dirty//g' scripts/setlocalversion

    ############################################################
    # Clone & Apply SUSFS
    ############################################################
    - name: Clone SUSFS
      run: |
        cd kernel_workspace
        git clone https://gitlab.com/simonpunk/susfs4ksu.git susfs
        cd susfs
        git checkout kernel-4.19

    - name: Copy SUSFS files
      run: |
        cp kernel_workspace/susfs/kernel_patches/fs/* \
           kernel_workspace/android-kernel/fs/
        cp kernel_workspace/susfs/kernel_patches/include/linux/* \
           kernel_workspace/android-kernel/include/linux/

    - name: Apply SUSFS patches (debug enabled)
      run: |
        set -x
        cd kernel_workspace/android-kernel

        echo "Applying KernelSU SUSFS patch"
        patch -p1 < ../susfs/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch || true

        echo "Applying core SUSFS patch"
        patch -p1 < ../susfs/kernel_patches/50_add_susfs_in_kernel-4.19.patch || true

        echo "Listing reject files"
        find . -name "*.rej" -print || true

        echo "Showing reject contents"
        for f in $(find . -name "*.rej"); do
          echo "===== $f ====="
          cat "$f"
        done

    ############################################################
    # Save Reject Artifacts
    ############################################################
    - name: Archive Rejects
      if: always()
      run: |
        cd kernel_workspace/android-kernel
        tar -czf susfs-rejects.tar.gz \
        $(find . -name "*.rej" -o -name "*.orig" 2>/dev/null) || true

    - name: Upload Reject Artifacts
      if: always()
      uses: actions/upload-artifact@v6
      with:
        name: SUSFS-REJECTS-${{ matrix.ks }}
        path: kernel_workspace/android-kernel/susfs-rejects.tar.gz
        if-no-files-found: ignore

    ############################################################
    # Build Kernel
    ############################################################
    - name: Build kernel (${{ matrix.ks }})
      run: |
        cd kernel_workspace/android-kernel
        export ARCH=arm64
        export SUBARCH=arm64
        export PATH=$GITHUB_WORKSPACE/kernel_workspace/clang-aosp/bin:$PATH
        export CLANG_TRIPLE=aarch64-linux-gnu-
        export LLVM=1

        make O=out vendor/kona-perf_defconfig vendor/oplus.config
        make -j$(nproc --all) O=out

    ############################################################
    # Package AnyKernel3
    ############################################################
    - name: Prepare AnyKernel3
      run: |
        cd kernel_workspace
        git clone --depth=1 https://github.com/osm0sis/AnyKernel3
        cp android-kernel/out/arch/arm64/boot/Image AnyKernel3/

        cd AnyKernel3
        zip -r AK3-${{ env.Lineage_VERSION }}-${{ matrix.ks }}.zip ./*

    - name: Upload ZIP
      uses: actions/upload-artifact@v6
      with:
        name: AK3-${{ matrix.ks }}
        path: kernel_workspace/AnyKernel3/*.zip

          
    

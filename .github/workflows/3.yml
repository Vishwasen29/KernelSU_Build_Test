name: Lemonades Kernel - KSU Next + SUSFS

on:
  workflow_dispatch:

env:
  TZ: Asia/Shanghai
  DEFCONFIG: kona-perf_defconfig
  CLANG_VERSION: clang-r547379

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Repo
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt update
        sudo apt install -y bc bison build-essential ccache curl flex git \
        libssl-dev libncurses5-dev libelf-dev lz4 python3 unzip zip

    - name: Restore ccache
      uses: actions/cache@v4
      with:
        path: ~/.ccache
        key: ${{ runner.os }}-ccache-${{ github.run_id }}
        restore-keys: |
          ${{ runner.os }}-ccache-

    ########################################################
    # Clone Kernel
    ########################################################
    - name: Clone Kernel Source
      run: |
        git clone --depth=1 https://github.com/LineageOS/android_kernel_oneplus_sm8250 kernel
        cd kernel
        git rev-parse HEAD

    ########################################################
    # Setup Clang (Your Style)
    ########################################################
    - name: Setup Clang
      run: |
        git clone https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 clang --depth=1
        echo "CLANG_PATH=$PWD/clang/clang-${CLANG_VERSION}/bin" >> $GITHUB_ENV

    ########################################################
    # KernelSU-Next LEGACY
    ########################################################
    - name: Setup KernelSU-Next
      run: |
        cd kernel
        curl -LSs https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh | bash -s legacy
        echo "CONFIG_KSU=y" >> arch/arm64/configs/vendor/${DEFCONFIG}
        echo "CONFIG_KSU_MANUAL_HOOK=y" >> arch/arm64/configs/vendor/${DEFCONFIG}

    ########################################################
    # Manual Hook (Minimal Safe)
    ########################################################
    - name: Apply Manual Hook
      run: |
        cd kernel

        if ! grep -q ksu_handle_execveat fs/exec.c; then
          sed -i '/static int do_execveat_common/i\
#ifdef CONFIG_KSU\
extern bool ksu_execveat_hook __read_mostly;\
extern int ksu_handle_execveat(int *fd, struct filename **filename_ptr, void *argv, void *envp, int *flags);\
#endif' fs/exec.c

          sed -i '/retval = __do_execve_file/i\
#ifdef CONFIG_KSU\
if (unlikely(ksu_execveat_hook))\
    ksu_handle_execveat(&fd, &filename, &argv, &envp, &flags);\
#endif' fs/exec.c
        fi

    ########################################################
    # Clone SUSFS 4.19
    ########################################################
    - name: Clone SUSFS
      run: |
        git clone https://gitlab.com/simonpunk/susfs4ksu.git -b kernel-4.19 susfs

    - name: Apply SUSFS KernelSU Patch
      run: |
        cd kernel/KernelSU
        patch -p1 < ../../susfs/kernel_patches/10_enable_susfs_for_ksu.patch || true

    - name: Apply SUSFS Kernel Patch
      run: |
        cd kernel
        patch -p1 < ../susfs/kernel_patches/50_add_susfs_in_kernel-4.19.patch || true

    ########################################################
    # Collect Rejects
    ########################################################
    - name: Collect Rejects
      if: always()
      run: |
        cd kernel
        find . -name "*.rej" > rejects.txt || true
        tar -czf rejects.tar.gz $(find . -name "*.rej" -o -name "*.orig" 2>/dev/null) || true

    - name: Upload Rejects
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: susfs-rejects
        path: kernel/rejects.tar.gz
        if-no-files-found: ignore

    ########################################################
    # Build Kernel
    ########################################################
    - name: Build Kernel
      run: |
        export PATH=$CLANG_PATH:$PATH
        export ARCH=arm64
        export SUBARCH=arm64
        export CC=clang
        export CLANG_TRIPLE=aarch64-linux-gnu-
        export CROSS_COMPILE=aarch64-linux-gnu-
        export USE_CCACHE=1
        export CCACHE_DIR=~/.ccache

        cd kernel

        make O=out ${DEFCONFIG}
        make -j$(nproc) O=out

    ########################################################
    # Clone AnyKernel3
    ########################################################
    - name: Setup AnyKernel3
      run: |
        git clone https://github.com/osm0sis/AnyKernel3 AnyKernel
        cp kernel/out/arch/arm64/boot/Image.gz AnyKernel/

    ########################################################
    # Create Flashable ZIP
    ########################################################
    - name: Package ZIP
      run: |
        cd AnyKernel
        zip -r9 Lemonades-KSU-SUSFS.zip *

    - name: Upload Flashable ZIP
      uses: actions/upload-artifact@v4
      with:
        name: Lemonades-KSU-SUSFS
        path: AnyKernel/Lemonades-KSU-SUSFS.zip
        

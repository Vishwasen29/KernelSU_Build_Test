name: 1 Build LineageOS OPlus SM8250 Kernel with SUSFS

on:
  workflow_dispatch:

env:
  TZ: Asia/Shanghai
  CLANG_VERSION: clang-r547379
  Lineage_VERSION: lineage-23.2

jobs:
  build:
    name: Build Kernel (${{ matrix.ks }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ks: [next]

    steps:
      - uses: actions/checkout@v6

      - name: Set swap to 10G
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 10

      - name: Setup build kernel environment
        run: |
          echo "BUILD_TIME=$(TZ=Asia/Shanghai date "+%y%m%d")" >> $GITHUB_ENV
          echo "BUILD_TIME_1=$(TZ=Asia/Shanghai date "+%Y-%m-%d")" >> $GITHUB_ENV
          sudo apt-get update
          sudo apt-get install -y git ccache automake flex lzop bison gperf build-essential zip curl zlib1g-dev g++-multilib bzip2 libbz2-dev liblz4-tool make squashfs-tools dpkg-dev libssl-dev python3 bc libc6-dev-i386 libncurses5-dev
          mkdir -p $GITHUB_WORKSPACE/kernel_workspace

      - name: Cache Clang toolchain
        id: cache-clang
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/kernel_workspace/clang-aosp
          key: ${{ env.CLANG_VERSION }}

      - name: Download & extract Clang-aosp (if cache miss)
        if: steps.cache-clang.outputs.cache-hit != 'true'
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace
          mkdir -p clang-aosp
          wget -O ${CLANG_VERSION}.tar.gz \
            https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/${CLANG_VERSION}.tar.gz
          tar -C clang-aosp -zxvf ${CLANG_VERSION}.tar.gz

      - name: Download kernel source
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace
          git clone --recursive https://github.com/LineageOS/android_kernel_oneplus_sm8250 -b ${{ env.Lineage_VERSION }} android-kernel --depth=1

      - name: Set up KernelSU-Next (${{ matrix.ks }})
        run: |
          cd kernel_workspace/android-kernel

          if [ "${{ matrix.ks }}" = "next" ]; then
            curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s legacy
            wget -O- https://github.com/vc-teahouse/Baseband-guard/raw/main/setup.sh | bash
            sed -i '/^config LSM$/,/^help$/{ /^[[:space:]]*default/ { /baseband_guard/! s/selinux/selinux,baseband_guard/ } }' security/Kconfig
            bash $GITHUB_WORKSPACE/patches/kernel-4.19_5.4-patch.sh
            echo "CONFIG_KSU_MANUAL_HOOK=y" >> arch/arm64/configs/vendor/kona-perf_defconfig
          elif [ "${{ matrix.ks }}" = "rsuntk" ]; then
            curl -LSs https://raw.githubusercontent.com/rsuntk/KernelSU/main/kernel/setup.sh | bash -s main
            bash $GITHUB_WORKSPACE/patches/kernel-4.19_5.4-patch.sh || true
            echo "CONFIG_KSU_MANUAL_HOOK=y" >> arch/arm64/configs/vendor/kona-perf_defconfig
            RSKSUVER=$(cd KernelSU && expr $(git rev-list --count HEAD) + 30000)
            echo "RSKSUVER=$RSKSUVER" >> $GITHUB_ENV
          else
            curl -LSs https://raw.githubusercontent.com/backslashxx/KernelSU/master/kernel/setup.sh | bash -s master
            echo "CONFIG_KSU_TAMPER_SYSCALL_TABLE=y" >> arch/arm64/configs/vendor/kona-perf_defconfig
            XXKSUVER=$(grep -oP 'KSU_VERSION\s*=\s*\K\d+' KernelSU/kernel/Makefile | tail -n1)
            echo "XXKSUVER=$XXKSUVER" >> $GITHUB_ENV
          fi

          sed -i 's/ -dirty//g' scripts/setlocalversion

      - name: Apply SUSFS patch with inline fixes
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
          
          echo "=========================================="
          echo "ðŸ“¦ Applying SUSFS Patch"
          echo "=========================================="
          
          # Check if patch file exists
          if [ ! -f "$GITHUB_WORKSPACE/patches/sus2.patch" ]; then
            echo "âŒ ERROR: SUSFS patch file not found!"
            echo "Expected location: $GITHUB_WORKSPACE/patches/sus2.patch"
            exit 1
          fi
          
          set +e
          git apply --reject --whitespace=fix $GITHUB_WORKSPACE/patches/sus2.patch
          PATCH_EXIT_CODE=$?
          set -e
          
          echo "Patch exit code: $PATCH_EXIT_CODE"
          
          echo ""
          echo "=========================================="
          echo "ðŸ”§ Applying Manual Fixes for Rejected Hunks"
          echo "=========================================="
          
          # Fix 1: fs/Makefile
          echo ""
          echo "â†’ Fixing fs/Makefile..."
          if ! grep -q "CONFIG_KSU_SUSFS" fs/Makefile; then
            awk '
            /stack.o fs_struct.o statfs.o fs_pin.o nsfs.o/ {
                print
                getline
                print
                if ($0 ~ /fs_context.o fs_parser.o/) {
                    print ""
                    print "obj-$(CONFIG_KSU_SUSFS) += susfs.o"
                } else {
                    print ""
                    print "obj-$(CONFIG_KSU_SUSFS) += susfs.o"
                }
                next
            }
            { print }
            ' fs/Makefile > fs/Makefile.tmp && mv fs/Makefile.tmp fs/Makefile
            echo "  âœ… Fixed fs/Makefile"
          else
            echo "  âŠ˜ fs/Makefile already contains SUSFS entry"
          fi
          
          # Fix 2: fs/namespace.c - includes
          echo ""
          echo "â†’ Fixing fs/namespace.c includes..."
          if ! grep -q 'include <linux/susfs_def.h>' fs/namespace.c; then
            if grep -q '#include <linux/fs_context.h>' fs/namespace.c; then
              sed -i '/#include <linux\/fs_context\.h>/a\
          #ifdef CONFIG_KSU_SUSFS_SUS_MOUNT\
          #include <linux/susfs_def.h>\
          #endif' fs/namespace.c
              echo "  âœ… Fixed fs/namespace.c includes (after fs_context.h)"
            elif grep -q '#include <linux/sched/task.h>' fs/namespace.c; then
              sed -i '/#include <linux\/sched\/task\.h>/a\
          #ifdef CONFIG_KSU_SUSFS_SUS_MOUNT\
          #include <linux/susfs_def.h>\
          #endif' fs/namespace.c
              echo "  âœ… Fixed fs/namespace.c includes (after sched/task.h)"
            else
              echo "  âŒ Could not find suitable insertion point for includes!"
              exit 1
            fi
          else
            echo "  âŠ˜ fs/namespace.c already contains SUSFS includes"
          fi
          
          # Fix 3: fs/namespace.c - declarations
          echo ""
          echo "â†’ Fixing fs/namespace.c declarations..."
          if ! grep -q "extern bool susfs_is_current_ksu_domain" fs/namespace.c; then
            sed -i '/#include "internal\.h"/a\
          \
          #ifdef CONFIG_KSU_SUSFS_SUS_MOUNT\
          extern bool susfs_is_current_ksu_domain(void);\
          extern bool susfs_is_sdcard_android_data_decrypted;\
          \
          static atomic64_t susfs_ksu_mounts = ATOMIC64_INIT(0);\
          \
          #define CL_COPY_MNT_NS BIT(25)\
          #endif' fs/namespace.c
            echo "  âœ… Fixed fs/namespace.c declarations"
          else
            echo "  âŠ˜ fs/namespace.c already contains SUSFS declarations"
          fi
          
          # Fix 4: fs/proc/task_mmu.c
          echo ""
          echo "â†’ Fixing fs/proc/task_mmu.c..."
          if ! grep -q "CONFIG_KSU_SUSFS_SUS_MAP" fs/proc/task_mmu.c; then
            sed -i '/while.*count.*start_vaddr.*end_vaddr/,/^[[:space:]]*}/ {
                /mmap_read_unlock(mm);/ {
                    a\
          #ifdef CONFIG_KSU_SUSFS_SUS_MAP\
          \t\tvma = find_vma(mm, start_vaddr);\
          \t\tif (vma && vma->vm_file) {\
          \t\t\tstruct inode *inode = file_inode(vma->vm_file);\
          \t\t\tif (unlikely(inode->i_mapping->flags & BIT_SUS_MAPS) && susfs_is_current_proc_umounted()) {\
          \t\t\t\tpm.buffer->pme = 0;\
          \t\t\t}\
          \t\t}\
          #endif
                }
            }' fs/proc/task_mmu.c
            echo "  âœ… Fixed fs/proc/task_mmu.c"
          else
            echo "  âŠ˜ fs/proc/task_mmu.c already contains SUSFS code"
          fi
          
          # Fix 5: include/linux/mount.h
          echo ""
          echo "â†’ Fixing include/linux/mount.h..."
          if [ -f include/linux/mount.h ]; then
            if ! grep -q "unsigned long ksu_mnt;" include/linux/mount.h; then
              sed -i '/void \*data;/a\
          #ifdef CONFIG_KSU_SUSFS_SUS_MOUNT\
          \tunsigned long ksu_mnt;\
          #endif' include/linux/mount.h
              echo "  âœ… Fixed include/linux/mount.h"
            else
              echo "  âŠ˜ include/linux/mount.h already contains ksu_mnt"
            fi
          else
            echo "  âš ï¸  include/linux/mount.h does not exist"
          fi
          
          # Cleanup
          echo ""
          echo "â†’ Cleaning up..."
          find . -name "*.rej" -delete 2>/dev/null || true
          find . -name "*.orig" -delete 2>/dev/null || true
          echo "  âœ… Removed .rej and .orig files"
          
          echo ""
          echo "=========================================="
          echo "âœ… Manual Fixes Completed!"
          echo "=========================================="

      - name: Verify SUSFS Integration (PRE-BUILD)
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
          
          echo ""
          echo "=========================================="
          echo "ðŸ” VERIFYING SUSFS INTEGRATION (PRE-BUILD)"
          echo "=========================================="
          echo ""
          
          VERIFICATION_FAILED=0
          
          echo "ðŸ“ File Existence Checks:"
          echo "-------------------------"
          
          # Check 1-3: File existence
          if [ -f "fs/susfs.c" ]; then
            echo "  âœ… fs/susfs.c found"
          else
            echo "  âŒ fs/susfs.c NOT found"
            VERIFICATION_FAILED=1
          fi
          
          if [ -f "include/linux/susfs.h" ]; then
            echo "  âœ… include/linux/susfs.h found"
          else
            echo "  âŒ include/linux/susfs.h NOT found"
            VERIFICATION_FAILED=1
          fi
          
          if [ -f "include/linux/susfs_def.h" ]; then
            echo "  âœ… include/linux/susfs_def.h found"
          else
            echo "  âŒ include/linux/susfs_def.h NOT found"
            VERIFICATION_FAILED=1
          fi
          
          echo ""
          echo "ðŸ”§ Code Integration Checks:"
          echo "---------------------------"
          
          # Check 4: fs/Makefile
          if grep -q "CONFIG_KSU_SUSFS" fs/Makefile; then
            echo "  âœ… fs/Makefile has susfs.o entry"
          else
            echo "  âŒ fs/Makefile missing susfs.o entry"
            VERIFICATION_FAILED=1
          fi
          
          # Check 5: fs/namespace.c includes
          if grep -q 'include <linux/susfs_def.h>' fs/namespace.c; then
            echo "  âœ… fs/namespace.c has SUSFS includes"
          else
            echo "  âŒ fs/namespace.c missing SUSFS includes"
            VERIFICATION_FAILED=1
          fi
          
          # Check 6: fs/namespace.c declarations
          if grep -q "extern bool susfs_is_current_ksu_domain" fs/namespace.c; then
            echo "  âœ… fs/namespace.c has SUSFS declarations"
          else
            echo "  âŒ fs/namespace.c missing SUSFS declarations"
            VERIFICATION_FAILED=1
          fi
          
          # Check 7: fs/proc/task_mmu.c
          if grep -q "CONFIG_KSU_SUSFS_SUS_MAP" fs/proc/task_mmu.c && \
             grep -q "BIT_SUS_MAPS" fs/proc/task_mmu.c; then
            echo "  âœ… fs/proc/task_mmu.c has SUSFS code"
          else
            echo "  âŒ fs/proc/task_mmu.c missing SUSFS code"
            VERIFICATION_FAILED=1
          fi
          
          # Check 8: include/linux/mount.h
          if [ -f include/linux/mount.h ]; then
            if grep -q "unsigned long ksu_mnt;" include/linux/mount.h; then
              echo "  âœ… include/linux/mount.h has ksu_mnt field"
            else
              echo "  âš ï¸  include/linux/mount.h missing ksu_mnt field"
            fi
          else
            echo "  âš ï¸  include/linux/mount.h does not exist"
          fi
          
          # Check 9: fs/namei.c
          if grep -q "CONFIG_KSU_SUSFS_SUS_PATH" fs/namei.c; then
            echo "  âœ… fs/namei.c has SUSFS modifications"
          else
            echo "  âŒ fs/namei.c missing SUSFS modifications"
            VERIFICATION_FAILED=1
          fi
          
          # Check 10: No reject files
          REJ_COUNT=$(find . -name "*.rej" -type f 2>/dev/null | wc -l)
          if [ "$REJ_COUNT" -eq 0 ]; then
            echo "  âœ… No .rej files remaining"
          else
            echo "  âŒ Found $REJ_COUNT .rej file(s)"
            find . -name "*.rej" -type f
            VERIFICATION_FAILED=1
          fi
          
          echo ""
          echo "=========================================="
          if [ $VERIFICATION_FAILED -eq 0 ]; then
            echo "âœ… SUSFS INTEGRATION VERIFIED!"
            echo "=========================================="
            echo ""
            echo "All SUSFS components are properly integrated."
            echo "Proceeding with kernel build..."
          else
            echo "âŒ SUSFS INTEGRATION FAILED!"
            echo "=========================================="
            echo ""
            echo "CRITICAL ERROR: SUSFS integration incomplete!"
            echo "The build will be aborted to prevent shipping"
            echo "a kernel without SUSFS."
            echo ""
            echo "Please check the patch file and manual fixes."
            exit 1
          fi

      - name: Enable SUSFS configs
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
          
          echo "=========================================="
          echo "âš™ï¸  Enabling SUSFS Kernel Configs"
          echo "=========================================="
          
          cat <<EOF >> arch/arm64/configs/vendor/kona-perf_defconfig
          CONFIG_KSU_SUSFS=y
          CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_PATH=y
          CONFIG_KSU_SUSFS_SUS_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_KSTAT=y
          CONFIG_KSU_SUSFS_SUS_OVERLAYFS=y
          CONFIG_KSU_SUSFS_TRY_UMOUNT=y
          CONFIG_KSU_SUSFS_SPOOF_UNAME=y
          CONFIG_KSU_SUSFS_OPEN_REDIRECT=y
          CONFIG_KSU_SUSFS_ENABLE_LOG=y
          CONFIG_KSU_SUSFS_SUS_SU=y
          CONFIG_KSU_SUSFS_SUS_MAPS=y
          EOF
          
          echo ""
          echo "âœ… SUSFS configs added to defconfig:"
          echo "-----------------------------------"
          grep "CONFIG_KSU_SUSFS" arch/arm64/configs/vendor/kona-perf_defconfig || echo "âŒ Failed to add configs!"

      - name: Build kernel (${{ matrix.ks }})
        run: |
          cd kernel_workspace/android-kernel
          export ARCH=arm64
          export SUBARCH=arm64
          export BRAND_SHOW_FLAG=oneplus
          export PATH=$GITHUB_WORKSPACE/kernel_workspace/clang-aosp/bin:$PATH
          export KBUILD_BUILD_HOST=Github-Action
          export KBUILD_BUILD_USER=$(echo ${{ github.actor }} | tr A-Z a-z)

          BA_CMD="CLANG_TRIPLE=aarch64-linux-gnu-"
          EX_CMD="LD=ld.lld LLVM=1"
          DEFCONFIG="vendor/kona-perf_defconfig vendor/oplus.config"

          echo "=========================================="
          echo "ðŸ”¨ Building Kernel"
          echo "=========================================="
          
          make O=out CC=clang $BA_CMD $EX_CMD $DEFCONFIG
          make -j$(nproc --all) O=out CC=clang $BA_CMD $EX_CMD

      - name: Verify SUSFS in Built Kernel (POST-BUILD)
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
          
          echo ""
          echo "=========================================="
          echo "ðŸ” VERIFYING SUSFS IN BUILT KERNEL"
          echo "=========================================="
          echo ""
          
          if [ ! -f "out/.config" ]; then
            echo "âŒ Kernel .config not found!"
            exit 1
          fi
          
          echo "ðŸ“‹ Checking .config for SUSFS options:"
          echo "--------------------------------------"
          
          SUSFS_CONFIGS=(
            "CONFIG_KSU_SUSFS"
            "CONFIG_KSU_SUSFS_SUS_PATH"
            "CONFIG_KSU_SUSFS_SUS_MOUNT"
            "CONFIG_KSU_SUSFS_SUS_KSTAT"
            "CONFIG_KSU_SUSFS_SUS_MAPS"
          )
          
          MISSING_COUNT=0
          for config in "${SUSFS_CONFIGS[@]}"; do
            if grep -q "^${config}=y" out/.config; then
              echo "  âœ… $config is ENABLED"
            else
              echo "  âŒ $config is NOT ENABLED"
              MISSING_COUNT=$((MISSING_COUNT + 1))
            fi
          done
          
          echo ""
          if [ $MISSING_COUNT -eq 0 ]; then
            echo "âœ… All SUSFS configs are enabled in the built kernel!"
          else
            echo "âŒ WARNING: $MISSING_COUNT SUSFS config(s) not enabled!"
            echo "The kernel may not have full SUSFS functionality."
          fi
          
          echo ""
          echo "ðŸ” Checking for SUSFS symbols in kernel:"
          echo "----------------------------------------"
          if [ -f "out/vmlinux" ] && command -v nm &> /dev/null; then
            SUSFS_SYMBOL_COUNT=$(nm out/vmlinux 2>/dev/null | grep -i susfs | wc -l)
            if [ "$SUSFS_SYMBOL_COUNT" -gt 0 ]; then
              echo "  âœ… Found $SUSFS_SYMBOL_COUNT SUSFS symbols in kernel"
              echo ""
              echo "  Sample symbols:"
              nm out/vmlinux 2>/dev/null | grep -i susfs | head -5
            else
              echo "  âš ï¸  No SUSFS symbols found (may be normal if stripped)"
            fi
          else
            echo "  âš ï¸  Cannot check symbols (nm not available or vmlinux missing)"
          fi

      - name: Check kernel output
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel/out

          if [ -f arch/arm64/boot/Image ]; then
            echo "CHECK_IMAGE=true" >> $GITHUB_ENV
            echo "KERNEL_VERSION=$(cat include/config/kernel.release)" >> $GITHUB_ENV
            
            IMAGE_SIZE=$(du -h arch/arm64/boot/Image | cut -f1)
            echo ""
            echo "âœ… Kernel Image built successfully!"
            echo "   Size: $IMAGE_SIZE"
          else
            echo "âŒ Kernel output file is empty"
            exit 1
          fi

      - name: Prepare AnyKernel3 and package
        run: |
          cd kernel_workspace
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3
          sed -i 's/do.devicecheck=1/do.devicecheck=0/g' AnyKernel3/anykernel.sh
          sed -i 's!BLOCK=/dev/block/platform/omap/omap_hsmmc.0/by-name/boot;!BLOCK=auto;!g' AnyKernel3/anykernel.sh
          sed -i 's/IS_SLOT_DEVICE=0;/IS_SLOT_DEVICE=auto;/g' AnyKernel3/anykernel.sh
          rm -rf AnyKernel3/.git* AnyKernel3/README.md
          cp android-kernel/out/arch/arm64/boot/Image AnyKernel3/

          cd AnyKernel3
          if [ "${{ matrix.ks }}" = "next" ]; then
            ZIP_NAME="AK3-${{ env.Lineage_VERSION }}-OPlus-SM8250-next_KSUN_SUSFS_${{ env.BUILD_TIME }}.zip"
          elif [ "${{ matrix.ks }}" = "rsuntk" ]; then
            ZIP_NAME="AK3-${{ env.Lineage_VERSION }}-OPlus-SM8250-rsuntk_KSU_SUSFS_${{ env.RSKSUVER }}.zip"
          else
            ZIP_NAME="AK3-${{ env.Lineage_VERSION }}-OPlus-SM8250-backslashxx_KSU_SUSFS_${{ env.XXKSUVER }}.zip"
          fi
          
          zip -r9 "$ZIP_NAME" ./* -x .git README.md *placeholder
          
          echo ""
          echo "âœ… Created flashable ZIP: $ZIP_NA

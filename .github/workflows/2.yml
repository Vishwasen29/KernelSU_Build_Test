name: A Test ABC Build LineageOS OPlus SM8250 Kernel with KSUN BB susfs

on:
  workflow_dispatch:

env:
  TZ: Asia/Kolkata

jobs:
  build:
    name: Build Kernel by ${{ github.actor }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ks: [rsuntk, backslashxx, next]

    env:
      CLANG_VERSION: clang-r547379
      Lineage_VERSION: lineage-23.2

    steps:
    - uses: actions/checkout@v4

    - name: Set swap to 10G
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 10

    - name: Setup build environment
      run: |
        echo "BUILD_TIME=$(TZ=Asia/Kolkata date "+%y%m%d")" >> $GITHUB_ENV
        echo "BUILD_TIME_1=$(TZ=Asia/Kolkata date "+%Y-%m-%d")" >> $GITHUB_ENV
        sudo apt-get update
        sudo apt-get install -y git ccache automake flex lzop bison gperf build-essential zip curl zlib1g-dev g++-multilib bzip2 libbz2-dev liblz4-tool make squashfs-tools dpkg-dev libssl-dev python3 bc libc6-dev-i386 libncurses5-dev
        mkdir -p $GITHUB_WORKSPACE/kernel_workspace

    - name: Cache Clang toolchain
      id: cache-clang
      uses: actions/cache@v5
      with:
        path: ${{ github.workspace }}/kernel_workspace/clang-aosp
        key: ${{ env.CLANG_VERSION }}

    - name: Download & extract Clang-aosp (if cache miss)
      if: steps.cache-clang.outputs.cache-hit != 'true'
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        mkdir -p clang-aosp
        wget -O ${CLANG_VERSION}.tar.gz \
          https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/${CLANG_VERSION}.tar.gz
        tar -C clang-aosp -zxvf ${CLANG_VERSION}.tar.gz

    - name: Download kernel source
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        git clone --recursive https://github.com/LineageOS/android_kernel_oneplus_sm8250 \
          -b ${{ env.Lineage_VERSION }} android-kernel --depth=1

    - name: Setup KSUN + BB (for rsuntk and backslashxx)
      if: matrix.ks != 'next'
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
        curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s legacy
        wget -O- https://github.com/vc-teahouse/Baseband-guard/raw/main/setup.sh | bash
        sed -i '/^config LSM$/,/^help$/{ /^[[:space:]]*default/ { /baseband_guard/! s/selinux/selinux,baseband_guard/ } }' security/Kconfig
        bash $GITHUB_WORKSPACE/patches/kernel-4.19_5.4-patch.sh
        
        if [ "${{ matrix.ks }}" = "rsuntk" ]; then
          curl -LSs "https://raw.githubusercontent.com/rsuntk/KernelSU/main/kernel/setup.sh" | bash -s susfs-rksu-master
          RSKSUVER=$(cd KernelSU && git describe --tags --always)
          echo "RSKSUVER=$RSKSUVER" >> $GITHUB_ENV
        elif [ "${{ matrix.ks }}" = "backslashxx" ]; then
          curl -LSs "https://raw.githubusercontent.com/backslashxx/KernelSU/main/kernel/setup.sh" | bash -s susfs
          XXKSUVER=$(cd KernelSU && git describe --tags --always)
          echo "XXKSUVER=$XXKSUVER" >> $GITHUB_ENV
        fi

    - name: Setup KernelSU-Next
      if: matrix.ks == 'next'
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
        # Setup KernelSU-Next
        curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s next
        
        # Setup Baseband Guard
        wget -O- https://github.com/vc-teahouse/Baseband-guard/raw/main/setup.sh | bash
        sed -i '/^config LSM$/,/^help$/{ /^[[:space:]]*default/ { /baseband_guard/! s/selinux/selinux,baseband_guard/ } }' security/Kconfig
        
        # Apply patches
        bash $GITHUB_WORKSPACE/patches/kernel-4.19_5.4-patch.sh
        
        # Get version info
        NEXTKSUVER=$(cd KernelSU && git describe --tags --always)
        echo "NEXTKSUVER=$NEXTKSUVER" >> $GITHUB_ENV

    - name: Enable SUSFS configs
      if: matrix.ks != 'next'
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
        cat <<EOF >> arch/arm64/configs/vendor/kona-perf_defconfig
           CONFIG_KSU_MANUAL_HOOK=y
           CONFIG_KSU_SUSFS=y
           CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y
           CONFIG_KSU_SUSFS_SUS_PATH=y
           CONFIG_KSU_SUSFS_SUS_MOUNT=y
           CONFIG_KSU_SUSFS_SUS_KSTAT=y
           CONFIG_KSU_SUSFS_SUS_OVERLAYFS=y
           CONFIG_KSU_SUSFS_TRY_UMOUNT=y
           CONFIG_KSU_SUSFS_SPOOF_UNAME=y
           CONFIG_KSU_SUSFS_OPEN_REDIRECT=y
           CONFIG_KSU_SUSFS_ENABLE_LOG=y
           CONFIG_KSU_SUSFS_SUS_SU=y
        EOF
        echo "[✓] SUSFS configs enabled"

    - name: Enable KernelSU-Next configs
      if: matrix.ks == 'next'
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
        cat <<EOF >> arch/arm64/configs/vendor/kona-perf_defconfig
           CONFIG_KSU=y
           CONFIG_KSU_MANUAL_HOOK=y
        EOF
        echo "[✓] KernelSU-Next configs enabled"

    - name: Build kernel
      run: |
        cd kernel_workspace/android-kernel
        export ARCH=arm64
        export SUBARCH=arm64
        export BRAND_SHOW_FLAG=oneplus
        export PATH=$GITHUB_WORKSPACE/kernel_workspace/clang-aosp/bin:$PATH
        export KBUILD_BUILD_HOST=Github-Action
        export KBUILD_BUILD_USER=$(echo ${{ github.actor }} | tr A-Z a-z)

        BA_CMD="CLANG_TRIPLE=aarch64-linux-gnu-"
        EX_CMD="LD=ld.lld LLVM=1"
        DEFCONFIG="vendor/kona-perf_defconfig vendor/oplus.config"

        make O=out CC=clang $BA_CMD $EX_CMD $DEFCONFIG
        make -j$(nproc --all) O=out CC=clang $BA_CMD $EX_CMD
        
        # Get kernel version
        KERNEL_VERSION=$(make O=out CC=clang kernelrelease | tail -n1)
        echo "KERNEL_VERSION=$KERNEL_VERSION" >> $GITHUB_ENV

    - name: Check kernel output
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel/out
        if [ -f arch/arm64/boot/Image ]; then
          echo "CHECK_IMAGE=true" >> $GITHUB_ENV
        else
          echo "Kernel build failed"
          exit 1
        fi

    - name: Setup AnyKernel3
      if: env.CHECK_IMAGE == 'true'
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        git clone https://github.com/osm0sis/AnyKernel3 --depth=1
        cd AnyKernel3
        
        # Copy kernel Image
        cp $GITHUB_WORKSPACE/kernel_workspace/android-kernel/out/arch/arm64/boot/Image ./
        
        # Set version string based on matrix
        if [ "${{ matrix.ks }}" = "rsuntk" ]; then
          VERSION_STR="${{ env.RSKSUVER }}"
        elif [ "${{ matrix.ks }}" = "backslashxx" ]; then
          VERSION_STR="${{ env.XXKSUVER }}"
        elif [ "${{ matrix.ks }}" = "next" ]; then
          VERSION_STR="${{ env.NEXTKSUVER }}"
        fi
        
        # Create ZIP file
        ZIP_NAME="AK3-${{ env.Lineage_VERSION }}-OPlus-SM8250-${{ matrix.ks }}_KSU_${VERSION_STR}_${{ env.BUILD_TIME }}.zip"
        zip -r9 "$ZIP_NAME" * -x .git README.md *placeholder
        
        echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

    - name: Upload Image
      if: env.CHECK_IMAGE == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: Image-${{ matrix.ks }}
        path: kernel_workspace/android-kernel/out/arch/arm64/boot/Image

    - name: Upload AnyKernel3 ZIP
      if: env.CHECK_IMAGE == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: AK3-${{ matrix.ks }}
        path: ${{ github.workspace }}/kernel_workspace/AnyKernel3/${{ env.ZIP_NAME }}

    - name: Save build info
      run: |
        cd kernel_workspace
        if [ "${{ matrix.ks }}" = "rsuntk" ]; then
          {
            echo "RSKSUVER=${{ env.RSKSUVER }}"
            echo "KERNEL_VERSION=${{ env.KERNEL_VERSION }}"
            echo "BUILD_TIME_1=${{ env.BUILD_TIME_1 }}"
          } > build-info-${{ matrix.ks }}.txt
        elif [ "${{ matrix.ks }}" = "backslashxx" ]; then
          {
            echo "XXKSUVER=${{ env.XXKSUVER }}"
            echo "KERNEL_VERSION=${{ env.KERNEL_VERSION }}"
            echo "BUILD_TIME_1=${{ env.BUILD_TIME_1 }}"
          } > build-info-${{ matrix.ks }}.txt
        elif [ "${{ matrix.ks }}" = "next" ]; then
          {
            echo "NEXTKSUVER=${{ env.NEXTKSUVER }}"
            echo "KERNEL_VERSION=${{ env.KERNEL_VERSION }}"
            echo "BUILD_TIME_1=${{ env.BUILD_TIME_1 }}"
          } > build-info-${{ matrix.ks }}.txt
        fi

    - name: Upload build info
      uses: actions/upload-artifact@v4
      with:
        name: INFO-${{ matrix.ks }}
        path: kernel_workspace/build-info-${{ matrix.ks }}.txt

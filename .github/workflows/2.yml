name: A Vishwas Build LineageOS OPlus SM8250 Kernel with KSUN BB susfs

on:
  workflow_dispatch:

env:
  TZ: Asia/Kolkata

jobs:
  build:
    name: Build Kernel by ${{ github.actor }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ks: [rsuntk, backslashxx, next]

    env:
      CLANG_VERSION: clang-r547379
      Lineage_VERSION: lineage-23.2

    steps:
      - uses: actions/checkout@v4

      - name: Set swap to 10G
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 10

      - name: Setup build environment
        run: |
          echo "BUILD_TIME=$(TZ=Asia/Kolkata date "+%y%m%d")" >> $GITHUB_ENV
          echo "BUILD_TIME_1=$(TZ=Asia/Kolkata date "+%Y-%m-%d")" >> $GITHUB_ENV
          sudo apt-get update
          sudo apt-get install -y git ccache automake flex lzop bison gperf build-essential zip curl zlib1g-dev g++-multilib bzip2 libbz2-dev liblz4-tool make squashfs-tools dpkg-dev libssl-dev python3 bc libc6-dev-i386 libncurses5-dev
          mkdir -p $GITHUB_WORKSPACE/kernel_workspace

      - name: Cache Clang toolchain
        id: cache-clang
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/kernel_workspace/clang-aosp
          key: ${{ env.CLANG_VERSION }}

      - name: Download & extract Clang-aosp (if cache miss)
        if: steps.cache-clang.outputs.cache-hit != 'true'
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace
          mkdir -p clang-aosp
          wget -O ${CLANG_VERSION}.tar.gz \
            https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/${CLANG_VERSION}.tar.gz
          tar -C clang-aosp -zxvf ${CLANG_VERSION}.tar.gz

      - name: Download kernel source
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace
          git clone --recursive https://github.com/LineageOS/android_kernel_oneplus_sm8250 \
            -b ${{ env.Lineage_VERSION }} android-kernel --depth=1

      - name: Setup KSUN + BB
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s legacy
          wget -O- https://github.com/vc-teahouse/Baseband-guard/raw/main/setup.sh | bash
          sed -i '/^config LSM$/,/^help$/{ /^[[:space:]]*default/ { /baseband_guard/! s/selinux/selinux,baseband_guard/ } }' security/Kconfig
          bash $GITHUB_WORKSPACE/patches/kernel-4.19_5.4-patch.sh

      - name: Apply SUSFS patch with inline fixes
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
          
          set +e
          git apply --reject --whitespace=fix $GITHUB_WORKSPACE/patches/sus2.patch
          set -e
          
          echo "=========================================="
          echo "Applying manual fixes for rejected hunks"
          echo "=========================================="
          
          # Fix 1: fs/Makefile
          echo "→ Fixing fs/Makefile..."
          if ! grep -q "CONFIG_KSU_SUSFS" fs/Makefile; then
            awk '
            /stack.o fs_struct.o statfs.o fs_pin.o nsfs.o/ {
                print
                getline
                print
                if ($0 ~ /fs_context.o fs_parser.o/) {
                    print ""
                    print "obj-$(CONFIG_KSU_SUSFS) += susfs.o"
                } else {
                    print ""
                    print "obj-$(CONFIG_KSU_SUSFS) += susfs.o"
                }
                next
            }
            { print }
            ' fs/Makefile > fs/Makefile.tmp && mv fs/Makefile.tmp fs/Makefile
            echo "  ✓ Fixed fs/Makefile"
          fi
          
          # Fix 2: fs/namespace.c - includes
          echo "→ Fixing fs/namespace.c includes..."
          if ! grep -q 'include <linux/susfs_def.h>' fs/namespace.c; then
            if grep -q '#include <linux/fs_context.h>' fs/namespace.c; then
              sed -i '/#include <linux\/fs_context\.h>/a\
          #ifdef CONFIG_KSU_SUSFS_SUS_MOUNT\
          #include <linux/susfs_def.h>\
          #endif' fs/namespace.c
            elif grep -q '#include <linux/sched/task.h>' fs/namespace.c; then
              sed -i '/#include <linux\/sched\/task\.h>/a\
          #ifdef CONFIG_KSU_SUSFS_SUS_MOUNT\
          #include <linux/susfs_def.h>\
          #endif' fs/namespace.c
            fi
            echo "  ✓ Fixed fs/namespace.c includes"
          fi
          
          # Fix 3: fs/namespace.c - declarations
          echo "→ Fixing fs/namespace.c declarations..."
          if ! grep -q "extern bool susfs_is_current_ksu_domain" fs/namespace.c; then
            sed -i '/#include "internal\.h"/a\
          \
          #ifdef CONFIG_KSU_SUSFS_SUS_MOUNT\
          extern bool susfs_is_current_ksu_domain(void);\
          extern bool susfs_is_sdcard_android_data_decrypted;\
          \
          static atomic64_t susfs_ksu_mounts = ATOMIC64_INIT(0);\
          \
          #define CL_COPY_MNT_NS BIT(25)\
          #endif' fs/namespace.c
            echo "  ✓ Fixed fs/namespace.c declarations"
          fi
          
          # Fix 4: fs/proc/task_mmu.c
          echo "→ Fixing fs/proc/task_mmu.c..."
          if ! grep -q "CONFIG_KSU_SUSFS_SUS_MAP" fs/proc/task_mmu.c; then
            sed -i '/while.*count.*start_vaddr.*end_vaddr/,/^[[:space:]]*}/ {
                /mmap_read_unlock(mm);/ {
                    a\
          #ifdef CONFIG_KSU_SUSFS_SUS_MAP\
          \t\tvma = find_vma(mm, start_vaddr);\
          \t\tif (vma && vma->vm_file) {\
          \t\t\tstruct inode *inode = file_inode(vma->vm_file);\
          \t\t\tif (unlikely(inode->i_mapping->flags & BIT_SUS_MAPS) && susfs_is_current_proc_umounted()) {\
          \t\t\t\tpm.buffer->pme = 0;\
          \t\t\t}\
          \t\t}\
          #endif
                }
            }' fs/proc/task_mmu.c
            echo "  ✓ Fixed fs/proc/task_mmu.c"
          fi
          
          # Fix 5: include/linux/mount.h
          echo "→ Fixing include/linux/mount.h..."
          if [ -f include/linux/mount.h ] && ! grep -q "unsigned long ksu_mnt;" include/linux/mount.h; then
            sed -i '/void \*data;/a\
          #ifdef CONFIG_KSU_SUSFS_SUS_MOUNT\
          \tunsigned long ksu_mnt;\
          #endif' include/linux/mount.h
            echo "  ✓ Fixed include/linux/mount.h"
          fi
          
          # Cleanup
          find . -name "*.rej" -delete 2>/dev/null || true
          find . -name "*.orig" -delete 2>/dev/null || true
          
          echo "=========================================="
          echo "✅ All manual fixes applied!"
          echo "=========================================="

      - name: Verify SUSFS Integration
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
          
          echo "=========================================="
          echo "🔍 Verifying SUSFS Integration"
          echo "=========================================="
          echo ""
          
          VERIFICATION_FAILED=0
          
          echo "1️⃣  Checking if susfs.c exists..."
          [ -f "fs/susfs.c" ] && echo "   ✅ fs/susfs.c found" || { echo "   ❌ fs/susfs.c NOT found"; VERIFICATION_FAILED=1; }
          
          echo "2️⃣  Checking if susfs.h exists..."
          [ -f "include/linux/susfs.h" ] && echo "   ✅ include/linux/susfs.h found" || { echo "   ❌ include/linux/susfs.h NOT found"; VERIFICATION_FAILED=1; }
          
          echo "3️⃣  Checking if susfs_def.h exists..."
          [ -f "include/linux/susfs_def.h" ] && echo "   ✅ include/linux/susfs_def.h found" || { echo "   ❌ include/linux/susfs_def.h NOT found"; VERIFICATION_FAILED=1; }
          
          echo "4️⃣  Checking fs/Makefile for susfs.o..."
          grep -q "CONFIG_KSU_SUSFS" fs/Makefile && echo "   ✅ susfs.o entry found" || { echo "   ❌ susfs.o NOT found"; VERIFICATION_FAILED=1; }
          
          echo "5️⃣  Checking fs/namespace.c for SUSFS includes..."
          grep -q 'include <linux/susfs_def.h>' fs/namespace.c && echo "   ✅ SUSFS includes found" || { echo "   ❌ SUSFS includes NOT found"; VERIFICATION_FAILED=1; }
          
          echo "6️⃣  Checking fs/namespace.c for SUSFS declarations..."
          grep -q "extern bool susfs_is_current_ksu_domain" fs/namespace.c && echo "   ✅ SUSFS declarations found" || { echo "   ❌ SUSFS declarations NOT found"; VERIFICATION_FAILED=1; }
          
          echo "7️⃣  Checking fs/proc/task_mmu.c for SUSFS code..."
          grep -q "CONFIG_KSU_SUSFS_SUS_MAP" fs/proc/task_mmu.c && grep -q "BIT_SUS_MAPS" fs/proc/task_mmu.c && echo "   ✅ SUSFS code found" || { echo "   ❌ SUSFS code NOT found"; VERIFICATION_FAILED=1; }
          
          echo "8️⃣  Checking include/linux/mount.h for ksu_mnt..."
          [ -f include/linux/mount.h ] && grep -q "unsigned long ksu_mnt;" include/linux/mount.h && echo "   ✅ ksu_mnt found" || echo "   ⚠️  ksu_mnt not found or file missing"
          
          echo "9️⃣  Checking fs/namei.c for SUSFS modifications..."
          grep -q "CONFIG_KSU_SUSFS_SUS_PATH" fs/namei.c && echo "   ✅ SUSFS modifications found" || { echo "   ❌ SUSFS modifications NOT found"; VERIFICATION_FAILED=1; }
          
          echo "🔟  Checking for .rej files..."
          [ $(find . -name "*.rej" -type f 2>/dev/null | wc -l) -eq 0 ] && echo "   ✅ No .rej files" || { echo "   ❌ .rej files found"; VERIFICATION_FAILED=1; }
          
          echo ""
          [ $VERIFICATION_FAILED -eq 0 ] && echo "✅ SUSFS INTEGRATION VERIFIED!" || { echo "❌ SUSFS INTEGRATION FAILED!"; exit 1; }

      - name: Enable SUSFS configs
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
          cat <<EOF >> arch/arm64/configs/vendor/kona-perf_defconfig
             CONFIG_KSU_MANUAL_HOOK=y
             CONFIG_KSU_SUSFS=y
             CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y
             CONFIG_KSU_SUSFS_SUS_PATH=y
             CONFIG_KSU_SUSFS_SUS_MOUNT=y
             CONFIG_KSU_SUSFS_SUS_KSTAT=y
             CONFIG_KSU_SUSFS_SUS_OVERLAYFS=y
             CONFIG_KSU_SUSFS_TRY_UMOUNT=y
             CONFIG_KSU_SUSFS_SPOOF_UNAME=y
             CONFIG_KSU_SUSFS_OPEN_REDIRECT=y
             CONFIG_KSU_SUSFS_ENABLE_LOG=y
             CONFIG_KSU_SUSFS_SUS_SU=y
          EOF
          echo "[✓] SUSFS configs enabled"

      - name: Build kernel
        run: |
          cd kernel_workspace/android-kernel
          export ARCH=arm64
          export SUBARCH=arm64
          export BRAND_SHOW_FLAG=oneplus
          export PATH=$GITHUB_WORKSPACE/kernel_workspace/clang-aosp/bin:$PATH
          export KBUILD_BUILD_HOST=Github-Action
          export KBUILD_BUILD_USER=$(echo ${{ github.actor }} | tr A-Z a-z)

          BA_CMD="CLANG_TRIPLE=aarch64-linux-gnu-"
          EX_CMD="LD=ld.lld LLVM=1"
          DEFCONFIG="vendor/kona-perf_defconfig vendor/oplus.config"

          make O=out CC=clang $BA_CMD $EX_CMD $DEFCONFIG
          make -j$(nproc --all) O=out CC=clang $BA_CMD $EX_CMD

      - name: Check kernel output
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel/out
          if [ -f arch/arm64/boot/Image ]; then
            echo "✅ Kernel Image built successfully"
            echo "CHECK_IMAGE=true" >> $GITHUB_ENV
          else
            echo "❌ Kernel build failed - Image not found"
            exit 1
          fi

      - name: Setup and Package AnyKernel3
        if: ${{ env.CHECK_IMAGE == 'true' }}
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace
          
          # Clone AnyKernel3
          if [ ! -d "AnyKernel3" ]; then
            git clone https://github.com/osm0sis/AnyKernel3 --depth=1
          fi
          
          cd AnyKernel3
          
          # Clean previous builds
          rm -f *.zip Image dtb dtbo
          
          # Configure AnyKernel3 for OnePlus 9R (SM8250)
          cat > anykernel.sh << 'EOF'
          # AnyKernel3 Ramdisk Mod Script
          # osm0sis @ xda-developers
          
          ## AnyKernel setup
          # begin properties
          properties() { '
          kernel.string=KernelSU SUSFS Kernel by ${{ github.actor }}
          do.devicecheck=1
          do.modules=0
          do.systemless=1
          do.cleanup=1
          do.cleanuponabort=0
          device.name1=lemonades
          device.name2=lemonadep
          device.name3=OnePlus9R
          device.name4=OnePlus9Pro
          supported.versions=11-15
          supported.patchlevels=
          '; } # end properties
          
          # shell variables
          block=/dev/block/bootdevice/by-name/boot;
          is_slot_device=1;
          ramdisk_compression=auto;
          patch_vbmeta_flag=auto;
          
          ## AnyKernel methods (DO NOT CHANGE)
          # import patching functions/variables - see for reference
          . tools/ak3-core.sh;
          
          ## AnyKernel boot install
          dump_boot;
          
          # begin ramdisk changes
          
          # end ramdisk changes
          
          write_boot;
          ## end boot install
          EOF
          
          # Copy kernel image
          cp $GITHUB_WORKSPACE/kernel_workspace/android-kernel/out/arch/arm64/boot/Image .
          
          # Check if dtb and dtbo exist, copy if they do
          if [ -f "$GITHUB_WORKSPACE/kernel_workspace/android-kernel/out/arch/arm64/boot/dtb" ]; then
            cp $GITHUB_WORKSPACE/kernel_workspace/android-kernel/out/arch/arm64/boot/dtb .
          fi
          
          if [ -f "$GITHUB_WORKSPACE/kernel_workspace/android-kernel/out/arch/arm64/boot/dtbo.img" ]; then
            cp $GITHUB_WORKSPACE/kernel_workspace/android-kernel/out/arch/arm64/boot/dtbo.img dtbo
          fi
          
          # Get kernel version
          cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
          KERNEL_VERSION=$(make kernelversion 2>/dev/null || echo "unknown")
          
          # Create ZIP
          cd $GITHUB_WORKSPACE/kernel_workspace/AnyKernel3
          ZIP_NAME="AK3-${{ env.Lineage_VERSION }}-OPlus-SM8250-${{ matrix.ks }}_KSU_SUSFS_${KERNEL_VERSION}_${{ env.BUILD_TIME }}.zip"
          zip -r9 "$ZIP_NAME" * -x .git README.md *placeholder .gitignore .gitattributes
          
          echo "✅ Created flashable ZIP: $ZIP_NAME"
          ls -lh "$ZIP_NAME"
          
          # Verify ZIP contents
          echo ""
          echo "ZIP contents:"
          unzip -l "$ZIP_NAME" | head -20

      - name: Upload Image
        if: ${{ env.CHECK_IMAGE == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: Image-${{ matrix.ks }}-${{ env.BUILD_TIME }}
          path: kernel_workspace/android-kernel/out/arch/arm64/boot/Image

      - name: Upload AnyKernel3 ZIP
        if: ${{ env.CHECK_IMAGE == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: AK3-${{ matrix.ks }}-${{ env.BUILD_TIME }}
          path: kernel_workspace/AnyKernel3/*.zip

      - name: Save build info
        run: |
          cd kernel_workspace
          {
            echo "=========================================="
            echo "Kernel Build Information"
            echo "=========================================="
            echo "Build Date: ${{ env.BUILD_TIME_1 }}"
            echo "Build Variant: ${{ matrix.ks }}"
            echo "Lineage Version: ${{ env.Lineage_VERSION }}"
            echo "Device: OnePlus 9R / 9 Pro (SM8250)"
            echo "Codename: lemonades / lemonadep"
            echo "=========================================="
            echo "Features:"
            echo "  - KernelSU (${{ matrix.ks }} variant)"
            echo "  - SUSFS (Integrated)"
            echo "  - Baseband Guard"
            echo "=========================================="
            echo "Flash Instructions:"
            echo "  1. Boot into TWRP/custom recovery"
            echo "  2. Flash the AK3 ZIP file"
            echo "  3. Reboot to system"
            echo "  OR"
            echo "  1. Use Franco Kernel Manager app"
            echo "  2. Select the AK3 ZIP file"
            echo "  3. Flash and reboot"
            echo "=========================================="
          } > build-info-${{ matrix.ks }}.txt

      - name: Upload build info
        uses: actions/upload-artifact@v4
        with:
          name: INFO-${{ matrix.ks }}-${{ env.BUILD_TIME }}
          path: kernel_workspace/build-info-${{ matrix.ks }}.txt
          

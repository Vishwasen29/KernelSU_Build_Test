name: 1 Build LineageOS OPlus SM8250 Kernel with SUSFS

on:
  workflow_dispatch:

env:
  TZ: Asia/Shanghai
  CLANG_VERSION: clang-r547379
  Lineage_VERSION: lineage-23.2

jobs:
  build:
    name: Build Kernel (${{ matrix.ks }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ks: [next]

    steps:
      - uses: actions/checkout@v6

      - name: Set swap to 10G
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 10

      - name: Setup build kernel environment
        run: |
          echo "BUILD_TIME=$(TZ=Asia/Shanghai date "+%y%m%d")" >> $GITHUB_ENV
          echo "BUILD_TIME_1=$(TZ=Asia/Shanghai date "+%Y-%m-%d")" >> $GITHUB_ENV
          sudo apt-get update
          sudo apt-get install -y git ccache automake flex lzop bison gperf build-essential zip curl zlib1g-dev g++-multilib bzip2 libbz2-dev liblz4-tool make squashfs-tools dpkg-dev libssl-dev python3 bc libc6-dev-i386 libncurses5-dev
          mkdir -p $GITHUB_WORKSPACE/kernel_workspace

      - name: Cache Clang toolchain
        id: cache-clang
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/kernel_workspace/clang-aosp
          key: ${{ env.CLANG_VERSION }}

      - name: Download & extract Clang-aosp (if cache miss)
        if: steps.cache-clang.outputs.cache-hit != 'true'
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace
          mkdir -p clang-aosp
          wget -O ${CLANG_VERSION}.tar.gz \
            https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/${CLANG_VERSION}.tar.gz
          tar -C clang-aosp -zxvf ${CLANG_VERSION}.tar.gz

      - name: Download kernel source
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace
          git clone --recursive https://github.com/LineageOS/android_kernel_oneplus_sm8250 -b ${{ env.Lineage_VERSION }} android-kernel --depth=1

      - name: Set up KernelSU-Next (${{ matrix.ks }})
        run: |
          cd kernel_workspace/android-kernel

          if [ "${{ matrix.ks }}" = "next" ]; then
            curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s legacy
            wget -O- https://github.com/vc-teahouse/Baseband-guard/raw/main/setup.sh | bash
            sed -i '/^config LSM$/,/^help$/{ /^[[:space:]]*default/ { /baseband_guard/! s/selinux/selinux,baseband_guard/ } }' security/Kconfig
            bash $GITHUB_WORKSPACE/patches/kernel-4.19_5.4-patch.sh
            echo "CONFIG_KSU_MANUAL_HOOK=y" >> arch/arm64/configs/vendor/kona-perf_defconfig
          elif [ "${{ matrix.ks }}" = "rsuntk" ]; then
            curl -LSs https://raw.githubusercontent.com/rsuntk/KernelSU/main/kernel/setup.sh | bash -s main
            bash $GITHUB_WORKSPACE/patches/kernel-4.19_5.4-patch.sh || true
            echo "CONFIG_KSU_MANUAL_HOOK=y" >> arch/arm64/configs/vendor/kona-perf_defconfig
            RSKSUVER=$(cd KernelSU && expr $(git rev-list --count HEAD) + 30000)
            echo "RSKSUVER=$RSKSUVER" >> $GITHUB_ENV
          else
            curl -LSs https://raw.githubusercontent.com/backslashxx/KernelSU/master/kernel/setup.sh | bash -s master
            echo "CONFIG_KSU_TAMPER_SYSCALL_TABLE=y" >> arch/arm64/configs/vendor/kona-perf_defconfig
            XXKSUVER=$(grep -oP 'KSU_VERSION\s*=\s*\K\d+' KernelSU/kernel/Makefile | tail -n1)
            echo "XXKSUVER=$XXKSUVER" >> $GITHUB_ENV
          fi

          sed -i 's/ -dirty//g' scripts/setlocalversion

      - name: Apply SUSFS patch with inline fixes
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
          
          echo "=========================================="
          echo "Г°ЕёвҖңВҰ Applying SUSFS Patch"
          echo "=========================================="
          
          if [ ! -f "$GITHUB_WORKSPACE/patches/sus2.patch" ]; then
            echo "ГўВқЕ’ ERROR: SUSFS patch file not found!"
            exit 1
          fi
          
          set +e
          git apply --reject --whitespace=fix $GITHUB_WORKSPACE/patches/sus2.patch
          set -e
          
          echo ""
          echo "=========================================="
          echo "Г°ЕёвҖқВ§ Applying Manual Fixes"
          echo "=========================================="
          
          # Fix 1: fs/Makefile
          echo ""
          echo "ГўвҖ вҖҷ Fixing fs/Makefile..."
          if ! grep -q "CONFIG_KSU_SUSFS" fs/Makefile; then
            awk '
            /stack.o fs_struct.o statfs.o fs_pin.o nsfs.o/ {
                print
                getline
                print
                if ($0 ~ /fs_context.o fs_parser.o/) {
                    print ""
                    print "obj-$(CONFIG_KSU_SUSFS) += susfs.o"
                } else {
                    print ""
                    print "obj-$(CONFIG_KSU_SUSFS) += susfs.o"
                }
                next
            }
            { print }
            ' fs/Makefile > fs/Makefile.tmp && mv fs/Makefile.tmp fs/Makefile
            echo "  ГўЕ“вҖҰ Fixed"
          else
            echo "  ГўЕ Лң Already fixed"
          fi
          
          # Fix 2: fs/namespace.c - includes
          echo ""
          echo "ГўвҖ вҖҷ Fixing fs/namespace.c includes..."
          if ! grep -q 'include <linux/susfs_def.h>' fs/namespace.c; then
            if grep -q '#include <linux/fs_context.h>' fs/namespace.c; then
              sed -i '/#include <linux\/fs_context\.h>/a\
          #ifdef CONFIG_KSU_SUSFS_SUS_MOUNT\
          #include <linux/susfs_def.h>\
          #endif' fs/namespace.c
              echo "  ГўЕ“вҖҰ Fixed"
            elif grep -q '#include <linux/sched/task.h>' fs/namespace.c; then
              sed -i '/#include <linux\/sched\/task\.h>/a\
          #ifdef CONFIG_KSU_SUSFS_SUS_MOUNT\
          #include <linux/susfs_def.h>\
          #endif' fs/namespace.c
              echo "  ГўЕ“вҖҰ Fixed"
            else
              echo "  ГўВқЕ’ Failed!"
              exit 1
            fi
          else
            echo "  ГўЕ Лң Already fixed"
          fi
          
          # Fix 3: fs/namespace.c - declarations
          echo ""
          echo "ГўвҖ вҖҷ Fixing fs/namespace.c declarations..."
          if ! grep -q "extern bool susfs_is_current_ksu_domain" fs/namespace.c; then
            sed -i '/#include "internal\.h"/a\
          \
          #ifdef CONFIG_KSU_SUSFS_SUS_MOUNT\
          extern bool susfs_is_current_ksu_domain(void);\
          extern bool susfs_is_sdcard_android_data_decrypted;\
          \
          static atomic64_t susfs_ksu_mounts = ATOMIC64_INIT(0);\
          \
          #define CL_COPY_MNT_NS BIT(25)\
          #endif' fs/namespace.c
            echo "  ГўЕ“вҖҰ Fixed"
          else
            echo "  ГўЕ Лң Already fixed"
          fi
          
          # Fix 4: fs/proc/task_mmu.c
          echo ""
          echo "ГўвҖ вҖҷ Fixing fs/proc/task_mmu.c..."
          if ! grep -q "CONFIG_KSU_SUSFS_SUS_MAP" fs/proc/task_mmu.c; then
            sed -i '/while.*count.*start_vaddr.*end_vaddr/,/^[[:space:]]*}/ {
                /mmap_read_unlock(mm);/ {
                    a\
          #ifdef CONFIG_KSU_SUSFS_SUS_MAP\
          \t\tvma = find_vma(mm, start_vaddr);\
          \t\tif (vma && vma->vm_file) {\
          \t\t\tstruct inode *inode = file_inode(vma->vm_file);\
          \t\t\tif (unlikely(inode->i_mapping->flags & BIT_SUS_MAPS) && susfs_is_current_proc_umounted()) {\
          \t\t\t\tpm.buffer->pme = 0;\
          \t\t\t}\
          \t\t}\
          #endif
                }
            }' fs/proc/task_mmu.c
            echo "  ГўЕ“вҖҰ Fixed"
          else
            echo "  ГўЕ Лң Already fixed"
          fi
          
          # Fix 5: include/linux/mount.h
          echo ""
          echo "ГўвҖ вҖҷ Fixing include/linux/mount.h..."
          if [ -f include/linux/mount.h ]; then
            if ! grep -q "unsigned long ksu_mnt;" include/linux/mount.h; then
              sed -i '/void \*data;/a\
          #ifdef CONFIG_KSU_SUSFS_SUS_MOUNT\
          \tunsigned long ksu_mnt;\
          #endif' include/linux/mount.h
              echo "  ГўЕ“вҖҰ Fixed"
            else
              echo "  ГўЕ Лң Already fixed"
            fi
          else
            echo "  ГўЕЎ ГҜВёВҸ  File not found"
          fi
          
          # Cleanup
          find . -name "*.rej" -delete 2>/dev/null || true
          find . -name "*.orig" -delete 2>/dev/null || true
          
          echo ""
          echo "=========================================="
          echo "ГўЕ“вҖҰ Fixes Complete"
          echo "=========================================="

      - name: Verify SUSFS Integration
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
          
          echo ""
          echo "=========================================="
          echo "Г°ЕёвҖқВҚ VERIFYING SUSFS INTEGRATION"
          echo "=========================================="
          echo ""
          
          FAILED=0
          
          [ -f "fs/susfs.c" ] && echo "  ГўЕ“вҖҰ fs/susfs.c" || { echo "  ГўВқЕ’ fs/susfs.c"; FAILED=1; }
          [ -f "include/linux/susfs.h" ] && echo "  ГўЕ“вҖҰ susfs.h" || { echo "  ГўВқЕ’ susfs.h"; FAILED=1; }
          [ -f "include/linux/susfs_def.h" ] && echo "  ГўЕ“вҖҰ susfs_def.h" || { echo "  ГўВқЕ’ susfs_def.h"; FAILED=1; }
          
          grep -q "CONFIG_KSU_SUSFS" fs/Makefile && echo "  ГўЕ“вҖҰ fs/Makefile" || { echo "  ГўВқЕ’ fs/Makefile"; FAILED=1; }
          grep -q 'include <linux/susfs_def.h>' fs/namespace.c && echo "  ГўЕ“вҖҰ namespace.c includes" || { echo "  ГўВқЕ’ namespace.c includes"; FAILED=1; }
          grep -q "extern bool susfs_is_current_ksu_domain" fs/namespace.c && echo "  ГўЕ“вҖҰ namespace.c declarations" || { echo "  ГўВқЕ’ namespace.c declarations"; FAILED=1; }
          grep -q "CONFIG_KSU_SUSFS_SUS_MAP" fs/proc/task_mmu.c && echo "  ГўЕ“вҖҰ task_mmu.c" || { echo "  ГўВқЕ’ task_mmu.c"; FAILED=1; }
          grep -q "CONFIG_KSU_SUSFS_SUS_PATH" fs/namei.c && echo "  ГўЕ“вҖҰ namei.c" || { echo "  ГўВқЕ’ namei.c"; FAILED=1; }
          
          [ $(find . -name "*.rej" 2>/dev/null | wc -l) -eq 0 ] && echo "  ГўЕ“вҖҰ No .rej files" || { echo "  ГўВқЕ’ .rej files exist"; FAILED=1; }
          
          echo ""
          if [ $FAILED -eq 0 ]; then
            echo "ГўЕ“вҖҰ VERIFICATION PASSED"
          else
            echo "ГўВқЕ’ VERIFICATION FAILED - Build aborted"
            exit 1
          fi

      - name: Enable SUSFS configs
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
          
          echo "ГўЕЎв„ўГҜВёВҸ  Enabling SUSFS configs..."
          
          cat >> arch/arm64/configs/vendor/kona-perf_defconfig << 'SUSFS_EOF'
          CONFIG_KSU_SUSFS=y
          CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_PATH=y
          CONFIG_KSU_SUSFS_SUS_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_KSTAT=y
          CONFIG_KSU_SUSFS_SUS_OVERLAYFS=y
          CONFIG_KSU_SUSFS_TRY_UMOUNT=y
          CONFIG_KSU_SUSFS_SPOOF_UNAME=y
          CONFIG_KSU_SUSFS_OPEN_REDIRECT=y
          CONFIG_KSU_SUSFS_ENABLE_LOG=y
          CONFIG_KSU_SUSFS_SUS_SU=y
          CONFIG_KSU_SUSFS_SUS_MAPS=y
          SUSFS_EOF
          
          echo "ГўЕ“вҖҰ SUSFS configs enabled"
          grep "CONFIG_KSU_SUSFS" arch/arm64/configs/vendor/kona-perf_defconfig | head -5

      - name: Build kernel
        run: |
          cd kernel_workspace/android-kernel
          export ARCH=arm64
          export SUBARCH=arm64
          export BRAND_SHOW_FLAG=oneplus
          export PATH=$GITHUB_WORKSPACE/kernel_workspace/clang-aosp/bin:$PATH
          export KBUILD_BUILD_HOST=Github-Action
          export KBUILD_BUILD_USER=$(echo ${{ github.actor }} | tr A-Z a-z)

          make O=out CC=clang CLANG_TRIPLE=aarch64-linux-gnu- LD=ld.lld LLVM=1 vendor/kona-perf_defconfig vendor/oplus.config
          make -j$(nproc --all) O=out CC=clang CLANG_TRIPLE=aarch64-linux-gnu- LD=ld.lld LLVM=1

      - name: Verify SUSFS in kernel
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
          
          echo "Г°ЕёвҖқВҚ Checking built kernel config..."
          
          if grep -q "^CONFIG_KSU_SUSFS=y" out/.config; then
            echo "ГўЕ“вҖҰ CONFIG_KSU_SUSFS is enabled"
          else
            echo "ГўЕЎ ГҜВёВҸ  CONFIG_KSU_SUSFS not found in .config"
          fi
          
          echo ""
          echo "SUSFS configs in built kernel:"
          grep "CONFIG_KSU_SUSFS" out/.config || echo "None found"

      - name: Check kernel output
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel/out

          if [ -f arch/arm64/boot/Image ]; then
            echo "CHECK_IMAGE=true" >> $GITHUB_ENV
            echo "KERNEL_VERSION=$(cat include/config/kernel.release)" >> $GITHUB_ENV
            echo "ГўЕ“вҖҰ Kernel built: $(du -h arch/arm64/boot/Image | cut -f1)"
          else
            echo "ГўВқЕ’ Build failed"
            exit 1
          fi

      - name: Package AnyKernel3
        run: |
          cd kernel_workspace
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3
          sed -i 's/do.devicecheck=1/do.devicecheck=0/g' AnyKernel3/anykernel.sh
          sed -i 's!BLOCK=/dev/block/platform/omap/omap_hsmmc.0/by-name/boot;!BLOCK=auto;!g' AnyKernel3/anykernel.sh
          sed -i 's/IS_SLOT_DEVICE=0;/IS_SLOT_DEVICE=auto;/g' AnyKernel3/anykernel.sh
          rm -rf AnyKernel3/.git* AnyKernel3/README.md
          cp android-kernel/out/arch/arm64/boot/Image AnyKernel3/

          cd AnyKernel3
          ZIP_NAME="AK3-${{ env.Lineage_VERSION }}-SM8250-${{ matrix.ks }}-SUSFS-${{ env.BUILD_TIME }}.zip"
          zip -r9 "$ZIP_NAME" ./* -x .git README.md
          
          echo "ГўЕ“вҖҰ Created: $ZIP_NAME"
          ls -lh "$ZIP_NAME"

      - name: Upload Image
        if: env.CHECK_IMAGE == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: Image-${{ matrix.ks }}-${{ env.BUILD_TIME }}
          path: kernel_workspace/android-kernel/out/arch/arm64/boot/Image

      - name: Upload AnyKernel3 ZIP
        uses: actions/upload-artifact@v6
        with:
          name: AK3-${{ matrix.ks }}-${{ env.BUILD_TIME }}
          path: kernel_workspace/AnyKernel3/*.zip

      - name: Upload build info
        run: |
          cd kernel_workspace
          cat > build-info.txt << 'INFO_EOF'
          ==========================================
          Kernel Build Information
          ==========================================
          Variant: ${{ matrix.ks }}
          Version: ${{ env.KERNEL_VERSION }}
          Build Date: ${{ env.BUILD_TIME_1 }}
          
          Features:
            ГўЕ“вҖҰ KernelSU/KernelSU-Next
            ГўЕ“вҖҰ SUSFS (Verified)
            ГўЕ“вҖҰ Baseband Guard
          
          Device: OnePlus 9R/9 Pro (SM8250)
          ==========================================
          INFO_EOF

      - name: Upload info
        uses: actions/upload-artifact@v6
        with:
          name: INFO-${{ matrix.ks }}-${{ env.BUILD_TIME }}
          path: kernel_workspace/build-info.txt

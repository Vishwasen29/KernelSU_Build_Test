name: A Build LineageOS OPlus SM8250 Kernel (KernelSU-Next Legacy + SUSFS)

on:
  workflow_dispatch:

env:
  TZ: Asia/Shanghai
  CLANG_VERSION: clang-r547379
  Lineage_VERSION: lineage-23.2

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set swap to 10G
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 10

    - name: Install build dependencies
      run: |
        echo "BUILD_TIME=$(TZ=Asia/Shanghai date "+%y%m%d")" >> $GITHUB_ENV
        echo "BUILD_TIME_1=$(TZ=Asia/Shanghai date "+%Y-%m-%d")" >> $GITHUB_ENV
        sudo apt update
        sudo apt install -y git bc bison build-essential curl flex gperf \
          libncurses5-dev libssl-dev lzop zip unzip \
          libelf-dev clang lld python3 binutils-aarch64-linux-gnu
        mkdir -p kernel_workspace

    - name: Cache Clang toolchain
      id: cache-clang
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/kernel_workspace/clang-aosp
        key: ${{ env.CLANG_VERSION }}

    - name: Download Clang (if cache miss)
      if: steps.cache-clang.outputs.cache-hit != 'true'
      run: |
        cd kernel_workspace
        mkdir clang-aosp
        wget -O ${CLANG_VERSION}.tar.gz \
          https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/${CLANG_VERSION}.tar.gz
        tar -C clang-aosp -zxvf ${CLANG_VERSION}.tar.gz

    - name: Clone Lineage kernel
      run: |
        cd kernel_workspace
        git clone --depth=1 --recursive \
          https://github.com/LineageOS/android_kernel_oneplus_sm8250 \
          -b ${{ env.Lineage_VERSION }} android-kernel

    - name: Setup KernelSU-Next (legacy)
      run: |
        cd kernel_workspace/android-kernel
        curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s legacy
        RSKSUVER=$(( $(cd KernelSU-Next && git rev-list --count HEAD) + 30000 ))
        echo "RSKSUVER=$RSKSUVER" >> $GITHUB_ENV
        sed -i 's/ -dirty//g' scripts/setlocalversion

    # -------------------------------------------------------------------------
    # Patch KernelSU-Next for 4.19 non-GKI manual hook build
    #
    # TWO PROBLEMS to solve:
    #
    # 1. Kbuild:109 checks: ifeq ($(CONFIG_KSU_MANUAL_HOOK)$(CONFIG_KSU_KPROBES_HOOK),)
    #    This is a Makefile-level check that reads .config directly. It fires
    #    when NEITHER hook config is set. We patch it out because we know we are
    #    using manual hooks â€” the check adds no value in CI and blocks the build.
    #
    # 2. syncconfig strips CONFIG_KSU_MANUAL_HOOK from .config because the
    #    Kconfig entry has unresolvable dependencies at parse time. We fix this
    #    by removing ALL 'depends on' lines from config KSU_* blocks in the
    #    Kconfig file, using the relax_ksu_kconfig.sh script.
    # -------------------------------------------------------------------------
    - name: Patch KernelSU-Next for 4.19 manual hooks
      run: |
        cd kernel_workspace/android-kernel

        # ---- Fix 1: Patch Kbuild to remove the hook-presence check ----
        # The Kbuild error at line ~109 is:
        #   ifeq ($(CONFIG_KSU_MANUAL_HOOK)$(CONFIG_KSU_KPROBES_HOOK),)
        #   $(error -- KernelSU-Next: No hooks were defined ...)
        #   endif
        # We replace the $(error ...) line with a warning so the build continues.
        KBUILD=$(find . -path "*/kernelsu/Kbuild" -not -path "./out/*" | head -1)
        if [ -z "$KBUILD" ]; then
          # Also check via the symlink target
          KBUILD=$(find KernelSU-Next -name "Kbuild" 2>/dev/null | head -1)
        fi

        if [ -n "$KBUILD" ]; then
          echo "[INFO] Patching Kbuild: $KBUILD"
          # Replace $(error ...) with $(warning ...) so build continues
          sed -i 's/\$(error -- KernelSU-Next: No hooks were defined/$(warning -- KernelSU-Next: No hooks check skipped/' "$KBUILD"
          echo "[OK] Kbuild hook check patched"
          grep -n "hooks" "$KBUILD" | head -5
        else
          echo "[WARN] Kbuild not found â€” skipping Kbuild patch"
        fi

        echo ""

        # ---- Fix 2: Relax Kconfig depends so syncconfig keeps MANUAL_HOOK ----
        mapfile -t KCONFIGS < <(find . -name "Kconfig" \
          -not -path "./.git/*" \
          -not -path "./out/*" \
          -exec grep -l "^config KSU" {} \; 2>/dev/null)

        if [ ${#KCONFIGS[@]} -eq 0 ]; then
          echo "[WARN] No KSU Kconfig files found"
        else
          for KCONFIG in "${KCONFIGS[@]}"; do
            echo "[INFO] Relaxing Kconfig: $KCONFIG"
            python3 $GITHUB_WORKSPACE/patches/relax_ksu_kconfig.sh "$KCONFIG"
          done
        fi

        echo ""
        echo "[OK] KernelSU-Next 4.19 patches applied"

    # -------------------------------------------------------------------------
    # Fix schgm-flash.c / schgm-flash.h clang build errors
    #
    # schgm-flash.c is the SMB5 flash GPIO driver. It accesses SMB5-specific
    # members of struct smb_charger (flash_derating_soc, flash_disable_soc,
    # headroom_mode, flash_active, flash_init_done) that only exist in smb5-lib.h,
    # not in smb-lib.h. It also uses smblib_read/smblib_write and struct smb_irq_data.
    # schgm-flash.h declares function prototypes using struct smb_charger * but
    # never provides a definition or forward declaration of the struct.
    #
    # Newer clang (r547379+) rejects all of this with hard errors.
    #
    # Fix:
    #   - schgm-flash.h: add 'struct smb_charger;' forward declaration so the
    #     function prototypes compile without needing the full struct definition.
    #   - schgm-flash.c: add '#include "smb5-lib.h"' which defines the complete
    #     struct smb_charger with all SMB5 flash members, struct smb_irq_data,
    #     and declares smblib_read / smblib_write.
    # -------------------------------------------------------------------------
    - name: Fix schgm-flash.c clang build error
      run: |
        DIR="kernel_workspace/android-kernel/drivers/power/supply/qcom"
        HDR="$DIR/schgm-flash.h"
        SRC="$DIR/schgm-flash.c"

        # schgm-flash.c uses struct smb_charger members and calls smblib_* functions
        # all defined in smb5-lib.h. smb5-lib.h must come BEFORE schgm-flash.h so
        # the full struct definition is visible when schgm-flash.h prototypes are parsed.

        # Step 1: clean up any previously inserted includes from prior attempts
        sed -i '/#include "smb-lib.h"/d' "$SRC"
        sed -i '/#include "smb5-lib.h"/d' "$SRC"

        # Step 2: insert smb5-lib.h BEFORE schgm-flash.h
        sed -i '/#include "schgm-flash.h"/i #include "smb5-lib.h"' "$SRC"
        echo "[OK] Inserted smb5-lib.h before schgm-flash.h in schgm-flash.c"

        # Step 3: add forward decl to schgm-flash.h for files that include it
        # without smb5-lib.h (prevents -Wvisibility on the function prototypes)
        if grep -q "^struct smb_charger;" "$HDR"; then
          echo "[SKIP] forward decl already in schgm-flash.h"
        else
          sed -i '/schgm_flash_get_vreg_ok/i struct smb_charger;' "$HDR"
          echo "[OK] Added 'struct smb_charger;' forward decl to schgm-flash.h"
        fi

        echo ""
        echo "schgm-flash.c include order (smb5-lib.h must be before schgm-flash.h):"
        grep -n "^#include" "$SRC" | head -10
        echo "schgm-flash.h forward decls:"
        grep -n "^struct smb_charger" "$HDR"

    - name: Apply SUSFS patch
      run: |
        cd kernel_workspace/android-kernel
        git apply --reject --whitespace=fix \
          $GITHUB_WORKSPACE/patches/sus4.patch || true

    - name: Fix SUSFS rejects
      run: |
        cd kernel_workspace/android-kernel
        bash $GITHUB_WORKSPACE/patches/fix3.sh

        # Re-run Kconfig relaxation now that the SUSFS patch has added its
        # own Kconfig file (with 'depends on KSU_SUSFS' entries). The first
        # relaxation (step 9) ran before the patch, so it never saw these.
        # Without this, syncconfig strips all CONFIG_KSU_SUSFS* at build time.
        mapfile -t KCONFIGS < <(find . -name "Kconfig" \
          -not -path "./.git/*" \
          -not -path "./out/*" \
          -exec grep -l "^config KSU" {} \; 2>/dev/null)
        for KCONFIG in "${KCONFIGS[@]}"; do
          echo "[INFO] Re-relaxing Kconfig: $KCONFIG"
          python3 $GITHUB_WORKSPACE/patches/relax_ksu_kconfig.sh "$KCONFIG"
        done
        echo "[OK] SUSFS Kconfig dependencies relaxed"

    - name: Verify SUSFS source integration (pre-build)
      run: |
        cd kernel_workspace/android-kernel
        echo "================================================"
        echo " SUSFS Pre-Build Source Check"
        echo "================================================"
        FAIL=0
        check() {
          [ "$2" = "ok" ] && echo "  [PASS] $1" || { echo "  [FAIL] $1"; FAIL=$((FAIL+1)); }
        }
        [ -f "fs/susfs.c" ]               && check "fs/susfs.c exists" ok               || check "fs/susfs.c exists" fail
        [ -f "include/linux/susfs.h" ]     && check "include/linux/susfs.h exists" ok     || check "include/linux/susfs.h exists" fail
        [ -f "include/linux/susfs_def.h" ] && check "include/linux/susfs_def.h exists" ok || check "include/linux/susfs_def.h exists" fail
        grep -q "CONFIG_KSU_SUSFS.*susfs\.o" fs/Makefile \
          && check "fs/Makefile has susfs.o" ok || check "fs/Makefile has susfs.o" fail
        grep -q "susfs_mnt_id_backup" include/linux/mount.h \
          && check "mount.h has susfs_mnt_id_backup" ok || check "mount.h has susfs_mnt_id_backup" fail
        grep -q "susfs_def\.h" fs/namespace.c \
          && check "namespace.c includes susfs_def.h" ok || check "namespace.c includes susfs_def.h" fail
        grep -q "CONFIG_KSU_SUSFS_SUS_MAP" fs/proc/task_mmu.c \
          && check "task_mmu.c has SUS_MAP block" ok || check "task_mmu.c has SUS_MAP block" fail
        REJ=$(find . -name "*.rej" 2>/dev/null)
        [ -z "$REJ" ] && check "No leftover .rej files" ok \
          || { echo "  [FAIL] Leftover .rej files:"; echo "$REJ" | sed 's/^/    /'; FAIL=$((FAIL+1)); }
        echo "------------------------------------------------"
        echo "  Result: $FAIL failure(s)"
        echo "================================================"
        [ "$FAIL" -eq 0 ] || exit 1

    - name: Generate .config
      run: |
        cd kernel_workspace/android-kernel
        export ARCH=arm64
        export SUBARCH=arm64
        export PATH=$GITHUB_WORKSPACE/kernel_workspace/clang-aosp/bin:$PATH
        make O=out CC=clang \
          CLANG_TRIPLE=aarch64-linux-gnu- LD=ld.lld LLVM=1 \
          vendor/kona-perf_defconfig

    # -------------------------------------------------------------------------
    # Enable SUSFS configs by direct write to out/.config
    #
    # WHY NOT KCONFIG_ALLCONFIG + olddefconfig:
    #   KCONFIG_ALLCONFIG only works with the 'allconfig' make target â€” it has
    #   no effect on 'olddefconfig' or the internal 'syncconfig' that runs
    #   automatically at the start of every normal build. Both strip any config
    #   whose Kconfig 'depends on' chain is unsatisfied.
    #
    # WHY NOT defconfig append:
    #   'make defconfig' evaluates Kconfig and discards unknown/unsatisfied
    #   entries silently. Writing CONFIG_KSU_SUSFS=y to defconfig before
    #   'make defconfig' runs has no effect if the dependency isn't met.
    #
    # SOLUTION â€” direct write + Kconfig dependency removal (done above):
    #   1. We already removed the 'depends on KSU_SUSFS' lines from Kconfig,
    #      so syncconfig no longer has a reason to strip sub-configs.
    #   2. We write directly to out/.config so the configs are present
    #      immediately without going through Kconfig evaluation again.
    #   3. We do NOT run olddefconfig/syncconfig after this write â€” that
    #      would just undo the work. The next thing that runs is make -j
    #      which will run syncconfig once, but now with relaxed dependencies
    #      the configs will be retained.
    # -------------------------------------------------------------------------
    - name: Enable SUSFS configs
      run: |
        cd kernel_workspace/android-kernel
        CONFIG="out/.config"

        set_config() {
          local key="$1"
          # Remove any existing entry (=y, =n, =m, or "# KEY is not set")
          sed -i "/^${key}[= ]/d" "$CONFIG"
          sed -i "/^# ${key} is not set/d" "$CONFIG"
          echo "${key}=y" >> "$CONFIG"
          echo "  SET: ${key}=y"
        }

        echo "Writing KSU + SUSFS configs directly to out/.config..."
        # KSU_MANUAL_HOOK required for 4.19 non-GKI â€” write here because
        # make defconfig strips it if its Kconfig dependency isnt met
        set_config CONFIG_KSU_MANUAL_HOOK
        set_config CONFIG_KSU_SUSFS
        set_config CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT
        set_config CONFIG_KSU_SUSFS_SUS_PATH
        set_config CONFIG_KSU_SUSFS_SUS_MOUNT
        set_config CONFIG_KSU_SUSFS_SUS_KSTAT
        set_config CONFIG_KSU_SUSFS_SUS_OVERLAYFS
        set_config CONFIG_KSU_SUSFS_TRY_UMOUNT
        set_config CONFIG_KSU_SUSFS_SPOOF_UNAME
        set_config CONFIG_KSU_SUSFS_OPEN_REDIRECT
        set_config CONFIG_KSU_SUSFS_ENABLE_LOG
        set_config CONFIG_KSU_SUSFS_SUS_SU
        set_config CONFIG_KSU_SUSFS_SUS_MAP

        echo ""
        echo "=== SUSFS entries in .config ==="
        grep "CONFIG_KSU_SUSFS" "$CONFIG"

    - name: Verify SUSFS configs in .config (pre-compile)
      run: |
        cd kernel_workspace/android-kernel
        CONFIG="out/.config"
        echo "================================================"
        echo " SUSFS .config Verification"
        echo "================================================"
        FAIL=0
        check_config() {
          local val
          val=$(grep -E "^${1}=" "$CONFIG" 2>/dev/null || echo "NOT_SET")
          if echo "$val" | grep -q "=y$"; then
            echo "  [PASS] ${1}=y"
          else
            echo "  [FAIL] ${1} â†’ $val"
            FAIL=$((FAIL+1))
          fi
        }
        check_config CONFIG_KSU
        check_config CONFIG_KSU_MANUAL_HOOK
        check_config CONFIG_KSU_SUSFS
        check_config CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT
        check_config CONFIG_KSU_SUSFS_SUS_PATH
        check_config CONFIG_KSU_SUSFS_SUS_MOUNT
        check_config CONFIG_KSU_SUSFS_SUS_KSTAT
        check_config CONFIG_KSU_SUSFS_SUS_OVERLAYFS
        check_config CONFIG_KSU_SUSFS_TRY_UMOUNT
        check_config CONFIG_KSU_SUSFS_SPOOF_UNAME
        check_config CONFIG_KSU_SUSFS_OPEN_REDIRECT
        check_config CONFIG_KSU_SUSFS_ENABLE_LOG
        check_config CONFIG_KSU_SUSFS_SUS_SU
        check_config CONFIG_KSU_SUSFS_SUS_MAP
        echo "------------------------------------------------"
        echo "  Result: $FAIL failure(s)"
        echo "================================================"
        [ "$FAIL" -eq 0 ] || exit 1

    # -------------------------------------------------------------------------
    # Add weak stub implementations for missing OPlus/SMB symbols
    #
    # Several OPlus-specific symbols are referenced by compiled drivers but
    # their defining drivers (oplus_project, oplus_chg, smb5-lib, etc.) are
    # either not compiled or not linked due to missing configs in the LineageOS
    # defconfig. LLD (unlike GNU ld) treats unresolved symbols as hard errors.
    #
    # Fix: inject a single C file with __weak stub implementations.
    # __weak means: use this definition ONLY if no stronger definition exists.
    # If the real driver IS compiled and exports the symbol, the linker uses
    # that instead. Stubs return safe no-op values (0, NOTIFY_DONE, -ENODEV).
    # -------------------------------------------------------------------------
    - name: Add OPlus symbol stubs
      run: |
        bash $GITHUB_WORKSPACE/patches/inject_oplus_stubs.sh \
          $GITHUB_WORKSPACE/kernel_workspace/android-kernel

    - name: Finalize and freeze config
      run: |
        cd kernel_workspace/android-kernel

        # Regenerate headers once
        make O=out olddefconfig

        # Prevent future silent syncconfig updates
        touch out/include/config/auto.conf
        touch out/include/generated/autoconf.h

    - name: Build kernel
      run: |
        cd kernel_workspace/android-kernel
        export ARCH=arm64
        export SUBARCH=arm64
        export PATH=$GITHUB_WORKSPACE/kernel_workspace/clang-aosp/bin:$PATH
        make -j$(nproc) O=out CC=clang \
        CLANG_TRIPLE=aarch64-linux-gnu- LD=ld.lld LLVM=1 \
        KCONFIG_NOSILENTUPDATE=1

    - name: Check kernel output
      run: |
        cd kernel_workspace/android-kernel/out
        if [ -f arch/arm64/boot/Image ]; then
          echo "CHECK_IMAGE=true" >> $GITHUB_ENV
          echo "KERNEL_VERSION=$(cat include/config/kernel.release)" >> $GITHUB_ENV
        else
          echo "Image not found"; exit 1
        fi

    - name: Verify SUSFS compiled into kernel (post-build)
      run: |
        cd kernel_workspace/android-kernel
        echo "================================================"
        echo " SUSFS Post-Build Verification"
        echo "================================================"
        FAIL=0
        check() {
          [ "$2" = "ok" ] && echo "  [PASS] $1" || { echo "  [FAIL] $1"; FAIL=$((FAIL+1)); }
        }

        # susfs.o â€” find anywhere in out/
        SUSFS_OBJ=$(find out/ -name "susfs.o" 2>/dev/null | head -1)
        [ -n "$SUSFS_OBJ" ] \
          && check "susfs.o compiled ($SUSFS_OBJ)" ok \
          || check "susfs.o not found in out/" fail

        # System.map symbols
        if [ -f out/System.map ]; then
          COUNT=$(grep -c "susfs_" out/System.map 2>/dev/null || echo 0)
          COUNT=$(echo "$COUNT" | tr -d '[:space:]')
          [ "${COUNT:-0}" -gt 0 ] 2>/dev/null \
            && { check "System.map has $COUNT susfs_ symbols" ok
                 grep "susfs_" out/System.map | head -5 | sed 's/^/    /'; } \
            || check "System.map: no susfs_ symbols" fail
        else
          echo "  [WARN] System.map not found"
        fi

        # .config survived the build
        grep -q "^CONFIG_KSU_SUSFS=y" out/.config 2>/dev/null \
          && check "out/.config has CONFIG_KSU_SUSFS=y after build" ok \
          || check "out/.config has CONFIG_KSU_SUSFS=y after build" fail

        # All built SUSFS/KSU objects
        echo ""
        echo "  Built SUSFS/KSU objects:"
        find out/ -name "*.o" 2>/dev/null | grep -iE "susfs|ksu" \
          | sed 's/^/    /' || echo "    (none)"

        echo "------------------------------------------------"
        echo "  Result: $FAIL failure(s)"
        echo "================================================"
        [ "$FAIL" -eq 0 ] || exit 1

    - name: Package AnyKernel3
      run: |
        cd kernel_workspace
        git clone --depth=1 https://github.com/osm0sis/AnyKernel3
        sed -i 's/do.devicecheck=1/do.devicecheck=0/g' AnyKernel3/anykernel.sh
        sed -i 's!BLOCK=/dev/block/platform/omap/omap_hsmmc.0/by-name/boot;!BLOCK=auto;!g' AnyKernel3/anykernel.sh
        sed -i 's/IS_SLOT_DEVICE=0;/IS_SLOT_DEVICE=auto;/g' AnyKernel3/anykernel.sh
        rm -rf AnyKernel3/.git* AnyKernel3/README.md
        cp android-kernel/out/arch/arm64/boot/Image AnyKernel3/
        cd AnyKernel3
        zip -r AK3-${{ env.Lineage_VERSION }}-SM8250-KSU_${{ env.RSKSUVER }}.zip ./*

    - name: Upload Image
      if: env.CHECK_IMAGE == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: Image
        path: kernel_workspace/android-kernel/out/arch/arm64/boot/Image

    - name: Upload ZIP
      uses: actions/upload-artifact@v4
      with:
        name: AnyKernel3-ZIP
        path: kernel_workspace/AnyKernel3/*.zip

    - name: Upload build info
      uses: actions/upload-artifact@v4
      with:
        name: build-info
        path: |
          kernel_workspace/android-kernel/out/include/config/kernel.release

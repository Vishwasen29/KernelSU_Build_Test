name: 6 Build LineageOS OPlus SM8250 Kernel (KernelSU-Next Legacy)

on:
  workflow_dispatch:

env:
  TZ: Asia/Shanghai
  CLANG_VERSION: clang-r547379
  Lineage_VERSION: lineage-23.2

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    # ---------------------------------------------------------
    # Swap
    # ---------------------------------------------------------
    - name: Set swap to 10G
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 10

    # ---------------------------------------------------------
    # Dependencies
    # ---------------------------------------------------------
    - name: Install build dependencies
      run: |
        echo "BUILD_TIME=$(TZ=Asia/Shanghai date "+%y%m%d")" >> $GITHUB_ENV
        echo "BUILD_TIME_1=$(TZ=Asia/Shanghai date "+%Y-%m-%d")" >> $GITHUB_ENV

        sudo apt update
        sudo apt install -y git bc bison build-essential curl flex gperf \
          libncurses5-dev libssl-dev lzop zip unzip \
          libelf-dev clang lld python3

        mkdir -p kernel_workspace

    # ---------------------------------------------------------
    # Cache Clang
    # ---------------------------------------------------------
    - name: Cache Clang toolchain
      id: cache-clang
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/kernel_workspace/clang-aosp
        key: ${{ env.CLANG_VERSION }}

    - name: Download Clang (if cache miss)
      if: steps.cache-clang.outputs.cache-hit != 'true'
      run: |
        cd kernel_workspace
        mkdir clang-aosp
        wget -O ${CLANG_VERSION}.tar.gz \
          https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/${CLANG_VERSION}.tar.gz
        tar -C clang-aosp -zxvf ${CLANG_VERSION}.tar.gz

    # ---------------------------------------------------------
    # Clone Kernel Source
    # ---------------------------------------------------------
    - name: Clone Lineage Kernel
      run: |
        cd kernel_workspace
        git clone --depth=1 --recursive \
          https://github.com/LineageOS/android_kernel_oneplus_sm8250 \
          -b ${{ env.Lineage_VERSION }} android-kernel

    # ---------------------------------------------------------
    # Setup KernelSU-Next (LEGACY)
    # ---------------------------------------------------------
    - name: Setup KernelSU-Next (legacy)
      run: |
        cd kernel_workspace/android-kernel

        curl -LSs \
          https://raw.githubusercontent.com/sidex15/KernelSU-Next/legacy/kernel/setup.sh \
          | bash -s legacy

        # Required for 4.19 manual hook
        echo "CONFIG_KSU_MANUAL_HOOK=y" >> arch/arm64/configs/vendor/kona-perf_defconfig

        # Calculate version
        RSKSUVER=$(( $(cd KernelSU && git rev-list --count HEAD) + 30000 ))
        echo "RSKSUVER=$RSKSUVER" >> $GITHUB_ENV

        sed -i 's/ -dirty//g' scripts/setlocalversion

    # ---------------------------------------------------------
    # Apply SUSFS Patch
    # ---------------------------------------------------------
    - name: Apply SUSFS patch
      run: |
        cd kernel_workspace/android-kernel
        git apply --reject --whitespace=fix \
          $GITHUB_WORKSPACE/patches/sus4.patch || true

    - name: Fix SUSFS rejects
      run: |
        cd kernel_workspace/android-kernel
        bash $GITHUB_WORKSPACE/patches/fix3.sh

    # ---------------------------------------------------------
    # Generate Defconfig
    # ---------------------------------------------------------
    - name: Generate kernel .config
      run: |
        cd kernel_workspace/android-kernel

        export ARCH=arm64
        export SUBARCH=arm64
        export PATH=$GITHUB_WORKSPACE/kernel_workspace/clang-aosp/bin:$PATH

        make O=out CC=clang \
          CLANG_TRIPLE=aarch64-linux-gnu- LD=ld.lld LLVM=1 \
          vendor/kona-perf_defconfig

    # ---------------------------------------------------------
    # Enable SUSFS via Kconfig Fragment (Correct Way)
    # ---------------------------------------------------------
    - name: Enable SUSFS configs
      run: |
        cd kernel_workspace/android-kernel

        cat > out/susfs_fragment.config <<EOF
         CONFIG_KSU_SUSFS=y
         CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y
         CONFIG_KSU_SUSFS_SUS_PATH=y
         CONFIG_KSU_SUSFS_SUS_MOUNT=y
         CONFIG_KSU_SUSFS_SUS_KSTAT=y
         CONFIG_KSU_SUSFS_SUS_OVERLAYFS=y
         CONFIG_KSU_SUSFS_TRY_UMOUNT=y
         CONFIG_KSU_SUSFS_SPOOF_UNAME=y
         CONFIG_KSU_SUSFS_OPEN_REDIRECT=y
         CONFIG_KSU_SUSFS_ENABLE_LOG=y
         CONFIG_KSU_SUSFS_SUS_SU=y
         CONFIG_KSU_SUSFS_SUS_MAP=y
         EOF

        export KCONFIG_ALLCONFIG=out/susfs_fragment.config
        make O=out olddefconfig

        echo "=== SUSFS Configs ==="
        grep CONFIG_KSU_SUSFS out/.config

    # ---------------------------------------------------------
    # Build Kernel
    # ---------------------------------------------------------
    - name: Build kernel
      run: |
        cd kernel_workspace/android-kernel

        export ARCH=arm64
        export SUBARCH=arm64
        export PATH=$GITHUB_WORKSPACE/kernel_workspace/clang-aosp/bin:$PATH
        export KCONFIG_ALLCONFIG=out/susfs_fragment.config

        make -j$(nproc) O=out CC=clang \
          CLANG_TRIPLE=aarch64-linux-gnu- LD=ld.lld LLVM=1

    # ---------------------------------------------------------
    # Verify SUSFS Compiled
    # ---------------------------------------------------------
    - name: Verify SUSFS build
      run: |
        cd kernel_workspace/android-kernel

        echo "Checking susfs.o..."
        find out/ -name "susfs.o"

        echo "Checking System.map..."
        grep susfs_ out/System.map || true

    # ---------------------------------------------------------
    # Package AnyKernel3
    # ---------------------------------------------------------
    - name: Package AnyKernel3
      run: |
        cd kernel_workspace
        git clone --depth=1 https://github.com/osm0sis/AnyKernel3
        cp android-kernel/out/arch/arm64/boot/Image AnyKernel3/

        cd AnyKernel3
        zip -r AK3-${{ env.Lineage_VERSION }}-SM8250-KSU_${{ env.RSKSUVER }}.zip ./*

    # ---------------------------------------------------------
    # Upload Artifacts
    # ---------------------------------------------------------
    - name: Upload Image
      uses: actions/upload-artifact@v4
      with:
        name: Image
        path: kernel_workspace/android-kernel/out/arch/arm64/boot/Image

    - name: Upload ZIP
      uses: actions/upload-artifact@v4
      with:
        name: AnyKernel3-ZIP
        path: kernel_workspace/AnyKernel3/*.zip

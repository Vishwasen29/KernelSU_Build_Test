name: A BC Build LineageOS OPlus SM8250 Kernel (KernelSU-Next Legacy + SUSFS)

on:
  workflow_dispatch:

env:
  TZ: Asia/Shanghai
  CLANG_VERSION: clang-r547379
  LINEAGE_VERSION: lineage-23.2
  KERNEL_ROOT: ${{ github.workspace }}/kernel_workspace/android-kernel
  CLANG_BIN:   ${{ github.workspace }}/kernel_workspace/clang-aosp/bin
  SCRIPTS:     $GITHUB_WORKSPACE/test

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set swap to 10G
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 10

    # ── Dependencies ────────────────────────────────────────────────────────
    - name: Install build dependencies
      run: |
        sudo apt-get update -q
        sudo apt-get install -y \
          git bc bison build-essential curl flex gperf \
          libncurses5-dev libssl-dev lzop zip unzip \
          libelf-dev clang lld python3 binutils-aarch64-linux-gnu
        mkdir -p kernel_workspace

    # ── Clang toolchain (cached) ─────────────────────────────────────────────
    - name: Cache Clang toolchain
      id: cache-clang
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/kernel_workspace/clang-aosp
        key: ${{ env.CLANG_VERSION }}

    - name: Download Clang
      if: steps.cache-clang.outputs.cache-hit != 'true'
      run: |
        cd kernel_workspace && mkdir clang-aosp
        wget -q -O clang.tar.gz \
          "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/${CLANG_VERSION}.tar.gz"
        tar -C clang-aosp -zxf clang.tar.gz && rm clang.tar.gz

    # ── Kernel source ────────────────────────────────────────────────────────
    - name: Clone Lineage kernel
      run: |
        git clone --depth=1 --recursive \
          https://github.com/LineageOS/android_kernel_oneplus_sm8250 \
          -b "$LINEAGE_VERSION" "$KERNEL_ROOT"

    # ── KernelSU-Next + Baseband Guard + compat patches ──────────────────────
    - name: Setup KernelSU-Next and Baseband Guard
      working-directory: ${{ env.KERNEL_ROOT }}
      run: |
        curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" \
          | bash -s legacy
        wget -q -O- "https://github.com/vc-teahouse/Baseband-guard/raw/main/setup.sh" | bash
        sed -i '/^config LSM$/,/^help$/{ /^[[:space:]]*default/ { /baseband_guard/! s/selinux/selinux,baseband_guard/ } }' \
          security/Kconfig
        bash "$GITHUB_WORKSPACE/patches/kernel-4.19_5.4-patch.sh"

    # ── Inject SUSFS Kconfig entries (ROOT CAUSE FIX) ───────────────────────
    #    sus4.patch does not add any Kconfig symbols, so make olddefconfig
    #    silently strips all CONFIG_KSU_SUSFS_* options without this step.
    - name: Add SUSFS Kconfig entries
      run: bash "$SCRIPTS/add_susfs_kconfig.sh" "$KERNEL_ROOT"

    # ── Relax KSU Kconfig dependency constraints ──────────────────────────────
    - name: Relax KSU Kconfig dependencies
      working-directory: ${{ env.KERNEL_ROOT }}
      run: |
        while IFS= read -r kconfig; do
          echo "[INFO] Relaxing: $kconfig"
          python3 "$SCRIPTS/relax_ksu_kconfig.sh" "$kconfig"
        done < <(find . -name "Kconfig" \
          -not -path "./.git/*" -not -path "./out/*" \
          -exec grep -l "^config KSU" {} \; 2>/dev/null)

    # ── Apply SUSFS patch + fix rejects ─────────────────────────────────────
    - name: Apply SUSFS patch
      working-directory: ${{ env.KERNEL_ROOT }}
      run: |
        git apply --reject --whitespace=fix "$SCRIPTS/sus4.patch" || true

    - name: Fix SUSFS patch rejects
      working-directory: ${{ env.KERNEL_ROOT }}
      run: bash "$SCRIPTS/fix3.sh"

    # ── OPlus weak-symbol stubs (LINKER FIX) ────────────────────────────────
    #    18 OPlus BSP symbols are referenced in core drivers but undefined
    #    without the OPlus platform SDK. Stubs prevent link failure.
    - name: Create OPlus weak-symbol stubs
      run: bash "$SCRIPTS/create_oplus_stubs.sh" "$KERNEL_ROOT"

    # ── Fix schgm-flash.c clang build error ──────────────────────────────────
    - name: Fix schgm-flash.c include order
      working-directory: ${{ env.KERNEL_ROOT }}
      run: bash "$SCRIPTS/fix_schgm_flash.sh"

    # ── Generate defconfig + enable KSU + SUSFS ──────────────────────────────
    - name: Configure kernel
      run: bash "$SCRIPTS/configure_kernel.sh" "$KERNEL_ROOT" "$CLANG_BIN"

    # ── Build ─────────────────────────────────────────────────────────────────
    - name: Build kernel
      working-directory: ${{ env.KERNEL_ROOT }}
      run: |
        export PATH="$CLANG_BIN:$PATH"
        make -j$(nproc) O=out CC=clang \
          ARCH=arm64 SUBARCH=arm64 \
          CLANG_TRIPLE=aarch64-linux-gnu- LD=ld.lld LLVM=1

    # ── Verify SUSFS is in the built kernel ──────────────────────────────────
    - name: Verify SUSFS integration
      run: bash "$SCRIPTS/verify_susfs.sh" "$KERNEL_ROOT"

    # ── Package + upload ──────────────────────────────────────────────────────
    - name: Package AnyKernel3
      run: |
        git clone --depth=1 https://github.com/osm0sis/AnyKernel3 \
          kernel_workspace/AnyKernel3
        cp "$KERNEL_ROOT/out/arch/arm64/boot/Image" kernel_workspace/AnyKernel3/
        cd kernel_workspace/AnyKernel3
        zip -r9 ../SM8250-KSU-SUSFS.zip ./*

    - name: Upload ZIP
      uses: actions/upload-artifact@v4
      with:
        name: SM8250-KSU-SUSFS
        path: kernel_workspace/SM8250-KSU-SUSFS.zip
        

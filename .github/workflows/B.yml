name: A mom Build LineageOS OPlus SM8250 Kernel with KernelSU and SUSFS

on:
  workflow_dispatch:

env:
  TZ: Asia/Shanghai
  CLANG_VERSION: clang-r547379
  Lineage_VERSION: lineage-23.2
  SUSFS_VERSION: kernel-4.19

jobs:
  build:
    name: Build Kernel (${{ matrix.ks }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ks: [rsuntk, backslashxx, ksun]

    steps:
      - uses: actions/checkout@v6

      - name: Set swap to 10G
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 10

      - name: Setup build kernel environment
        run: |
          echo "BUILD_TIME=$(TZ=Asia/Shanghai date "+%y%m%d")" >> $GITHUB_ENV
          echo "BUILD_TIME_1=$(TZ=Asia/Shanghai date "+%Y-%m-%d")" >> $GITHUB_ENV
          sudo apt-get update
          sudo apt-get install -y git ccache automake flex lzop bison gperf build-essential zip curl zlib1g-dev g++-multilib bzip2 libbz2-dev liblz4-tool make squashfs-tools dpkg-dev libssl-dev python3 bc libc6-dev-i386 libncurses5-dev
          mkdir -p $GITHUB_WORKSPACE/kernel_workspace

      - name: Cache Clang toolchain
        id: cache-clang
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/kernel_workspace/clang-aosp
          key: ${{ env.CLANG_VERSION }}

      - name: Download & extract Clang-aosp (if cache miss)
        if: steps.cache-clang.outputs.cache-hit != 'true'
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace
          mkdir -p clang-aosp
          wget -O ${CLANG_VERSION}.tar.gz \
            https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/${CLANG_VERSION}.tar.gz
          tar -C clang-aosp -zxvf ${CLANG_VERSION}.tar.gz

      - name: Download kernel source
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace
          git clone --recursive https://github.com/LineageOS/android_kernel_oneplus_sm8250 -b ${{ env.Lineage_VERSION }} android-kernel --depth=1

      - name: Download SUSFS patches
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace
          git clone --depth=1 https://gitlab.com/simonpunk/susfs4ksu.git -b ${{ env.SUSFS_VERSION }} susfs4ksu

      - name: Set up KernelSU (${{ matrix.ks }})
        run: |
          cd kernel_workspace/android-kernel
          
          if [ "${{ matrix.ks }}" = "ksun" ]; then
            echo "Setting up KernelSU-Next with SUSFS..."
            curl -LSs "https://raw.githubusercontent.com/pershoot/KernelSU-Next/next-susfs/kernel/setup.sh" | bash -s next-susfs
            wget -O- https://github.com/vc-teahouse/Baseband-guard/raw/main/setup.sh | bash
            sed -i '/^config LSM$/,/^help$/{ /^[[:space:]]*default/ { /baseband_guard/! s/selinux/selinux,baseband_guard/ } }' security/Kconfig
            bash $GITHUB_WORKSPACE/patches/kernel-4.19_5.4-patch.sh || true
            echo "CONFIG_KSU_MANUAL_HOOK=y" >> arch/arm64/configs/vendor/kona-perf_defconfig
            KSUNVER=$(cd KernelSU-Next && expr $(git rev-list --count HEAD) + 40000)
            echo "KSUNVER=$KSUNVER" >> $GITHUB_ENV
            echo "KSU_DIR=KernelSU-Next" >> $GITHUB_ENV
            echo "HAS_SUSFS=integrated" >> $GITHUB_ENV
          elif [ "${{ matrix.ks }}" = "rsuntk" ]; then
            echo "Setting up rsuntk KernelSU..."
            curl -LSs https://raw.githubusercontent.com/rsuntk/KernelSU/main/kernel/setup.sh | bash -s main
            bash $GITHUB_WORKSPACE/patches/kernel-4.19_5.4-patch.sh || true
            echo "CONFIG_KSU_MANUAL_HOOK=y" >> arch/arm64/configs/vendor/kona-perf_defconfig
            RSKSUVER=$(cd KernelSU && expr $(git rev-list --count HEAD) + 30000)
            echo "RSKSUVER=$RSKSUVER" >> $GITHUB_ENV
            echo "KSU_DIR=KernelSU" >> $GITHUB_ENV
            echo "HAS_SUSFS=patches_needed" >> $GITHUB_ENV
          else
            echo "Setting up backslashxx KernelSU..."
            curl -LSs https://raw.githubusercontent.com/backslashxx/KernelSU/master/kernel/setup.sh | bash -s master
            echo "CONFIG_KSU_TAMPER_SYSCALL_TABLE=y" >> arch/arm64/configs/vendor/kona-perf_defconfig
            XXKSUVER=$(grep -oP 'KSU_VERSION\s*=\s*\K\d+' KernelSU/kernel/Makefile | tail -n1)
            echo "XXKSUVER=$XXKSUVER" >> $GITHUB_ENV
            echo "KSU_DIR=KernelSU" >> $GITHUB_ENV
            echo "HAS_SUSFS=patches_needed" >> $GITHUB_ENV
          fi
          
          sed -i 's/ -dirty//g' scripts/setlocalversion

      - name: Apply SUSFS patches for non-integrated variants
        if: env.HAS_SUSFS == 'patches_needed'
        run: |
          cd kernel_workspace/android-kernel
          KERNEL_ROOT=$(pwd)
          mkdir -p $GITHUB_WORKSPACE/patch_rejects/${{ matrix.ks }}
          
          echo "Copying SUSFS source files..."
          cp -r $GITHUB_WORKSPACE/kernel_workspace/susfs4ksu/kernel_patches/fs/susfs.c fs/ || true
          cp -r $GITHUB_WORKSPACE/kernel_workspace/susfs4ksu/kernel_patches/include/linux/susfs.h include/linux/ || true
          
          echo "Applying kernel patches..."
          cp $GITHUB_WORKSPACE/kernel_workspace/susfs4ksu/kernel_patches/50_add_susfs_in_kernel-*.patch ./susfs_kernel.patch
          patch -p1 --forward --no-backup-if-mismatch --reject-file=$GITHUB_WORKSPACE/patch_rejects/${{ matrix.ks }}/kernel.rej < susfs_kernel.patch > $GITHUB_WORKSPACE/patch_rejects/${{ matrix.ks }}/kernel_patch.log 2>&1 || {
            echo "KERNEL_PATCH_FAILED=true" >> $GITHUB_ENV
            echo "Some kernel patches failed - will apply manual fixes..."
          }
          
          if [ -f $GITHUB_WORKSPACE/kernel_workspace/susfs4ksu/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch ]; then
            cp $GITHUB_WORKSPACE/kernel_workspace/susfs4ksu/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch ${{ env.KSU_DIR }}/ksu_susfs.patch
            cd ${{ env.KSU_DIR }}
            patch -p1 --forward --no-backup-if-mismatch --reject-file=$GITHUB_WORKSPACE/patch_rejects/${{ matrix.ks }}/ksu.rej < ksu_susfs.patch > $GITHUB_WORKSPACE/patch_rejects/${{ matrix.ks }}/ksu_patch.log 2>&1 || {
              echo "KSU_PATCH_FAILED=true" >> $GITHUB_ENV
              echo "Some KSU patches failed - will apply manual fixes..."
            }
            cd $KERNEL_ROOT
          fi
          
          echo "Applying manual fixes..."
          if ! grep -q "CONFIG_KSU_SUSFS" fs/Makefile; then
            sed -i '/obj-\$(CONFIG_PROC_FS)/a obj-\$(CONFIG_KSU_SUSFS) += susfs.o' fs/Makefile
          fi
          
          if [ -f include/linux/susfs.h ]; then
            if ! grep -q "#ifndef _LINUX_SUSFS_H" include/linux/susfs.h; then
              sed -i '1i #ifndef _LINUX_SUSFS_H\n#define _LINUX_SUSFS_H' include/linux/susfs.h
              echo "#endif /* _LINUX_SUSFS_H */" >> include/linux/susfs.h
            fi
          fi
          
          if [ -f include/linux/mount.h ] && ! grep -q "susfs_suspicious" include/linux/mount.h; then
            awk '/struct mount \{/,/\};/{
              if (/struct mnt_namespace \*mnt_ns;/) {
                print
                print "\tunsigned int susfs_suspicious;"
                next
              }
            } {print}' include/linux/mount.h > include/linux/mount.h.tmp
            mv include/linux/mount.h.tmp include/linux/mount.h
          fi
          
          for file in fs/namespace.c fs/proc/task_mmu.c; do
            if [ -f "$file" ] && ! grep -q "linux/susfs.h" "$file"; then
              sed -i '1a #ifdef CONFIG_KSU_SUSFS\n#include <linux/susfs.h>\n#endif' "$file"
            fi
          done
          
          if [ -f ${{ env.KSU_DIR }}/kernel/Makefile ]; then
            if ! grep -q "SUSFS_VERSION" ${{ env.KSU_DIR }}/kernel/Makefile; then
              cat >> ${{ env.KSU_DIR }}/kernel/Makefile << 'EOFMAKE'
          
          # SUSFS Integration
          ifeq ($(shell test -e $(srctree)/fs/susfs.c; echo $$?),0)
          $(eval SUSFS_VERSION=$(shell grep -E '^#define SUSFS_VERSION' $(srctree)/include/linux/susfs.h 2>/dev/null | cut -d' ' -f3 | sed 's/"//g'))
          $(info -- SUSFS_VERSION: $(SUSFS_VERSION))
          ccflags-y += -DKSU_SUSFS_ENABLED
          else
          $(info -- SUSFS not integrated)
          endif
          EOFMAKE
            fi
          fi

      - name: Enable SUSFS configuration
        run: |
          cd kernel_workspace/android-kernel
          cat >> arch/arm64/configs/vendor/kona-perf_defconfig << 'EOFCONFIG'
          
          # SUSFS Configuration
          CONFIG_KSU_SUSFS=y
          CONFIG_KSU_SUSFS_SUS_PATH=y
          CONFIG_KSU_SUSFS_SUS_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_KSTAT=y
          CONFIG_KSU_SUSFS_SUS_OVERLAYFS=y
          CONFIG_KSU_SUSFS_TRY_UMOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_MODULE_MOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KPROBE_SYSCALL_TABLE=y
          CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y
          EOFCONFIG

      - name: Add SUSFS Kconfig
        run: |
          cd kernel_workspace/android-kernel
          if [ -f ${{ env.KSU_DIR }}/kernel/Kconfig ]; then
            if ! grep -q "config KSU_SUSFS$" ${{ env.KSU_DIR }}/kernel/Kconfig; then
              cat >> ${{ env.KSU_DIR }}/kernel/Kconfig << 'EOFKCONFIG'
          
          menu "SUSFS - Advanced Root Hiding"
          	depends on KSU
          
          config KSU_SUSFS
          	bool "Enable SUSFS support"
          	depends on KSU
          	default y
          
          config KSU_SUSFS_HAS_MAGIC_MOUNT
          	bool "Magic Mount support"
          	depends on KSU_SUSFS
          	default y
          
          config KSU_SUSFS_SUS_PATH
          	bool "Suspicious path hiding"
          	depends on KSU_SUSFS
          	default y
          
          config KSU_SUSFS_SUS_MOUNT
          	bool "Suspicious mount hiding"
          	depends on KSU_SUSFS
          	default y
          
          config KSU_SUSFS_SUS_KSTAT
          	bool "Kstat spoofing"
          	depends on KSU_SUSFS
          	default y
          
          config KSU_SUSFS_SUS_OVERLAYFS
          	bool "OverlayFS hiding"
          	depends on KSU_SUSFS
          	default y
          
          config KSU_SUSFS_TRY_UMOUNT
          	bool "Try umount support"
          	depends on KSU_SUSFS
          	default y
          
          config KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT
          	bool "Auto-add KSU default mounts"
          	depends on KSU_SUSFS && KSU_SUSFS_HAS_MAGIC_MOUNT
          	default y
          
          config KSU_SUSFS_AUTO_ADD_SUS_KSU_MODULE_MOUNT
          	bool "Auto-add KSU module mounts"
          	depends on KSU_SUSFS && KSU_SUSFS_HAS_MAGIC_MOUNT
          	default y
          
          config KSU_SUSFS_AUTO_ADD_SUS_KPROBE_SYSCALL_TABLE
          	bool "Auto-add kprobe syscall table hiding"
          	depends on KSU_SUSFS
          	default y
          
          endmenu
          EOFKCONFIG
            fi
          fi

      - name: Collect patch diagnostics
        if: env.KERNEL_PATCH_FAILED == 'true' || env.KSU_PATCH_FAILED == 'true'
        run: |
          cd kernel_workspace/android-kernel
          REJECT_DIR=$GITHUB_WORKSPACE/patch_rejects/${{ matrix.ks }}
          find . -name "*.rej" -type f > $REJECT_DIR/reject_files_list.txt 2>/dev/null || true
          
          if [ -f $REJECT_DIR/reject_files_list.txt ] && [ -s $REJECT_DIR/reject_files_list.txt ]; then
            while IFS= read -r reject_file; do
              if [ -f "$reject_file" ]; then
                original_file="${reject_file%.rej}"
                reject_dest="$REJECT_DIR/rejects/$(dirname $reject_file)"
                original_dest="$REJECT_DIR/originals/$(dirname $reject_file)"
                mkdir -p "$reject_dest" "$original_dest"
                cp "$reject_file" "$reject_dest/" || true
                [ -f "$original_file" ] && cp "$original_file" "$original_dest/" || true
                [ -f "${original_file}.orig" ] && cp "${original_file}.orig" "$original_dest/" || true
              fi
            done < $REJECT_DIR/reject_files_list.txt
          fi
          
          cat > $REJECT_DIR/PATCH_SUMMARY.txt << EOFSUM
          SUSFS Patch Summary for ${{ matrix.ks }}
          ========================================
          Build Date: $(date)
          KernelSU Variant: ${{ matrix.ks }}
          KernelSU Directory: ${{ env.KSU_DIR }}
          EOFSUM
          
          [ -f $REJECT_DIR/kernel_patch.log ] && cat $REJECT_DIR/kernel_patch.log >> $REJECT_DIR/PATCH_SUMMARY.txt || true
          [ -f $REJECT_DIR/ksu_patch.log ] && cat $REJECT_DIR/ksu_patch.log >> $REJECT_DIR/PATCH_SUMMARY.txt || true

      - name: Upload patch diagnostics
        if: env.KERNEL_PATCH_FAILED == 'true' || env.KSU_PATCH_FAILED == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: patch-diagnostics-${{ matrix.ks }}
          path: ${{ github.workspace }}/patch_rejects/${{ matrix.ks }}/
          retention-days: 30

      - name: Build SUSFS userspace tools
        run: |
          cd kernel_workspace/susfs4ksu
          bash build_ksu_susfs_tool.sh 2>&1 | tee build_tools.log || echo "Tool build had issues"

      - name: Build kernel (${{ matrix.ks }})
        run: |
          cd kernel_workspace/android-kernel
          export ARCH=arm64
          export SUBARCH=arm64
          export BRAND_SHOW_FLAG=oneplus
          export PATH=$GITHUB_WORKSPACE/kernel_workspace/clang-aosp/bin:$PATH
          export KBUILD_BUILD_HOST=Github-Action
          export KBUILD_BUILD_USER=$(echo ${{ github.actor }} | tr A-Z a-z)
          BA_CMD="CLANG_TRIPLE=aarch64-linux-gnu-"
          EX_CMD="LD=ld.lld LLVM=1"
          DEFCONFIG="vendor/kona-perf_defconfig vendor/oplus.config"
          make O=out CC=clang $BA_CMD $EX_CMD $DEFCONFIG
          make -j$(nproc --all) O=out CC=clang $BA_CMD $EX_CMD 2>&1 | tee $GITHUB_WORKSPACE/build_log_${{ matrix.ks }}.txt

      - name: Upload build log if failed
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: build-log-${{ matrix.ks }}
          path: ${{ github.workspace }}/build_log_${{ matrix.ks }}.txt
          retention-days: 7

      - name: Check kernel output
        run: |
          cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel/out
          if [ -f arch/arm64/boot/Image ]; then
            echo "CHECK_IMAGE=true" >> $GITHUB_ENV
            echo "KERNEL_VERSION=$(cat include/config/kernel.release)" >> $GITHUB_ENV
            if [ -f ../fs/susfs.o ]; then
              echo "SUSFS_COMPILED=yes" >> $GITHUB_ENV
              echo "âœ“ SUSFS successfully compiled"
            else
              echo "SUSFS_COMPILED=no" >> $GITHUB_ENV
              echo "âš  SUSFS not found"
            fi
          else
            echo "Kernel output file is empty"
            exit 1
          fi

      - name: Prepare AnyKernel3 and package
        run: |
          cd kernel_workspace
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3
          sed -i 's/do.devicecheck=1/do.devicecheck=0/g' AnyKernel3/anykernel.sh
          sed -i 's!BLOCK=/dev/block/platform/omap/omap_hsmmc.0/by-name/boot;!BLOCK=auto;!g' AnyKernel3/anykernel.sh
          sed -i 's/IS_SLOT_DEVICE=0;/IS_SLOT_DEVICE=auto;/g' AnyKernel3/anykernel.sh
          rm -rf AnyKernel3/.git* AnyKernel3/README.md
          cp android-kernel/out/arch/arm64/boot/Image AnyKernel3/
          mkdir -p AnyKernel3/tools
          cp susfs4ksu/ksu_module_susfs/tools/ksu_susfs_arm64 AnyKernel3/tools/ 2>/dev/null || true
          cp susfs4ksu/ksu_module_susfs/tools/ksu_susfs_arm AnyKernel3/tools/ 2>/dev/null || true
          cat > AnyKernel3/tools/README.txt << 'EOFREADME'
          SUSFS Tools for KernelSU
          =========================
          Installation:
          1. Flash this kernel
          2. Copy ksu_susfs_arm64 to /data/adb/ksu/bin/
          3. chmod 755 /data/adb/ksu/bin/ksu_susfs_arm64
          4. Run 'ksu_susfs' in root shell
          EOFREADME
          cd AnyKernel3
          SUSFS_TAG=""
          [ "${{ env.SUSFS_COMPILED }}" = "yes" ] && SUSFS_TAG="_SUSFS"
          if [ "${{ matrix.ks }}" = "rsuntk" ]; then
            ZIP_NAME="AK3-${{ env.Lineage_VERSION }}-OPlus-SM8250-rsuntk${SUSFS_TAG}_${{ env.RSKSUVER }}.zip"
          elif [ "${{ matrix.ks }}" = "ksun" ]; then
            ZIP_NAME="AK3-${{ env.Lineage_VERSION }}-OPlus-SM8250-ksun${SUSFS_TAG}_${{ env.KSUNVER }}.zip"
          else
            ZIP_NAME="AK3-${{ env.Lineage_VERSION }}-OPlus-SM8250-backslashxx${SUSFS_TAG}_${{ env.XXKSUVER }}.zip"
          fi
          zip -r "$ZIP_NAME" ./*
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

      - name: Upload Image artifact
        if: env.CHECK_IMAGE == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: Image-${{ matrix.ks }}
          path: kernel_workspace/android-kernel/out/arch/arm64/boot/Image

      - name: Upload AnyKernel3 ZIP
        uses: actions/upload-artifact@v6
        with:
          name: AK3-${{ matrix.ks }}
          path: ${{ github.workspace }}/kernel_workspace/AnyKernel3/*.zip

      - name: Save build info
        run: |
          cd kernel_workspace
          {
            echo "========================================="
            echo "Build Information - ${{ matrix.ks }}"
            echo "========================================="
            echo "Build Variant: ${{ matrix.ks }}"
            echo "Build Date: ${{ env.BUILD_TIME_1 }}"
            echo "LineageOS Version: ${{ env.Lineage_VERSION }}"
            echo "Kernel Version: ${{ env.KERNEL_VERSION }}"
            echo ""
            if [ "${{ matrix.ks }}" = "rsuntk" ]; then
              echo "KSU Variant: rsuntk"
              echo "KSU Version: ${{ env.RSKSUVER }}"
            elif [ "${{ matrix.ks }}" = "ksun" ]; then
              echo "KSU Variant: KernelSU-Next"
              echo "KSU Version: ${{ env.KSUNVER }}"
            else
              echo "KSU Variant: backslashxx"
              echo "KSU Version: ${{ env.XXKSUVER }}"
            fi
            echo "SUSFS Compiled: ${{ env.SUSFS_COMPILED }}"
            echo "Package: ${{ env.ZIP_NAME }}"
            echo "========================================="
          } > build-info-${{ matrix.ks }}.txt

      - name: Upload build info
        uses: actions/upload-artifact@v6
        with:
          name: INFO-${{ matrix.ks }}
          path: kernel_workspace/build-info-${{ matrix.ks }}.txt

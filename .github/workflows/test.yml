name: A KernelSU-Next + SUSFS

on:
  workflow_dispatch:

env:
  TZ: Asia/Shanghai
  CLANG_VERSION: clang-r547379
  Lineage_VERSION: lineage-23.2

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set swap to 10G
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 10

    - name: Setup build environment
      run: |
        echo "BUILD_TIME=$(TZ=Asia/Shanghai date "+%y%m%d")" >> $GITHUB_ENV
        echo "BUILD_TIME_1=$(TZ=Asia/Shanghai date "+%Y-%m-%d")" >> $GITHUB_ENV
        sudo apt-get update
        sudo apt-get install -y git ccache automake flex lzop bison gperf \
        build-essential zip curl zlib1g-dev g++-multilib bzip2 libbz2-dev \
        liblz4-tool make squashfs-tools dpkg-dev libssl-dev python3 bc \
        libc6-dev-i386 libncurses5-dev
        mkdir -p kernel_workspace

    # =========================================================
    # Clang Cache (YOUR ORIGINAL METHOD)
    # =========================================================

    - name: Cache Clang
      uses: actions/cache@v3
      id: cache-clang
      with:
        path: kernel_workspace/clang-aosp
        key: ${{ env.CLANG_VERSION }}

    - name: Download Clang (if needed)
      if: steps.cache-clang.outputs.cache-hit != 'true'
      run: |
        cd kernel_workspace
        mkdir clang-aosp
        wget -O ${CLANG_VERSION}.tar.gz \
        https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/${CLANG_VERSION}.tar.gz
        tar -C clang-aosp -zxvf ${CLANG_VERSION}.tar.gz

    # =========================================================
    # Clone Kernel
    # =========================================================

    - name: Clone Kernel Source
      run: |
        cd kernel_workspace
        git clone --recursive \
        https://github.com/LineageOS/android_kernel_oneplus_sm8250 \
        -b ${{ env.Lineage_VERSION }} android-kernel --depth=1

    # =========================================================
    # KernelSU-Next (LEGACY ONLY)
    # =========================================================

    - name: Setup KernelSU-Next (legacy)
      run: |
        cd kernel_workspace/android-kernel

        echo "[+] Installing KernelSU-Next legacy"
        curl -LSs https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh | bash -s legacy

        # Enable manual hook
        echo "CONFIG_KSU_MANUAL_HOOK=y" >> arch/arm64/configs/vendor/kona-perf_defconfig

        # Remove dirty suffix
        sed -i 's/ -dirty//g' scripts/setlocalversion

        # Export version
        RSKSUVER=$(cd KernelSU-Next && expr $(git rev-list --count HEAD) + 30000)
        echo "KSU_VERSION=$RSKSUVER" >> $GITHUB_ENV

    # =========================================================
    # Apply SUSFS Patch
    # =========================================================

    - name: Apply SUSFS Patch
      run: |
        cd kernel_workspace/android-kernel
        git apply --reject --whitespace=fix \
        $GITHUB_WORKSPACE/patches/sus4.patch || true

    - name: Run fix5.sh
      run: |
        cd kernel_workspace/android-kernel
        bash $GITHUB_WORKSPACE/patches/fix5.sh

    # =========================================================
    # Collect Rejects + Original Files
    # =========================================================

    - name: Collect Patch Rejects
      if: always()
      run: |
        cd kernel_workspace/android-kernel

        mkdir -p $GITHUB_WORKSPACE/reject_dump

        # Copy reject files
        find . -name "*.rej" -exec cp --parents {} $GITHUB_WORKSPACE/reject_dump/ \; || true

        # Copy corresponding original files
        for rej in $(find . -name "*.rej"); do
          orig=$(echo $rej | sed 's/\.rej$//')
          if [ -f "$orig" ]; then
            cp --parents "$orig" $GITHUB_WORKSPACE/reject_dump/
          fi
        done

        # Copy patch
        cp $GITHUB_WORKSPACE/patches/sus4.patch \
        $GITHUB_WORKSPACE/reject_dump/ || true

        # Save current diff
        git diff > $GITHUB_WORKSPACE/reject_dump/current_tree.diff || true

        cd $GITHUB_WORKSPACE
        tar -czf susfs_rejects.tar.gz reject_dump || true

    - name: Upload Reject Artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: susfs-reject-dump
        path: susfs_rejects.tar.gz

    # =========================================================
    # Build (YOUR ORIGINAL BUILD STYLE)
    # =========================================================

    - name: Build Kernel
      run: |
        cd kernel_workspace/android-kernel

        export ARCH=arm64
        export SUBARCH=arm64
        export PATH=$GITHUB_WORKSPACE/kernel_workspace/clang-aosp/bin:$PATH
        export KBUILD_BUILD_HOST=Github-Action
        export KBUILD_BUILD_USER=${{ github.actor }}

        make O=out vendor/kona-perf_defconfig vendor/oplus.config

        make -j$(nproc) O=out \
        CC=clang \
        LD=ld.lld \
        LLVM=1

    # =========================================================
    # Package AnyKernel3
    # =========================================================

    - name: Package AnyKernel3
      run: |
        cd kernel_workspace
        git clone --depth=1 https://github.com/osm0sis/AnyKernel3
        cp android-kernel/out/arch/arm64/boot/Image AnyKernel3/

        cd AnyKernel3
        zip -r AK3-${{ env.Lineage_VERSION }}-KSU-Next-SUSFS-${{ env.KSU_VERSION }}.zip ./*

    - name: Upload Kernel
      uses: actions/upload-artifact@v4
      with:
        name: KernelSU-Next-SUSFS
        path: kernel_workspace/AnyKernel3/*.zip

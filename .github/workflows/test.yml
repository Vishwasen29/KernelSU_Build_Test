name: A KernelSU-Next + SUSFS Build

on:
  workflow_dispatch:

env:
  TZ: Asia/Shanghai
  CLANG_VERSION: clang-r547379
  LINEAGE_VERSION: lineage-23.2

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set Swap (10G)
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 10

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git bc bison build-essential curl flex g++-multilib \
        gcc-multilib git-lfs gnupg gperf imagemagick libncurses5-dev \
        libssl-dev libxml2-utils lzop pngcrush rsync schedtool \
        squashfs-tools xsltproc zip zlib1g-dev

        echo "BUILD_DATE=$(date +%Y%m%d)" >> $GITHUB_ENV

    # =========================================================
    # Download Clang
    # =========================================================

    - name: Download Clang
      run: |
        mkdir toolchain
        cd toolchain
        wget https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/${CLANG_VERSION}.tar.gz
        tar -xf ${CLANG_VERSION}.tar.gz
        echo "$PWD/bin" >> $GITHUB_PATH

    # =========================================================
    # Clone Kernel
    # =========================================================

    - name: Clone Kernel Source
      run: |
        git clone --depth=1 --recursive \
        https://github.com/LineageOS/android_kernel_oneplus_sm8250 \
        -b ${LINEAGE_VERSION} kernel

    # =========================================================
    # Setup KernelSU-Next (LEGACY)
    # =========================================================

    - name: Setup KernelSU-Next (legacy)
      run: |
        cd kernel

        echo "[+] Installing KernelSU-Next legacy..."
        curl -LSs https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh | bash -s legacy

        # Enable manual hook (required)
        echo "CONFIG_KSU_MANUAL_HOOK=y" >> arch/arm64/configs/vendor/kona-perf_defconfig

        # Remove dirty tag
        sed -i 's/ -dirty//g' scripts/setlocalversion

        # Calculate version
        RSKSUVER=$(cd KernelSU-Next && expr $(git rev-list --count HEAD) + 30000)
        echo "KSU_VERSION=$RSKSUVER" >> $GITHUB_ENV

    # =========================================================
    # Apply SUSFS Patch
    # =========================================================

    - name: Apply SUSFS Patch
      run: |
        cd kernel
        git apply --reject --whitespace=fix $GITHUB_WORKSPACE/patches/sus4.patch || true

    - name: Collect Patch Rejects (if any)
      run: |
        cd kernel

        mkdir -p $GITHUB_WORKSPACE/reject_dump

        # Copy all reject files
        find . -name "*.rej" -exec cp --parents {} $GITHUB_WORKSPACE/reject_dump/ \; || true

        # Copy corresponding original files
        for rej in $(find . -name "*.rej"); do
          orig=$(echo $rej | sed 's/\.rej$//')
          if [ -f "$orig" ]; then
            cp --parents "$orig" $GITHUB_WORKSPACE/reject_dump/
          fi
        done

        # Copy SUSFS patch for reference
        cp $GITHUB_WORKSPACE/patches/sus4.patch $GITHUB_WORKSPACE/reject_dump/ || true

        # Create archive
        cd $GITHUB_WORKSPACE
        tar -czf susfs_rejects.tar.gz reject_dump || true

    - name: Upload Reject Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: susfs-reject-dump
        path: susfs_rejects.tar.gz
    - name: Run fix5.sh
      run: |
        cd kernel
        bash $GITHUB_WORKSPACE/patches/fix5.sh

    # =========================================================
    # Verify SUSFS Before Build
    # =========================================================

    - name: Verify SUSFS Integration
      run: |
        cd kernel

        FAIL=0

        [ -f fs/susfs.c ] && echo "[PASS] susfs.c exists" || FAIL=1
        [ -f include/linux/susfs.h ] && echo "[PASS] susfs.h exists" || FAIL=1

        grep -q "susfs" fs/Makefile && echo "[PASS] fs/Makefile OK" || FAIL=1
        grep -q "CONFIG_KSU_SUSFS" arch/arm64/configs/vendor/kona-perf_defconfig && echo "[PASS] defconfig OK" || FAIL=1

        [ "$FAIL" -eq 0 ] || exit 1

    # =========================================================
    # Build Kernel
    # =========================================================

    - name: Build Kernel
      run: |
        cd kernel

        export ARCH=arm64
        export SUBARCH=arm64

        make O=out vendor/kona-perf_defconfig vendor/oplus.config

        make -j$(nproc) O=out \
        CC=clang \
        LD=ld.lld \
        LLVM=1 \
        LLVM_IAS=1

    # =========================================================
    # Verify SUSFS Compiled
    # =========================================================

    - name: Verify Build Output
      run: |
        cd kernel

        FAIL=0

        [ -f out/fs/susfs.o ] && echo "[PASS] susfs.o compiled" || FAIL=1
        grep -q "CONFIG_KSU_SUSFS=y" out/.config && echo "[PASS] SUSFS enabled in config" || FAIL=1

        [ "$FAIL" -eq 0 ] || exit 1

    # =========================================================
    # Package AnyKernel3
    # =========================================================

    - name: Package AnyKernel3
      run: |
        git clone --depth=1 https://github.com/osm0sis/AnyKernel3
        cp kernel/out/arch/arm64/boot/Image AnyKernel3/

        cd AnyKernel3
        zip -r AK3-KSU-Next-SUSFS-${KSU_VERSION}.zip ./*

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: KernelSU-Next-SUSFS
        path: AnyKernel3/*.zip

name: Tosted Build LineageOS OPlus SM8250 Kernel with KSUN BB susfs

on:
  workflow_dispatch:

env:
  TZ: Asia/Kolkata

jobs:
  build:
    name: Build Kernel by ${{ github.actor }}
    runs-on: ubuntu-latest

    env:
      CLANG_VERSION: clang-r547379
      GCC_TAG: android-12.1.0_r27
      Lineage_VERSION: lineage-23.2

    steps:
    - name: Checkout source
      uses: actions/checkout@v6

    - name: Set swap to 10G
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 10

    - name: Setup build kernel environment
      run: |
        echo "BUILD_TIME=$(TZ=Asia/Kolkata date '+%y%m%d')" >> $GITHUB_ENV
        echo "BUILD_TIME_1=$(TZ=Asia/Kolkata date '+%Y-%m-%d')" >> $GITHUB_ENV
        sudo apt-get update
        sudo apt-get install -y \
          git ccache automake flex lzop bison gperf build-essential zip curl \
          zlib1g-dev g++-multilib bzip2 libbz2-dev liblz4-tool make \
          squashfs-tools dpkg-dev libssl-dev python3 bc libc6-dev-i386 \
          libncurses5-dev
        mkdir -p $GITHUB_WORKSPACE/kernel_workspace

    - name: Cache Clang toolchain
      uses: actions/cache@v5
      with:
        path: ${{ github.workspace }}/kernel_workspace/clang-aosp
        key: ${{ env.CLANG_VERSION }}

    - name: Download & extract Clang
      if: steps.cache-clang.outputs.cache-hit != 'true'
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        mkdir -p clang-aosp
        wget -O ${CLANG_VERSION}.tar.gz \
          https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/${CLANG_VERSION}.tar.gz
        tar -C clang-aosp -zxvf ${CLANG_VERSION}.tar.gz

    - name: Cache GCC toolchain
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/kernel_workspace/gcc-64
        key: gcc-aarch64-${{ env.GCC_TAG }}

    - name: Download & extract GCC
      if: steps.cache-gcc.outputs.cache-hit != 'true'
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        mkdir -p gcc-64
        wget -O gcc-aarch64.tar.gz \
          https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9/+archive/refs/tags/${GCC_TAG}.tar.gz
        tar -C gcc-64 -zxvf gcc-aarch64.tar.gz

    - name: Clone kernel source
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        git clone --recursive \
          https://github.com/LineageOS/android_kernel_oneplus_sm8250 \
          -b ${{ env.Lineage_VERSION }} android-kernel --depth=1

    - name: Setup KernelSU + Baseband Guard
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel

        curl -LSs \
          https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh \
          | bash -s legacy

        wget -O- \
          https://github.com/vc-teahouse/Baseband-guard/raw/main/setup.sh \
          | bash

        sed -i '/^config LSM$/,/^help$/{ /^[[:space:]]*default/ { /baseband_guard/! s/selinux/selinux,baseband_guard/ } }' security/Kconfig

        bash $GITHUB_WORKSPACE/patches/kernel-4.19_5.4-patch.sh

        echo "CONFIG_KSU_MANUAL_HOOK=y
        CONFIG_KSU_SUSFS=y
        CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y
        CONFIG_KSU_SUSFS_SUS_PATH=y
        CONFIG_KSU_SUSFS_SUS_MOUNT=y
        CONFIG_KSU_SUSFS_SUS_KSTAT=y
        CONFIG_KSU_SUSFS_SUS_OVERLAYFS=y
        CONFIG_KSU_SUSFS_TRY_UMOUNT=y
        CONFIG_KSU_SUSFS_SPOOF_UNAME=y
        CONFIG_KSU_SUSFS_OPEN_REDIRECT=y
        CONFIG_KSU_SUSFS_ENABLE_LOG=y
        CONFIG_KSU_SUSFS_SUS_SU=y" \
        >> arch/arm64/configs/vendor/kona-perf_defconfig

        KSU_VERSION=$(cd KernelSU-Next && expr $(git rev-list --count HEAD) + 30000)
        echo "KSUVER=$KSU_VERSION" >> $GITHUB_ENV

        cd scripts
        sed -i 's/ -dirty//g' setlocalversion

    # 🔥 REPLACED PATCH STEP (your request)
    - name: Apply SUSFS + KernelSU patch
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel

        echo "Applying main SUSFS kernel patch..."
        patch -p1 < $GITHUB_WORKSPACE/patches/50_add_susfs_in_kernel-4.19.patch \
          2>&1 | tail -20 || true

        echo "Applying KernelSU SUSFS patch (strip level 2)..."
        patch -p2 < $GITHUB_WORKSPACE/patches/10_enable_susfs_for_ksu.patch \
          2>&1 | tail -20 || true

        echo "Trying alternative KernelSU patch path rewrite..."
        cp $GITHUB_WORKSPACE/patches/10_enable_susfs_for_ksu.patch .
        sed -i 's|a/drivers/kernelsu/|a/KernelSU-Next/kernel/drivers/kernelsu/|g' 10_enable_susfs_for_ksu.patch
        sed -i 's|b/drivers/kernelsu/|b/KernelSU-Next/kernel/drivers/kernelsu/|g' 10_enable_susfs_for_ksu.patch
        patch -p1 < 10_enable_susfs_for_ksu.patch \
          2>&1 | tail -20 || true

        if [ -d "$GITHUB_WORKSPACE/patches/fs" ]; then
          echo "Copying fs patches..."
          cp -rp $GITHUB_WORKSPACE/patches/fs/* fs/ || true
        fi

        if [ -d "$GITHUB_WORKSPACE/patches/include/linux" ]; then
          echo "Copying include/linux patches..."
          cp -rp $GITHUB_WORKSPACE/patches/include/linux/* include/linux/ || true
        fi

        echo "Checking for rejected hunks..."
        find . -name "*.rej" -type f -print || true

        echo "Patch application completed"

    - name: Build kernel
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
        export ARCH=arm64
        export SUBARCH=arm64
        export PATH=$GITHUB_WORKSPACE/kernel_workspace/clang-aosp/bin:$GITHUB_WORKSPACE/kernel_workspace/gcc-64/bin:$PATH
        export KBUILD_BUILD_HOST=Github-Action
        export KBUILD_BUILD_USER=$(echo ${{ github.actor }} | tr A-Z a-z)

        BA_CMD="CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-android-"
        EX_CMD="LD=ld.lld LLVM=1 LLVM_IAS=1"
        DEFCONFIG="vendor/kona-perf_defconfig vendor/debugfs.config vendor/oplus.config"

        make O=out ARCH=arm64 CC=clang $BA_CMD $EX_CMD $DEFCONFIG
        make -j$(nproc --all) O=out ARCH=arm64 CC=clang $BA_CMD $EX_CMD

    - name: Check kernel output
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel/out
        test -f arch/arm64/boot/Image || exit 1
        echo "CHECK_IMAGE=true" >> $GITHUB_ENV

    - name: Upload Image
      if: env.CHECK_IMAGE == 'true'
      uses: actions/upload-artifact@v6
      with:
        name: Image
        path: kernel_workspace/android-kernel/out/arch/arm64/boot/Image

name: A New KSUN+SUSFS Build LineageOS OPlus SM8250 Kernel

on:
  workflow_dispatch:

env:
  TZ: Asia/Shanghai
  CLANG_VERSION: clang-r547379
  LINEAGE_VERSION: lineage-23.2

jobs:
  build:
    name: Build Kernel
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix:
        ks: [rsuntk]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set swap to 10G
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 10

      - name: Setup build environment
        run: |
          echo "BUILD_TIME=$(date +%y%m%d)" >> "$GITHUB_ENV"
          echo "BUILD_TIME_1=$(date +%Y-%m-%d)" >> "$GITHUB_ENV"

          sudo apt-get update
          sudo apt-get install -y \
            git ccache automake flex lzop bison gperf build-essential \
            zip curl zlib1g-dev g++-multilib bzip2 libbz2-dev liblz4-tool \
            make squashfs-tools dpkg-dev libssl-dev python3 bc \
            libc6-dev-i386 libncurses5-dev wget dos2unix rsync unzip

          mkdir -p "$GITHUB_WORKSPACE/kernel_workspace"
          mkdir -p "$GITHUB_WORKSPACE/patch_artifacts"

      - name: Cache Clang toolchain
        id: cache-clang
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/kernel_workspace/clang-aosp
          key: ${{ env.CLANG_VERSION }}

      - name: Download Clang (if cache miss)
        if: steps.cache-clang.outputs.cache-hit != 'true'
        run: |
          cd "$GITHUB_WORKSPACE/kernel_workspace"
          mkdir -p clang-aosp
          wget -O "${CLANG_VERSION}.tar.gz" \
            "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/${CLANG_VERSION}.tar.gz"
          tar -xf "${CLANG_VERSION}.tar.gz" -C clang-aosp

      - name: Clone kernel source
        run: |
          cd "$GITHUB_WORKSPACE/kernel_workspace"
          git clone --depth=1 --recursive \
            https://github.com/LineageOS/android_kernel_oneplus_sm8250 \
            -b "${{ env.LINEAGE_VERSION }}" android-kernel

      - name: Integrate KernelSU-Next legacy_susfs + manual hooks + SUSFS patch + TRY_UMOUNT
        run: |
          cd "$GITHUB_WORKSPACE/kernel_workspace/android-kernel"

          chmod +x "$GITHUB_WORKSPACE/patches/apply_ksunext_legacy_susfs_sm8250-v4.sh"
          chmod +x "$GITHUB_WORKSPACE/patches/kernel-4.19-kernelsu-next-legacy-hooks-v4.sh"

          bash "$GITHUB_WORKSPACE/patches/apply_ksunext_legacy_susfs_sm8250-v4.sh" \
            . \
            "$GITHUB_WORKSPACE/patches/susfix-419-lineage-sm8250-compat.patch" \
            "$GITHUB_WORKSPACE/patches/kernel-4.19-kernelsu-next-legacy-hooks-v4.sh"

          wget -O- https://github.com/vc-teahouse/Baseband-guard/raw/main/setup.sh | bash

          if grep -q "config LSM" security/Kconfig; then
            sed -i '/^config LSM$/,/^help$/ {
              /^[[:space:]]*default/ {
                /baseband_guard/! s/selinux/selinux,baseband_guard/
              }
            }' security/Kconfig
          fi

          sed -i 's/ -dirty//g' scripts/setlocalversion

          RSKSUVER=$(cd KernelSU-Next && expr $(git rev-list --count HEAD) + 30000)
          echo "RSKSUVER=$RSKSUVER" >> "$GITHUB_ENV"

      - name: Save patch state and debug files
        if: always()
        run: |
          cd "$GITHUB_WORKSPACE/kernel_workspace/android-kernel"
          git diff --stat > "$GITHUB_WORKSPACE/patch_artifacts/patch_diffstat.txt" || true
          git diff > "$GITHUB_WORKSPACE/patch_artifacts/patch_full.diff" || true
          find . \( -name "*.rej" -o -name "*.orig" \) -exec cp --parents {} "$GITHUB_WORKSPACE/patch_artifacts/" \; || true

      - name: Upload Patch Debug
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: susfs-patch-debug
          path: ${{ github.workspace }}/patch_artifacts

      - name: Configure kernel
        run: |
          cd "$GITHUB_WORKSPACE/kernel_workspace/android-kernel"

          export ARCH=arm64
          export SUBARCH=arm64
          export PATH="$GITHUB_WORKSPACE/kernel_workspace/clang-aosp/bin:$PATH"

          BA_CMD="CLANG_TRIPLE=aarch64-linux-gnu-"
          EX_CMD="LD=ld.lld LLVM=1"

          make O=out CC=clang $BA_CMD $EX_CMD vendor/kona-perf_defconfig vendor/oplus.config

          scripts/config --file out/.config \
            -e KSU \
            -e KSU_MANUAL_HOOK \
            -d KSU_KPROBES_HOOK \
            -d KPROBES \
            -e KSU_SUSFS \
            -e KSU_SUSFS_SUS_PATH \
            -e KSU_SUSFS_SUS_MOUNT \
            -e KSU_SUSFS_SUS_KSTAT \
            -e KSU_SUSFS_TRY_UMOUNT \
            -e KSU_SUSFS_SPOOF_UNAME \
            -e KSU_SUSFS_ENABLE_LOG \
            -e KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS \
            -e KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG \
            -e KSU_SUSFS_OPEN_REDIRECT \
            -e KSU_SUSFS_SUS_MAP

          yes "" | make O=out CC=clang $BA_CMD $EX_CMD olddefconfig

          grep -E 'CONFIG_KSU|CONFIG_KPROBES|CONFIG_KSU_SUSFS' out/.config | sort | tee "$GITHUB_WORKSPACE/patch_artifacts/final_ksu_susfs_config.txt"

      - name: Build kernel
        run: |
          cd "$GITHUB_WORKSPACE/kernel_workspace/android-kernel"

          export ARCH=arm64
          export SUBARCH=arm64
          export BRAND_SHOW_FLAG=oneplus
          export PATH="$GITHUB_WORKSPACE/kernel_workspace/clang-aosp/bin:$PATH"
          export KBUILD_BUILD_HOST=Github-Action
          export KBUILD_BUILD_USER=$(echo "${{ github.actor }}" | tr A-Z a-z)

          BA_CMD="CLANG_TRIPLE=aarch64-linux-gnu-"
          EX_CMD="LD=ld.lld LLVM=1"

          make -j"$(nproc --all)" O=out CC=clang $BA_CMD $EX_CMD

      - name: Verify kernel output
        run: |
          cd "$GITHUB_WORKSPACE/kernel_workspace/android-kernel/out"

          if [ -f arch/arm64/boot/Image ]; then
            echo "CHECK_IMAGE=true" >> "$GITHUB_ENV"
            echo "KERNEL_VERSION=$(cat include/config/kernel.release)" >> "$GITHUB_ENV"
          else
            echo "Kernel output file is missing"
            exit 1
          fi

      - name: Prepare AnyKernel3 and package
        run: |
          cd "$GITHUB_WORKSPACE/kernel_workspace"
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3
          sed -i 's/do.devicecheck=1/do.devicecheck=0/g' AnyKernel3/anykernel.sh
          sed -i 's!BLOCK=/dev/block/platform/omap/omap_hsmmc.0/by-name/boot;!BLOCK=auto;!g' AnyKernel3/anykernel.sh
          sed -i 's/IS_SLOT_DEVICE=0;/IS_SLOT_DEVICE=auto;/g' AnyKernel3/anykernel.sh
          rm -rf AnyKernel3/.git* AnyKernel3/README.md
          cp android-kernel/out/arch/arm64/boot/Image AnyKernel3/

          cd AnyKernel3
          zip -r "AK3-${{ env.LINEAGE_VERSION }}-OPlus-SM8250-${{ matrix.ks }}_KSU_${{ env.RSKSUVER }}.zip" ./*

      - name: Upload Image artifact
        if: env.CHECK_IMAGE == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: Image-${{ matrix.ks }}
          path: ${{ github.workspace }}/kernel_workspace/android-kernel/out/arch/arm64/boot/Image

      - name: Upload AnyKernel3 ZIP
        uses: actions/upload-artifact@v4
        with:
          name: AK3-${{ matrix.ks }}
          path: ${{ github.workspace }}/kernel_workspace/AnyKernel3/AK3-${{ env.LINEAGE_VERSION }}-OPlus-SM8250-${{ matrix.ks }}_KSU_${{ env.RSKSUVER }}.zip

      - name: Save build info
        run: |
          cd "$GITHUB_WORKSPACE/kernel_workspace"
          {
            echo "RSKSUVER=${{ env.RSKSUVER }}"
            echo "KERNEL_VERSION=${{ env.KERNEL_VERSION }}"
            echo "BUILD_TIME_1=${{ env.BUILD_TIME_1 }}"
          } > "build-info-${{ matrix.ks }}.txt"

      - name: Upload build info
        uses: actions/upload-artifact@v4
        with:
          name: INFO-${{ matrix.ks }}
          path: ${{ github.workspace }}/kernel_workspace/build-info-${{ matrix.ks }}.txt

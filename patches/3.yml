name: A test Build Kernel - KSU Next + SUSFS

on:
  workflow_dispatch:

env:
  TZ: Asia/Shanghai
  CLANG_VERSION: clang-r547379
  Lineage_VERSION: lineage-23.2

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Environment
      run: |
        sudo apt update
        sudo apt install -y bc bison build-essential ccache curl flex git \
        libssl-dev libncurses5-dev libelf-dev lz4 python3 unzip zip

    - name: Restore ccache
      uses: actions/cache@v4
      with:
        path: ~/.ccache
        key: ${{ runner.os }}-ccache-${{ github.run_id }}
        restore-keys: |
          ${{ runner.os }}-ccache-

    - name: Clone Kernel Source
      run: |
        git clone --depth=1 https://github.com/LineageOS/android_kernel_oneplus_sm8250 kernel_workspace/android-kernel
        cd kernel_workspace/android-kernel
        echo "Kernel Commit:"
        git rev-parse HEAD

    - name: Setup Clang
      run: |
        mkdir clang
        cd clang
        curl -LO https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/${CLANG_VERSION}.tar.gz
        tar -xf ${CLANG_VERSION}.tar.gz
        cd ..
        echo "CLANG_PATH=$PWD/clang/bin" >> $GITHUB_ENV

    ########################################################
    # 1️⃣ KernelSU-Next Setup (LEGACY MODE)
    ########################################################
    - name: Setup KernelSU-Next (legacy)
      run: |
        cd kernel_workspace/android-kernel
        curl -LSs https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh | bash -s legacy
        echo "CONFIG_KSU=y" >> arch/arm64/configs/vendor/kona-perf_defconfig
        echo "CONFIG_KSU_MANUAL_HOOK=y" >> arch/arm64/configs/vendor/kona-perf_defconfig

    ########################################################
    # 2️⃣ Apply Manual Hook (ONLY AFTER setup.sh)
    ########################################################
    - name: Apply Manual Hook
      run: |
        cd kernel_workspace/android-kernel

        # Example safe exec hook (CAF compatible anchor)
        if ! grep -q ksu_handle_execveat fs/exec.c; then
          sed -i '/static int do_execveat_common/i\
#ifdef CONFIG_KSU\
extern bool ksu_execveat_hook __read_mostly;\
extern int ksu_handle_execveat(int *fd, struct filename **filename_ptr, void *argv, void *envp, int *flags);\
#endif' fs/exec.c

          sed -i '/retval = __do_execve_file/i\
#ifdef CONFIG_KSU\
if (unlikely(ksu_execveat_hook))\
    ksu_handle_execveat(&fd, &filename, &argv, &envp, &flags);\
#endif' fs/exec.c
        fi

    ########################################################
    # 3️⃣ Clone SUSFS (kernel-4.19 branch)
    ########################################################
    - name: Clone SUSFS 4.19
      run: |
        git clone https://gitlab.com/simonpunk/susfs4ksu.git -b kernel-4.19 susfs4ksu

    ########################################################
    # 4️⃣ Apply SUSFS KernelSU Patch
    ########################################################
    - name: Apply SUSFS to KernelSU
      run: |
        cd kernel_workspace/android-kernel/KernelSU
        patch -p1 < ../../../susfs4ksu/kernel_patches/10_enable_susfs_for_ksu.patch || true

    ########################################################
    # 5️⃣ Apply SUSFS Kernel Patch
    ########################################################
    - name: Apply SUSFS Kernel Patch
      run: |
        cd kernel_workspace/android-kernel
        patch -p1 < ../../susfs4ksu/kernel_patches/50_add_susfs_in_kernel-4.19.patch || true

    ########################################################
    # 6️⃣ Upload Rejects If Any
    ########################################################
    - name: Collect Reject Files
      if: always()
      run: |
        cd kernel_workspace/android-kernel
        find . -name "*.rej" > rejects.txt || true
        tar -czf rejects.tar.gz $(find . -name "*.rej" -o -name "*.orig" 2>/dev/null) || true

    - name: Upload Reject Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: susfs-rejects
        path: kernel_workspace/android-kernel/rejects.tar.gz
        if-no-files-found: ignore

    ########################################################
    # 7️⃣ Build Kernel
    ########################################################
    - name: Build Kernel
      run: |
        export PATH=$CLANG_PATH:$PATH
        export ARCH=arm64
        export SUBARCH=arm64
        export CC=clang
        export CLANG_TRIPLE=aarch64-linux-gnu-
        export CROSS_COMPILE=aarch64-linux-gnu-
        export USE_CCACHE=1
        export CCACHE_DIR=~/.ccache

        cd kernel_workspace/android-kernel

        make O=out kona-perf_defconfig
        make -j$(nproc) O=out

    ########################################################
    # 8️⃣ Upload Image
    ########################################################
    - name: Upload Kernel Image
      uses: actions/upload-artifact@v4
      with:
        name: Image
        path: kernel_workspace/android-kernel/out/arch/arm64/boot/Image*
